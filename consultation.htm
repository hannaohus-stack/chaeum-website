<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략 상담 신청 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 650px; width: 100%; padding: 40px 20px; }
        
        .header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 44px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.6; }
        
        .form-section { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 40px; 
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .step {
            text-align: center;
            font-size: 12px;
            color: #666;
            flex: 1;
        }

        .step.active {
            color: #64C8FF;
            font-weight: 600;
        }

        .step-number {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            line-height: 24px;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .step.active .step-number {
            background: #64C8FF;
            color: #4B4545;
        }
        
        .form-group { margin-bottom: 28px; }
        label { 
            display: block; 
            font-size: 12px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 600; 
            margin-bottom: 12px; 
        }
        .required { color: #FF6464; }
        
        input, textarea, select { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
        }
        select {
            cursor: pointer;
        }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .checkbox-group {
            display: grid;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin-right: 12px;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            color: #aaa;
            text-transform: none;
            text-transform: none;
            letter-spacing: normal;
            font-weight: normal;
            cursor: pointer;
            flex: 1;
        }

        .hint { font-size: 11px; color: #666; margin-top: 8px; }
        
        .error { 
            background: rgba(255, 107, 107, 0.1); 
            color: #FF6B6B; 
            padding: 12px; 
            border-radius: 4px; 
            display: none; 
            font-size: 12px; 
            margin-bottom: 20px;
            border-left: 4px solid #FF6B6B;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-next {
            background: white;
            color: #4B4545;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-prev {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-prev:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>전략 상담 신청</h1>
            <p class="subtitle">AI 분석 결과를 바탕으로<br>맞춤 전략을 제안합니다</p>
        </div>

        <div class="form-section">
            <div class="step-indicator">
                <div class="step active" data-step="1">
                    <div class="step-number">1</div>
                    <div>문제 선택</div>
                </div>
                <div class="step" data-step="2">
                    <div class="step-number">2</div>
                    <div>브랜드 정보</div>
                </div>
                <div class="step" data-step="3">
                    <div class="step-number">3</div>
                    <div>상담 예약</div>
                </div>
            </div>

            <div id="error" class="error"></div>

            <!-- STEP 1: 문제 선택 -->
            <form id="consultationForm">
                <div class="form-step active" data-step="1">
                    <label style="text-transform: none; text-transform: uppercase;">가장 중요한 문제를 선택하세요 <span class="required">*</span></label>
                    <p class="hint">현재 상황에서 가장 우선적으로 해결해야 할 문제를 선택해주세요</p>
                    
                    <div class="checkbox-group" style="margin-top: 16px;">
                        <div class="checkbox-item">
                            <input type="radio" id="problem1" name="mainProblem" value="messaging" required>
                            <label for="problem1">브랜드 메시지가 약함</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="radio" id="problem2" name="mainProblem" value="traffic">
                            <label for="problem2">고객 유입이 없음</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="radio" id="problem3" name="mainProblem" value="conversion">
                            <label for="problem3">전환율이 낮음</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="radio" id="problem4" name="mainProblem" value="positioning">
                            <label for="problem4">포지셔닝이 불명확함</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="radio" id="problem5" name="mainProblem" value="other">
                            <label for="problem5">기타 (상담에서 설명)</label>
                        </div>
                    </div>
                </div>

                <!-- STEP 2: 브랜드 정보 -->
                <div class="form-step" data-step="2">
                    <div class="form-group">
                        <label>브랜드명 <span class="required">*</span></label>
                        <input 
                            type="text"
                            id="brandName"
                            placeholder="ex) Krk, Nonfiction"
                            required>
                    </div>

                    <div class="form-group">
                        <label>웹사이트 <span class="required">*</span></label>
                        <input 
                            type="text"
                            id="websiteUrl"
                            placeholder="https://example.com"
                            required>
                    </div>

                    <div class="form-group">
                        <label>업종 <span class="required">*</span></label>
                        <select id="industry" required>
                            <option value="">선택하세요</option>
                            <option value="saas">B2B SaaS</option>
                            <option value="lifestyle">라이프스타일</option>
                            <option value="food">식품</option>
                            <option value="design">디자인</option>
                            <option value="fintech">핀테크</option>
                            <option value="health">헬스</option>
                            <option value="ecommerce">이커머스</option>
                            <option value="education">교육</option>
                            <option value="consulting">컨설팅</option>
                            <option value="other">기타</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>월 매출 규모 <span class="required">*</span></label>
                        <select id="revenue" required>
                            <option value="">선택하세요</option>
                            <option value="0-100">100만원 미만</option>
                            <option value="100-500">100~500만원</option>
                            <option value="500-2000">500만~2000만원</option>
                            <option value="2000-10000">2000만~1억원</option>
                            <option value="10000+">1억원 이상</option>
                        </select>
                        <p class="hint">현재 매출 규모를 선택해주세요</p>
                    </div>

                    <div class="form-group">
                        <label>팀 규모 <span class="required">*</span></label>
                        <select id="teamSize" required>
                            <option value="">선택하세요</option>
                            <option value="solo">혼자 운영</option>
                            <option value="2-5">2~5명</option>
                            <option value="5-10">5~10명</option>
                            <option value="10+">10명 이상</option>
                        </select>
                    </div>
                </div>

                <!-- STEP 3: 상담 예약 -->
                <div class="form-step" data-step="3">
                    <div class="form-group">
                        <label>이메일 <span class="required">*</span></label>
                        <input 
                            type="email"
                            id="consultationEmail"
                            placeholder="your@email.com"
                            required>
                        <p class="hint">상담 링크가 이메일로 발송됩니다</p>
                    </div>

                    <div class="form-group">
                        <label>담당자명</label>
                        <input 
                            type="text"
                            id="contactName"
                            placeholder="이름을 입력해주세요">
                    </div>

                    <div class="form-group">
                        <label style="text-transform: none;">추가 정보</label>
                        <textarea 
                            id="additionalInfo"
                            placeholder="상담에서 논의하고 싶은 추가 내용을 입력해주세요 (선택사항)"
                            style="min-height: 100px;"></textarea>
                    </div>

                    <div style="background: rgba(100, 200, 255, 0.05); border: 1px solid rgba(100, 200, 255, 0.2); padding: 16px; border-radius: 8px; font-size: 12px; line-height: 1.6;">
                        <p style="margin-bottom: 8px;">✓ 상담은 <strong>20분 무료</strong>입니다</p>
                        <p style="margin-bottom: 8px;">✓ 상담 후 맞춤형 전략안이 제공됩니다</p>
                        <p>✓ 서비스 계약은 자유롭습니다</p>
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="button-group">
                    <button type="button" class="btn-prev" id="prevBtn" style="display: none;">이전</button>
                    <button type="button" class="btn-next" id="nextBtn">다음</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const form = document.getElementById('consultationForm');

        nextBtn.addEventListener('click', (e) => {
            e.preventDefault();

            // 현재 스텝 검증
            if (!validateStep(currentStep)) {
                return;
            }

            if (currentStep < totalSteps) {
                currentStep++;
                updateUI();
            } else {
                // 마지막 스텝 - 상담 예약으로
                submitConsultation();
            }
        });

        prevBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            }
        });

        function updateUI() {
            // 폼 스텝 표시/숨김
            document.querySelectorAll('.form-step').forEach(step => {
                step.classList.remove('active');
            });
            document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.add('active');

            // 스텝 인디케이터 업데이트
            document.querySelectorAll('.step').forEach((step, idx) => {
                step.classList.toggle('active', idx + 1 <= currentStep);
            });

            // 버튼 업데이트
            prevBtn.style.display = currentStep > 1 ? 'block' : 'none';
            nextBtn.textContent = currentStep === totalSteps ? '상담 예약하기' : '다음';

            // 에러 숨김
            document.getElementById('error').style.display = 'none';
        }

        function validateStep(step) {
            const errorEl = document.getElementById('error');
            
            if (step === 1) {
                if (!document.querySelector('input[name="mainProblem"]:checked')) {
                    errorEl.textContent = '문제를 선택해주세요';
                    errorEl.style.display = 'block';
                    return false;
                }
            } else if (step === 2) {
                const brandName = document.getElementById('brandName').value.trim();
                const website = document.getElementById('websiteUrl').value.trim();
                const industry = document.getElementById('industry').value;
                const revenue = document.getElementById('revenue').value;
                const teamSize = document.getElementById('teamSize').value;

                if (!brandName || !website || !industry || !revenue || !teamSize) {
                    errorEl.textContent = '모든 필드를 입력해주세요';
                    errorEl.style.display = 'block';
                    return false;
                }
            } else if (step === 3) {
                const email = document.getElementById('consultationEmail').value.trim();
                if (!email) {
                    errorEl.textContent = '이메일을 입력해주세요';
                    errorEl.style.display = 'block';
                    return false;
                }
            }

            return true;
        }

        function submitConsultation() {
            // 모든 정보 수집
            const consultationData = {
                mainProblem: document.querySelector('input[name="mainProblem"]:checked').value,
                brandName: document.getElementById('brandName').value,
                website: document.getElementById('websiteUrl').value,
                industry: document.getElementById('industry').value,
                revenue: document.getElementById('revenue').value,
                teamSize: document.getElementById('teamSize').value,
                email: document.getElementById('consultationEmail').value,
                contactName: document.getElementById('contactName').value,
                additionalInfo: document.getElementById('additionalInfo').value,
                timestamp: new Date().toISOString()
            };

            console.log('상담 신청:', consultationData);

            // localStorage에 저장
            localStorage.setItem('consultationData', JSON.stringify(consultationData));

            // Calendly로 이동
            window.location.href = 'https://cal.com/chaeum';
        }

        // 초기화
        updateUI();
    </script>
</body>
</html>
