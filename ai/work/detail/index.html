      body {

      }
      .site-logo {

        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 25px;
        line-height: 1;
      }
      .hero {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background: #111;
      }
      .hero-image {
        position: absolute;
        inset: 0;
      }
      .hero-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(.95);
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.12) 42%, rgba(0,0,0,.48)),
          linear-gradient(90deg, rgba(0,0,0,.48), transparent 52%);

      .hero-content {
        position: relative;
        z-index: 1;
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: flex-end;
        padding: 0 42px 86px;
        color: #fff;

      .hero-kicker {

        color: rgba(255,255,255,.72);

        font-weight: 400;
        letter-spacing: .32em;

      .hero-title {

        font-weight: 400;
        backdrop-filter: blur(12px);

        grid-template-columns: minmax(0, 1.45fr) minmax(360px, .72fr);
        gap: 42px;
        padding: 56px 38px 112px;
      }
      .portfolio-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        align-content: start;
      }
      .portfolio-grid figure {
        margin: 0;
        overflow: hidden;
        background: #efefef;
      }

        grid-column: auto;
        aspect-ratio: 4 / 5.35;
      }
      .portfolio-grid img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

        position: static;
        align-self: start;
        max-height: none;
        overflow: visible;
        padding-right: 10px;

        font-size: 42px;
        font-weight: 400;
        letter-spacing: -0.06em;

        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 28px 38px;

        display: block;
        margin-bottom: 9px;
        color: rgba(0,0,0,.4);
        font-size: 11px;
        font-weight: 400;
        letter-spacing: .18em;
        text-transform: uppercase;
      }
      .summary-item p {
        margin: 0;
        color: rgba(0,0,0,.84);
        font-size: 16px;
        letter-spacing: -0.04em;
        line-height: 1.42;
      }
      .descriptor-list {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin: 52px 0 18px;
        color: rgba(0,0,0,.45);
        font-size: 16px;
        letter-spacing: -0.04em;
      }
      .case-description {
        margin: 0;
        color: rgba(0,0,0,.48);
        font-size: 16px;
        font-weight: 300;
        letter-spacing: -0.04em;
        line-height: 1.72;
      }

        margin-top: 54px;
        border-top: 1px solid rgba(0,0,0,.12);
        padding-top: 36px;
      }
      .interview-section h2 {
        margin: 0 0 34px;
        font-size: 20px;
        font-weight: 400;
        letter-spacing: -0.06em;
      }
      .interview-item + .interview-item {
        margin-top: 36px;
      }
      .interview-item h3 {
        margin: 0 0 10px;
        color: rgba(0,0,0,.38);
        font-size: 16px;
        font-weight: 400;
        letter-spacing: -0.05em;
        line-height: 1.58;
      }
      .interview-item p {
        margin: 0;
        color: rgba(0,0,0,.72);
        font-size: 16px;
        font-weight: 300;
        letter-spacing: -0.05em;
        line-height: 1.58;
      }

        padding: 0 38px 120px;
      }

        margin: 0 0 28px;
        font-size: clamp(38px, 4vw, 64px);
        font-weight: 400;
        letter-spacing: -0.07em;
      }
      .related-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 24px;
      }
      .related-card figure {
        margin: 0 0 12px;
        aspect-ratio: 4 / 5.2;
        overflow: hidden;
        background: #eee;
      }
      .related-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .related-card p {
        margin: 0;
        font-size: 16px;
        letter-spacing: -0.04em;
      }
      .brand-footer {
        position: relative;
        min-height: 62vh;
        overflow: hidden;
        padding: 58px 28px 112px;
      }
      .brand-footer .contact-link {
        position: absolute;
        top: 42px;
        right: 28px;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: -0.04em;
      }
      .footer-wordmark {
        margin: 0;
        font-size: clamp(160px, 31vw, 590px);
        line-height: .78;
        white-space: nowrap;
      }
      .fixed-footer {
        position: fixed;
        z-index: 70;
        left: 0;
        right: 0;
        bottom: 0;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 20px;
        padding: 9px 28px 12px;
        pointer-events: none;

        font-size: 15px;
        font-weight: 400;
        letter-spacing: -0.04em;

        font-weight: 400;
        letter-spacing: -0.03em;

      .cta-button {

        background: #0b0b0b;
        padding: 10px 21px;
        color: #fff;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: -0.04em;

        font-weight: 400;
        letter-spacing: -0.04em;

          scroll-padding-left: 16px;

          touch-action: pan-x;
          -webkit-overflow-scrolling: touch;

        .summary-grid::-webkit-scrollbar {
          display: none;
        }

          min-height: 128px;
          border: 1px solid rgba(0,0,0,.08);
          background: #fff;
          padding: 22px 20px;
          scroll-snap-align: start;
        }
        .interview-section {
          margin-top: 48px;
          border-top: 0;
          padding-top: 0;
        }
        .interview-section h2 {
          margin-bottom: 38px;
        }
        .interview-item + .interview-item {
          margin-top: 34px;
        }
        .related {
          padding: 0 16px 80px;
        }
        .related-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 14px;
        }
        .brand-footer {
          min-height: 42vh;
          padding: 40px 16px 100px;
        }
        .brand-footer .contact-link {
          top: 28px;
          right: 16px;
          font-size: 20px;
        }
        .footer-wordmark {
          font-size: 42vw;
          transform: translateX(-8%);
        }
        .fixed-footer {
          grid-template-columns: 1fr;
          justify-items: center;
          padding: 8px 12px 12px;
        }
        .fixed-footer .copyright,
        .fixed-links {
          display: none;
        }
        .floating-actions {
          width: min(100%, 300px);
          justify-content: space-between;
          gap: 10px;
          padding: 7px 8px 7px 16px;
        }
        .cta-button {
          padding: 10px 18px;
        }
      }
      @media (min-width: 761px) {
        .mobile-menu { display: none; }
      }
    </style>
