<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chaeum Brand OS AI preview</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        overflow-x: hidden;
        background: #fff;
        color: #0b0b0b;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      button,
      a {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }
      .wordmark {
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: -0.085em;
      }
      .desktop-header {
        position: fixed;
        z-index: 40;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        height: 48px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        background: #fff;
        padding: 0 24px;
        font-size: 13px;
        font-weight: 300;
        letter-spacing: -0.04em;
      }
      .desktop-header nav {
        display: flex;
        align-items: center;
        gap: 32px;
      }
      .desktop-logo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 24px;
        line-height: 1;
      }
      .active-nav {
        border-bottom: 2px solid #000;
        padding-bottom: 4px;
      }
      .mobile-header {
        display: none;
      }
      .desktop-main {
        display: block;
        min-height: 100vh;
        padding-top: 48px;
      }
      .desktop-stage {
        --slide-width: clamp(290px, 31vw, 430px);
        --slide-gap: clamp(-170px, -12vw, -96px);
        position: relative;
        height: calc(100vh - 48px);
        overflow: hidden;
      }
      .desktop-pager {
        position: absolute;
        z-index: 20;
        top: 28px;
        left: 50%;
        display: flex;
        width: 300px;
        transform: translateX(-50%);
        align-items: center;
        gap: 24px;
        color: rgba(0, 0, 0, 0.32);
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.08em;
      }
      .desktop-pager::before {
        content: "";
        height: 1px;
        flex: 1;
        background: rgba(0, 0, 0, 0.32);
      }
      .desktop-rail {
        position: relative;
        height: 100%;
        touch-action: pan-y;
        user-select: none;
      }
      .rail.dragging {
        transition: none;
      }
      .logo-slide,
      .desktop-card {
        position: absolute;
        top: 15vh;
        left: 50%;
        width: var(--slide-width);
      }
      .logo-slide {
        display: flex;
        align-items: flex-end;
        overflow: hidden;
        background: #fff;
        padding-top: 72px;
      }
      .logo-slide .big-logo {
        margin: 0;
        font-size: 16vw;
        line-height: 0.68;
      }
      .intro-slide {
        position: absolute;
        top: 15vh;
        left: 50%;
        width: var(--slide-width);
        text-align: center;
      }
      .intro-card {
        position: relative;
        display: flex;
        aspect-ratio: 4 / 5.25;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 0%, rgba(255,255,255,.34), transparent 34%),
          linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.05) 28%, rgba(255,255,255,.12) 56%, rgba(255,255,255,.04)),
          #101010;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.34), inset 0 -1px 0 rgba(255,255,255,.08), 0 26px 80px rgba(0,0,0,.18);
        padding: 32px;
        color: #fff;
      }
      .intro-card::before {
        content: "";
        position: absolute;
        inset: -20%;
        background: linear-gradient(110deg, transparent 18%, rgba(255,255,255,.28) 42%, transparent 62%);
        transform: translateX(-26%) rotate(8deg);
        filter: blur(14px);
        opacity: .72;
      }
      .intro-card > * {
        position: relative;
        z-index: 1;
      }
      .intro-slide h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 56px;
        font-weight: 300;
        letter-spacing: -0.04em;
        line-height: 1;
      }
      .intro-slide p {
        margin: 28px 0 0;
        color: rgba(255, 255, 255, 0.62);
        font-size: 18px;
        font-weight: 300;
        line-height: 1.55;
      }
      .start-button {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-top: 36px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        padding: 15px 32px;
        color: #fff;
        font-size: 16px;
        font-weight: 650;
        transition: background 180ms ease, color 180ms ease;
      }
      .start-button:hover {
        background: #fff;
        color: #000;
      }
      .desktop-card {
        cursor: grab;
      }
      .desktop-over-label {
        position: absolute;
        z-index: 10;
        top: 24px;
        left: 50%;
        margin: 0;
        transform: translateX(-50%);
        white-space: nowrap;
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.26em;
        text-transform: uppercase;
      }
      .desktop-image {
        position: relative;
        aspect-ratio: 4 / 5.25;
        overflow: hidden;
        border-radius: 18px;
        background: #f3f3f3;
      }
      .desktop-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        user-select: none;
        pointer-events: none;
      }
      .mobile-main,
      .mobile-footer {
        display: none;
      }
      .menu-overlay {
        position: fixed;
        z-index: 60;
        inset: 0;
        display: none;
      }
      .menu-overlay.open {
        display: flex;
      }
      .menu-overlay {
        align-items: center;
        background: #fff;
        padding: 28px;
      }
      .close-button {
        position: absolute;
        top: 28px;
        right: 28px;
        padding: 4px;
        line-height: 0;
      }
      .menu-list {
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .menu-list button {
        text-align: left;
        font-size: clamp(54px, 8vw, 96px);
        font-weight: 300;
        letter-spacing: -0.05em;
      }
      @media (max-width: 760px) {
        .desktop-header,
        .desktop-main {
          display: none;
        }
        .mobile-header {
          position: fixed;
          z-index: 40;
          top: 0;
          left: 0;
          right: 0;
          display: flex;
          align-items: center;
          justify-content: space-between;
          background: #fff;
          padding: 28px 24px;
        }
        .mobile-brand {
          font-size: 42px;
          line-height: 0.86;
        }
        .mobile-actions {
          display: flex;
          align-items: center;
          gap: 20px;
        }
        .mobile-menu {
          font-size: 19px;
          font-weight: 300;
        }
        .mobile-main {
          display: block;
          position: relative;
          min-height: 100vh;
          padding-top: 128px;
        }
        .mobile-pager {
          display: flex;
          width: min(230px, calc(100vw - 56px));
          margin: 0 auto;
          align-items: center;
          justify-content: center;
          gap: 16px;
        }
        .mobile-pager .current-line {
          height: 1px;
          flex: 1;
          background: rgba(0, 0, 0, 0.32);
        }
        .mobile-pager span {
          min-width: 30px;
          color: rgba(0, 0, 0, 0.28);
          font-size: 9px;
          font-weight: 300;
          letter-spacing: 0.08em;
        }
        .mobile-pager span em {
          color: rgba(0, 0, 0, 0.28);
          font-style: normal;
          font-weight: 300;
        }
        .mobile-stage {
          --case-card-width: min(69vw, 340px);
          --case-gap: -18px;
          position: relative;
          z-index: 10;
          margin-top: 48px;
        }
        .mobile-rail {
          display: flex;
          align-items: flex-start;
          gap: var(--case-gap);
          transform: translate3d(
            calc(50vw - (var(--case-card-width) / 2) - (var(--active-index) * (var(--case-card-width) + var(--case-gap))) + var(--drag-x)),
            0,
            0
          );
          transition: transform 560ms cubic-bezier(0.16, 1, 0.3, 1);
          touch-action: pan-y;
          user-select: none;
          will-change: transform;
        }
        .mobile-slide {
          width: var(--case-card-width);
          flex: 0 0 var(--case-card-width);
          cursor: grab;
          transition: opacity 420ms ease, transform 560ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mobile-label {
          margin-bottom: 28px;
          text-align: center;
        }
        .mobile-label p {
          margin: 0;
          font-size: 12px;
          font-weight: 600;
          letter-spacing: 0.26em;
          text-transform: uppercase;
        }
        .mobile-image,
        .mobile-intro {
          aspect-ratio: 4 / 5.25;
          overflow: hidden;
          border-radius: 18px;
          background: #f3f3f3;
        }
        .mobile-image img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          pointer-events: none;
          user-select: none;
        }
        .mobile-intro {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #111;
          padding: 28px;
          text-align: center;
          color: #fff;
        }
        .mobile-intro h1 {
          margin: 0;
          font-family: Georgia, "Times New Roman", serif;
          font-size: 48px;
          font-weight: 300;
          line-height: 1;
        }
        .mobile-intro p {
          margin: 24px 0 0;
          color: rgba(255, 255, 255, 0.62);
          font-size: 14px;
          font-weight: 300;
          line-height: 1.7;
        }
        .mobile-intro .start-button {
          margin-top: 30px;
          padding: 12px 24px;
          font-size: 14px;
        }
        .mobile-logo-section {
          position: relative;
          z-index: 0;
          margin-top: 6px;
          overflow: hidden;
          text-align: center;
        }
        .mobile-logo-section p {
          margin: 0;
          font-size: 45vw;
          line-height: 0.72;
        }
        .mobile-footer {
          display: block;
          position: relative;
          z-index: 20;
          padding: 48px 20px 38px;
          text-align: center;
          font-size: 15px;
          font-weight: 600;
          line-height: 1.85;
        }
        .mobile-footer p {
          margin: 0;
        }
      }
      .inquiry-open {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 80;
        border: 1px solid rgba(0,0,0,.18);
        border-radius: 999px;
        background: rgba(255,255,255,.88);
        padding: 11px 18px;
        color: #0b0b0b;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: -0.035em;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 18px 50px rgba(0,0,0,.08);
      }
      .inquiry-panel {
        position: fixed;
        right: 24px;
        bottom: 74px;
        z-index: 90;
        display: none;
        width: min(430px, calc(100vw - 48px));
        max-height: min(720px, calc(100vh - 110px));
        overflow: hidden;
        border: 1px solid rgba(0,0,0,.12);
        background: rgba(255,255,255,.96);
        color: #0b0b0b;
        box-shadow: 0 28px 90px rgba(0,0,0,.14);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
      }
      .inquiry-panel.open {
        display: block;
      }
      .inquiry-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid rgba(0,0,0,.08);
        padding: 20px 20px 18px;
      }
      .inquiry-head.compact {
        justify-content: flex-end;
        padding: 14px 16px;
      }
      .inquiry-kicker {
        margin: 0 0 8px;
        color: rgba(0,0,0,.42);
        font-size: 10px;
        letter-spacing: .14em;
        text-transform: uppercase;
      }
      .inquiry-title {
        margin: 0;
        font-size: 22px;
        font-weight: 400;
        line-height: 1.22;
        letter-spacing: -0.06em;
      }
      .inquiry-close {
        color: rgba(0,0,0,.46);
        font-size: 24px;
        line-height: 1;
      }
      .inquiry-body {
        max-height: calc(min(720px, calc(100vh - 110px)) - 92px);
        overflow-y: auto;
        padding: 20px;
      }
      .inquiry-step {
        display: none;
      }
      .inquiry-step.active {
        display: block;
      }
      .inquiry-question {
        margin: 0 0 16px;
        font-size: 18px;
        font-weight: 400;
        line-height: 1.45;
        letter-spacing: -0.045em;
      }
      .inquiry-options,
      .inquiry-fields {
        display: grid;
        gap: 8px;
      }
      .inquiry-option {
        width: 100%;
        border: 1px solid rgba(0,0,0,.12);
        padding: 12px 13px;
        text-align: left;
        color: rgba(0,0,0,.76);
        font-size: 14px;
        line-height: 1.45;
      }
      .inquiry-option:hover,
      .inquiry-option.selected {
        border-color: rgba(0,0,0,.42);
        background: rgba(0,0,0,.04);
        color: #0b0b0b;
      }
      .inquiry-input,
      .inquiry-textarea {
        width: 100%;
        border: 0;
        border-bottom: 1px solid rgba(0,0,0,.22);
        outline: 0;
        background: transparent;
        padding: 12px 0;
        color: #0b0b0b;
        font: inherit;
        font-size: 15px;
      }
      .inquiry-textarea {
        min-height: 96px;
        resize: vertical;
      }
      .inquiry-input::placeholder,
      .inquiry-textarea::placeholder {
        color: rgba(0,0,0,.38);
      }
      .inquiry-summary {
        margin-top: 14px;
        background: rgba(0,0,0,.04);
        padding: 14px;
        color: rgba(0,0,0,.56);
        font-size: 13px;
        line-height: 1.7;
      }
      .inquiry-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 20px;
      }
      .inquiry-back,
      .inquiry-next {
        border: 1px solid rgba(0,0,0,.18);
        border-radius: 999px;
        padding: 10px 15px;
        font-size: 12px;
        font-weight: 400;
      }
      .inquiry-next {
        border-color: #0b0b0b;
        background: #0b0b0b;
        color: #fff;
      }
      .inquiry-progress {
        color: rgba(0,0,0,.42);
        font-size: 11px;
        letter-spacing: .1em;
      }
      @media (max-width: 760px) {
        .inquiry-open {
          right: 16px;
          bottom: 16px;
        }
        .inquiry-panel {
          right: 16px;
          bottom: 64px;
          width: calc(100vw - 32px);
        }
      }
    </style>
  </head>
  <body>
    <header class="desktop-header">
      <nav>
        <a href="/ai/service/index.html">Services</a>
        <a href="/ai/work/index.html">Work</a>
        <a href="/ai/academy/index.html">Academy</a>
      </nav>
      <button class="desktop-logo wordmark" id="desktopHomeButton">chaeum</button>
      <nav>
        <a href="/ai/contact/">Contact</a>
      </nav>
    </header>

    <header class="mobile-header">
      <button class="mobile-brand wordmark" id="mobileHomeButton">chaeum</button>
      <div class="mobile-actions">
        <button aria-label="그리드 보기">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,.48)" stroke-width="1.8">
            <rect x="3" y="3" width="6" height="6" rx="1"></rect>
            <rect x="15" y="3" width="6" height="6" rx="1"></rect>
            <rect x="3" y="15" width="6" height="6" rx="1"></rect>
            <rect x="15" y="15" width="6" height="6" rx="1"></rect>
          </svg>
        </button>
        <button class="mobile-menu" id="menuButton">MENU</button>
      </div>
    </header>

    <div class="menu-overlay" id="menuOverlay">
      <button class="close-button" id="closeMenuButton" aria-label="메뉴 닫기">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
      <div class="menu-list">
        <a href="/ai/service/index.html">Services</a>
        <a href="/ai/work/index.html">Work</a>
        <a href="/ai/academy/index.html">Academy</a>
        <a href="/ai/contact/">Contact</a>
      </div>
    </div>

    <main class="desktop-main" id="desktopMain">
      <section class="desktop-stage">
        <div class="desktop-pager" id="desktopPager"></div>
        <div class="desktop-rail rail" id="desktopRail">
          <div class="logo-slide desktop-layer" data-slide-index="-1">
            <p class="big-logo wordmark">chaeum</p>
          </div>
        </div>
      </section>
    </main>

    <main class="mobile-main">
      <div class="mobile-pager">
        <div class="current-line"></div>
        <span id="mobilePager"></span>
      </div>
      <section class="mobile-stage">
        <div class="mobile-rail rail" id="mobileRail">
        </div>
      </section>
      <section class="mobile-logo-section">
        <p class="wordmark">chaeum</p>
      </section>
    </main>

    <footer class="mobile-footer">
      <p>©chaeum. All rights reserved.</p>
      <p>contact@chaeum.kr</p>
    </footer>

    <button class="inquiry-open" id="inquiryOpen" type="button">문의하기</button>
    <section class="inquiry-panel" id="inquiryPanel" aria-label="Brand OS AI 문의" aria-hidden="true">
      <div class="inquiry-head compact">
        <div></div>
        <button class="inquiry-close" id="inquiryClose" type="button" aria-label="문의 창 닫기">×</button>
      </div>
      <div class="inquiry-body">
        <div class="inquiry-step active" data-step="0">
          <p class="inquiry-question">브랜드 업종을 선택해주세요.</p>
          <div class="inquiry-options" data-key="industry">
            <button class="inquiry-option" type="button" data-value="Food / F&B">Food / F&amp;B</button>
            <button class="inquiry-option" type="button" data-value="Beauty">Beauty</button>
            <button class="inquiry-option" type="button" data-value="Lifestyle">Lifestyle</button>
            <button class="inquiry-option" type="button" data-value="B2B / Tech">B2B / Tech</button>
            <button class="inquiry-option" type="button" data-value="Other">Other</button>
          </div>
        </div>
        <div class="inquiry-step" data-step="1">
          <p class="inquiry-question">현재 브랜드 운영 단계는 어디에 가까운가요?</p>
          <div class="inquiry-options" data-key="stage">
            <button class="inquiry-option" type="button" data-value="런칭 전 / 준비 단계">런칭 전 / 준비 단계</button>
            <button class="inquiry-option" type="button" data-value="운영 중이지만 기준 정리가 필요함">운영 중이지만 기준 정리가 필요함</button>
            <button class="inquiry-option" type="button" data-value="콘텐츠 발행을 꾸준히 확장하고 싶음">콘텐츠 발행을 꾸준히 확장하고 싶음</button>
            <button class="inquiry-option" type="button" data-value="팀 단위 AI 운영 시스템이 필요함">팀 단위 AI 운영 시스템이 필요함</button>
          </div>
        </div>
        <div class="inquiry-step" data-step="2">
          <p class="inquiry-question">브랜드 운영에서 지금 가장 불편한 지점은 무엇인가요?</p>
          <div class="inquiry-options" data-key="need">
            <button class="inquiry-option" type="button" data-value="브랜드 말투가 매번 달라져요">브랜드 말투가 매번 달라져요</button>
            <button class="inquiry-option" type="button" data-value="고객에게 설명이 잘 안 돼요">고객에게 설명이 잘 안 돼요</button>
            <button class="inquiry-option" type="button" data-value="반응은 있는데 다음 액션이 어려워요">반응은 있는데 다음 액션이 어려워요</button>
            <button class="inquiry-option" type="button" data-value="팀과 기준을 맞추기 어려워요">팀과 기준을 맞추기 어려워요</button>
            <button class="inquiry-option" type="button" data-value="전체 구조를 먼저 보고 싶어요">전체 구조를 먼저 보고 싶어요</button>
          </div>
        </div>
        <div class="inquiry-step" data-step="3">
          <p class="inquiry-question">현재 사용 중이거나 선호하는 업무 도구가 있나요?</p>
          <div class="inquiry-options" data-key="tool">
            <button class="inquiry-option" type="button" data-value="Notion">Notion</button>
            <button class="inquiry-option" type="button" data-value="Claude / ChatGPT">Claude / ChatGPT</button>
            <button class="inquiry-option" type="button" data-value="Slack / Google Drive">Slack / Google Drive</button>
            <button class="inquiry-option" type="button" data-value="아직 없음">아직 없음</button>
          </div>
        </div>
        <div class="inquiry-step" data-step="4">
          <p class="inquiry-question">상담을 위한 정보를 남겨주세요.</p>

      function moveSlide(direction) {

        desktopRail.querySelectorAll('.desktop-layer').forEach((card) => {
          const slideIndex = Number(card.dataset.slideIndex);
          const offset = slideIndex - currentIndex;
          const distance = clamp(Math.abs(offset), 0, 2);
          const isActive = offset === 0;
          const visible = Math.abs(offset) <= 2;
          const isLogo = card.classList.contains('logo-slide');
          card.style.opacity = visible ? (isLogo ? 1 : (isActive ? 1 : 0.42 - distance * 0.08)) : 0;

          card.style.pointerEvents = visible ? 'auto' : 'none';

            : `opacity 560ms ease, ${isLogo ? '' : 'filter 720ms ease, '}transform 920ms cubic-bezier(.19,1,.22,1)`;

            ? 'none'
            : 'opacity 420ms ease, transform 560ms cubic-bezier(.16,1,.3,1)';
        });

      function bindDrag(rail) {
        rail.addEventListener('pointerdown', (event) => {
          if (event.button > 0) return;
          pointerState = {
            startX: event.clientX,
            startedAt: performance.now(),
            moved: false,
            pointerId: event.pointerId,
            card: event.target.closest('[data-index]')
          };
          rail.setPointerCapture(event.pointerId);
          isDragging = true;
        });
        rail.addEventListener('pointermove', (event) => {
          if (!isDragging || pointerState.pointerId !== event.pointerId) return;
          const rawDistance = event.clientX - pointerState.startX;
          pointerState.moved = Math.abs(rawDistance) > 8;
          dragX = Math.sign(rawDistance) * Math.min(Math.abs(rawDistance), 260);
          render();
        });
        rail.addEventListener('pointerup', (event) => {
          if (!isDragging || pointerState.pointerId !== event.pointerId) return;
          const distance = event.clientX - pointerState.startX;
          const elapsed = Math.max(performance.now() - pointerState.startedAt, 1);
          const velocity = distance / elapsed;
          const shouldSwipe = Math.abs(distance) > 82 || Math.abs(velocity) > 0.42;
          rail.releasePointerCapture(event.pointerId);

          if (!pointerState.moved) {
            isDragging = false;
            dragX = 0;
            const card = pointerState.card || event.target.closest('[data-index]');
            if (card) openDetail(Number(card.dataset.index));
            render();
            return;
          }

          if (shouldSwipe) moveSlide(distance < 0 ? 'next' : 'prev');
          else {
            isDragging = false;
            dragX = 0;
            render();
          }
        });
        rail.addEventListener('pointercancel', () => {
          isDragging = false;
          dragX = 0;
          render();
        });

          console.info('Brand OS AI inquiry payload ready:', payload);
          alert('문의 초안이 생성되었습니다. 실제 접수는 연동 URL 설정 후 활성화됩니다.');
          closeInquiry();
          return;
        }

        await fetch(INQUIRY_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        alert('문의가 접수되었습니다.');
        closeInquiry();
      }

      inquiryOpen.addEventListener('click', openInquiry);
      inquiryClose.addEventListener('click', closeInquiry);
      document.querySelectorAll('.start-button').forEach((button) => {
        button.addEventListener('click', openInquiry);
      });
      document.querySelectorAll('[data-key] .inquiry-option').forEach((button) => {
        button.addEventListener('click', () => {
          const key = button.closest('[data-key]').dataset.key;
          inquiryState[key] = button.dataset.value;
          button.parentElement.querySelectorAll('.inquiry-option').forEach((item) => item.classList.remove('selected'));
          button.classList.add('selected');
          window.setTimeout(() => {
            inquiryStep = Math.min(inquiryStep + 1, 4);
            renderInquiry();
          }, 140);
        });
      });
      inquiryBack.addEventListener('click', () => {
        inquiryStep = Math.max(inquiryStep - 1, 0);
        renderInquiry();
      });
      inquiryNext.addEventListener('click', () => {
        if (!canMoveInquiryNext()) {
          alert('필수 정보를 입력해주세요.');
          return;
        }
        if (inquiryStep === 4) submitInquiry();
        else {
          inquiryStep += 1;
          renderInquiry();
        }
      });
      renderInquiry();

      render();
    </script>
  </body>
</html>
