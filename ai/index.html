        right: 0;

      }

      .desktop-pager {

        gap: 24px;
        color: rgba(0, 0, 0, 0.32);
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.08em;
      }
      .desktop-pager::before {
        content: "";
        height: 1px;
        flex: 1;
        background: rgba(0, 0, 0, 0.32);
      }
      .desktop-rail {
        position: relative;
        height: 100%;
        touch-action: pan-y;
        user-select: none;
      }

      }

        left: 50%;

        text-align: center;
      }

        position: relative;
        display: flex;
        aspect-ratio: 4 / 5.25;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        overflow: hidden;
        background:

        color: #fff;
      }
      .intro-card::before {
        content: "";
        position: absolute;
        inset: -20%;
        background: linear-gradient(110deg, transparent 18%, rgba(255,255,255,.28) 42%, transparent 62%);
        transform: translateX(-26%) rotate(8deg);
        filter: blur(14px);
        opacity: .72;

        position: relative;
        z-index: 1;
      }
      .intro-slide h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 56px;
        font-weight: 300;
        letter-spacing: -0.04em;
        line-height: 1;
      }

        font-size: 18px;
        font-weight: 300;
        line-height: 1.55;

        border-radius: 999px;
        padding: 15px 32px;
        color: #fff;
        font-size: 16px;
        font-weight: 650;
        transition: background 180ms ease, color 180ms ease;

      .start-button:hover {
        background: #fff;
        color: #000;
      }
      .desktop-card {
        cursor: grab;
      }
      .desktop-over-label {

        left: 50%;
        margin: 0;
        transform: translateX(-50%);

        margin: 0;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.26em;
        text-transform: uppercase;

        overflow: hidden;
        border-radius: 18px;
        background: #f3f3f3;
      }
      .desktop-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        user-select: none;
        pointer-events: none;
      }
      .mobile-main,
      .mobile-footer {
        display: none;
      }
      .menu-overlay {
        position: fixed;
        z-index: 60;
        inset: 0;
        display: none;

        letter-spacing: -0.05em;

        .mobile-logo-section {

          serviceType: 'B2B Narrative · Lead Content',
          period: '2026.02 - 2026.05',
          description: '스타트업 B2B 마케팅',
          results: '리드 3배',
          details: '기술 회사의 복잡한 가치 제안을 간단하고 설득력 있게 시각화.',
          interviews: [
            { question: '왜 Brand OS AI를 선택하게 되셨나요?', answer: '기술 설명을 고객의 언어로 바꾸는 일이 가장 어려웠습니다. 제품을 이해하면서도 시장 관점으로 정리해 줄 시스템이 필요했어요.' },
            { question: '그 전에는 어떤 문제가 있었나요?', answer: '기능 설명은 많았지만 왜 필요한지, 어떤 변화가 생기는지가 잘 드러나지 않았습니다.' },
            { question: '도입 후 가장 크게 달라진 점은 무엇인가요?', answer: '세일즈 자료와 콘텐츠가 같은 메시지를 공유하게 됐고, 문의의 질이 좋아졌습니다.' }
          ]
        }
      ];

      const introSlide = { type: 'intro', id: 'brand-os-ai', name: 'Brand OS AI' };
      const slides = [...cases.slice(0, 3), introSlide, ...cases.slice(3)];
      const totalSlides = slides.length;
      const desktopMain = document.getElementById('desktopMain');
      const desktopRail = document.getElementById('desktopRail');
      const mobileRail = document.getElementById('mobileRail');
      const desktopPager = document.getElementById('desktopPager');
      const mobilePager = document.getElementById('mobilePager');
      const menuOverlay = document.getElementById('menuOverlay');
      let currentIndex = 0;
      let dragX = 0;
      let isDragging = false;
      let wheelLocked = false;
      let pointerState = { startX: 0, startedAt: 0, moved: false, pointerId: null, card: null };

      slides.forEach((item) => {
        if (item.type === 'intro') {
          desktopRail.insertAdjacentHTML('beforeend', `
            <section class="intro-slide desktop-layer" data-slide-index="${slides.indexOf(item)}">
              <div class="intro-card">
                <p class="desktop-over-label" style="color: rgba(255,255,255,.72)">Brand OS AI</p>
                <h1>Brand OS AI</h1>
                <p>브랜드 운영을 위한 AI 에이전트</p>
                <button class="start-button">Get Started <span>→</span></button>
              </div>
            </section>
          `);
          mobileRail.insertAdjacentHTML('beforeend', `
            <section class="mobile-slide">
              <div class="mobile-label"><p>Brand OS AI</p></div>
              <div class="mobile-intro">
                <h1>Brand OS AI</h1>
                <p>브랜드 운영을 위한 AI 에이전트</p>
                <button class="start-button">Get Started <span>→</span></button>
              </div>
            </section>
          `);
          return;
        }

        const caseNumber = cases.findIndex((caseItem) => caseItem.name === item.name) + 1;
        desktopRail.insertAdjacentHTML('beforeend', `
          <article class="desktop-card desktop-layer" data-index="${caseNumber - 1}" data-slide-index="${slides.indexOf(item)}">
            <div class="desktop-image">
              <p class="desktop-over-label" style="color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,.38)">Case Study ${String(caseNumber).padStart(2, '0')}</p>
              <img src="${item.thumbnail}" alt="${item.name}" draggable="false" />
            </div>
          </article>
        `);
        mobileRail.insertAdjacentHTML('beforeend', `
          <article class="mobile-slide" data-index="${caseNumber - 1}">
            <div class="mobile-label"><p>Case Study ${String(caseNumber).padStart(2, '0')}</p></div>
            <div class="mobile-image">
              <img src="${item.thumbnail}" alt="${item.name}" draggable="false" />
            </div>
          </article>
        `);
      });

      function moveSlide(direction) {
        dragX = 0;
        isDragging = false;
        currentIndex = direction === 'next'
          ? Math.min(currentIndex + 1, totalSlides - 1)
          : Math.max(currentIndex - 1, 0);
        render();
      }

      function render() {
        desktopRail.style.setProperty('--active-index', currentIndex);
        desktopRail.style.setProperty('--drag-x', `${dragX}px`);
        mobileRail.style.setProperty('--active-index', currentIndex);
        mobileRail.style.setProperty('--drag-x', `${dragX}px`);
        desktopRail.classList.toggle('dragging', isDragging);
        mobileRail.classList.toggle('dragging', isDragging);
        desktopPager.textContent = `${currentIndex + 1} / ${totalSlides}`;
        mobilePager.innerHTML = `${currentIndex + 1}<em> / ${totalSlides}</em>`;

        desktopRail.querySelectorAll('.desktop-layer').forEach((card) => {
          const slideIndex = Number(card.dataset.slideIndex);
          const offset = slideIndex - currentIndex;
          const distance = clamp(Math.abs(offset), 0, 2);
          const isActive = offset === 0;
          const visible = Math.abs(offset) <= 2;
          const isLogo = card.classList.contains('logo-slide');
          card.style.opacity = visible ? (isLogo ? 1 : (isActive ? 1 : 0.42 - distance * 0.08)) : 0;
          card.style.filter = isLogo ? 'none' : (isActive ? 'blur(0px) saturate(1)' : `blur(${1.6 + distance * 0.9}px) saturate(.75)`);
          card.style.transform = isLogo
            ? `translateX(calc(-50% + ${offset * 64}%)) translateY(${36 + distance * 8}px) scale(.9)`
            : `translateX(calc(-50% + ${offset * 64}%)) translateY(${isActive ? 0 : 30 + distance * 10}px) scale(${isActive ? 1 : 0.93 - distance * 0.025})`;
          card.style.zIndex = isLogo ? 2 : (isActive ? 30 : 10 - distance);
          card.style.pointerEvents = visible ? 'auto' : 'none';
          card.style.transition = isDragging
            ? 'none'
            : `opacity 560ms ease, ${isLogo ? '' : 'filter 720ms ease, '}transform 920ms cubic-bezier(.19,1,.22,1)`;
        });

        mobileRail.querySelectorAll('.mobile-slide').forEach((card, index) => {
          const distance = clamp(Math.abs(index - currentIndex), 0, 2);
          card.style.opacity = index === currentIndex ? 1 : 0.78 - distance * 0.12;
          card.style.transform = `translateY(${index === currentIndex ? 0 : 34}px)`;
          card.style.transition = isDragging
            ? 'none'
            : 'opacity 420ms ease, transform 560ms cubic-bezier(.16,1,.3,1)';
        });
      }

      desktopMain.addEventListener('wheel', (event) => {
        if (window.innerWidth < 900 || wheelLocked || Math.abs(event.deltaY) < 24) return;
        wheelLocked = true;
        moveSlide(event.deltaY > 0 ? 'next' : 'prev');
        window.setTimeout(() => {
          wheelLocked = false;
        }, 980);
      }, { passive: true });

      function bindDrag(rail) {
        rail.addEventListener('pointerdown', (event) => {
          if (event.button > 0) return;
          pointerState = {
            startX: event.clientX,
            startedAt: performance.now(),
            moved: false,
            pointerId: event.pointerId,
            card: event.target.closest('[data-index]')
          };
          rail.setPointerCapture(event.pointerId);
          isDragging = true;
        });
        rail.addEventListener('pointermove', (event) => {
          if (!isDragging || pointerState.pointerId !== event.pointerId) return;
          const rawDistance = event.clientX - pointerState.startX;
          pointerState.moved = Math.abs(rawDistance) > 8;
          dragX = Math.sign(rawDistance) * Math.min(Math.abs(rawDistance), 260);
          render();
        });
        rail.addEventListener('pointerup', (event) => {
          if (!isDragging || pointerState.pointerId !== event.pointerId) return;
          const distance = event.clientX - pointerState.startX;
          const elapsed = Math.max(performance.now() - pointerState.startedAt, 1);
          const velocity = distance / elapsed;
          const shouldSwipe = Math.abs(distance) > 82 || Math.abs(velocity) > 0.42;
          rail.releasePointerCapture(event.pointerId);

          if (!pointerState.moved) {
            isDragging = false;
            dragX = 0;
            const card = pointerState.card || event.target.closest('[data-index]');
            if (card) openDetail(Number(card.dataset.index));
            render();
            return;
          }

          if (shouldSwipe) moveSlide(distance < 0 ? 'next' : 'prev');
          else {
            isDragging = false;
            dragX = 0;
            render();
          }
        });
        rail.addEventListener('pointercancel', () => {
          isDragging = false;
          dragX = 0;
          render();
        });
      }

      bindDrag(desktopRail);
      bindDrag(mobileRail);

      function openDetail(index) {
        window.location.href = `/ai/work/detail/index.html?case=${index + 1}`;
      }

      function closeDetail() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      document.getElementById('desktopHomeButton').addEventListener('click', () => {
        closeDetail();
        currentIndex = 0;
        render();
      });
      document.getElementById('mobileHomeButton').addEventListener('click', () => {
        closeDetail();
        currentIndex = 0;
        render();
      });
      document.getElementById('menuButton').addEventListener('click', () => menuOverlay.classList.add('open'));
      document.getElementById('closeMenuButton').addEventListener('click', () => menuOverlay.classList.remove('open'));
      document.querySelectorAll('.menu-list button').forEach((button) => {
        button.addEventListener('click', () => menuOverlay.classList.remove('open'));
      });

      render();
    </script>
  </body>
</html>
