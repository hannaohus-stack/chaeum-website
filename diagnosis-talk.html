<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 550px; width: 100%; padding: 40px 20px; }
        
        .hero { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 44px; font-weight: 300; margin-bottom: 12px; letter-spacing: -0.5px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.6; }
        
        .form-section { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 32px; 
            backdrop-filter: blur(10px);
        }
        
        .form-group { margin-bottom: 28px; }
        label { 
            display: block; 
            font-size: 12px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 600; 
            margin-bottom: 10px; 
        }
        .required { color: #FF6464; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        input::placeholder { 
            color: #666; 
        }
        input:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { 
            font-size: 11px; 
            color: #666; 
            margin-top: 6px; 
        }

        .analyzing {
            font-size: 11px;
            color: #64C8FF;
            margin-top: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .error { 
            background: rgba(255, 107, 107, 0.1); 
            color: #FF6B6B; 
            padding: 10px; 
            border-radius: 4px; 
            display: none; 
            font-size: 12px; 
            margin-bottom: 20px;
            border-left: 4px solid #FF6B6B;
            animation: slideDown 0.3s ease;
        }
        .success { 
            background: rgba(100, 200, 255, 0.1); 
            color: #64C8FF; 
            padding: 10px; 
            border-radius: 4px; 
            display: none; 
            font-size: 12px; 
            margin-bottom: 20px;
            border-left: 4px solid #64C8FF;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { 
                opacity: 0; 
                transform: translateY(-10px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        button:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }

        @media (max-width: 768px) {
            .container { padding: 30px 16px; }
            .form-section { padding: 24px; }
            h1 { font-size: 36px; }
            .hero { margin-bottom: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">웹사이트 URL만 입력하면<br>AI가 자동으로 분석합니다</p>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. URL -->
                <div class="form-group">
                    <label>웹사이트 <span class="required">*</span></label>
                    <input 
                        type="text"
                        id="brandUrl" 
                        placeholder="https://yoursite.com"
                        required>
                    <p class="hint">웹사이트 주소를 입력하세요</p>
                    <div class="analyzing" id="analyzing" style="display: none;">분석 중...</div>
                </div>

                <!-- 2. 이메일 -->
                <div class="form-group">
                    <label>이메일 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        required>
                    <p class="hint">리포트 수신용</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작</button>
            </div>
        </form>
    </div>

    <script>
        const brandUrlInput = document.getElementById('brandUrl');
        
        // URL focus 시 자동 https:// 추가
        brandUrlInput.addEventListener('focus', function() {
            if (!this.value) {
                this.value = 'https://';
                this.setSelectionRange(8, 8);
            }
        });

        // URL blur 시 자동 분석
        brandUrlInput.addEventListener('blur', async function() {
            const url = this.value.trim();
            
            if (!url.startsWith('http')) {
                return;
            }

            try {
                document.getElementById('analyzing').style.display = 'block';
                
                const response = await fetch(`/api/analyze?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (response.ok) {
                    console.log('URL 분석 완료:', data);
                    hideError();
                }
                
                document.getElementById('analyzing').style.display = 'none';
                
            } catch (error) {
                console.error('분석 오류:', error);
                document.getElementById('analyzing').style.display = 'none';
            }
        });

        // 폼 제출
        document.getElementById('diagnosisForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const brandUrl = document.getElementById('brandUrl').value.trim();
            const email = document.getElementById('email').value.trim();

            // 검증
            if (!brandUrl || !email) {
                showError('모든 항목을 입력해주세요');
                return;
            }

            if (!isValidUrl(brandUrl)) {
                showError('유효한 URL을 입력해주세요');
                return;
            }

            let finalUrl = brandUrl;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }

            document.getElementById('submitBtn').disabled = true;

            try {
                const analysisData = {
                    brandName: extractBrandName(finalUrl),
                    email,
                    website: finalUrl,
                    timestamp: new Date().toISOString()
                };

                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));
                
                showSuccess('분석 중입니다. 잠시만 기다려주세요...');

                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 1500);

            } catch (error) {
                console.error('오류:', error);
                showError('오류가 발생했습니다');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        function isValidUrl(url) {
            try {
                const testUrl = url.startsWith('http') ? url : 'https://' + url;
                new URL(testUrl);
                return true;
            } catch (error) {
                return false;
            }
        }

        function extractBrandName(url) {
            try {
                const domain = new URL(url).hostname;
                const domainName = domain.split('.')[0];
                
                if (/[가-힣]/.test(domainName)) {
                    return domainName;
                }
                
                return domainName.charAt(0).toUpperCase() + domainName.slice(1);
            } catch (error) {
                return 'Brand';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            
            setTimeout(() => {
                hideError();
            }, 3000);
        }

        function hideError() {
            const el = document.getElementById('error');
            el.style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
