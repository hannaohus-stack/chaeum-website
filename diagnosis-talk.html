<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 분석 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; min-height: 100vh; display: flex; align-items: center; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 36px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.6; }
        .form-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; margin-bottom: 30px; backdrop-filter: blur(10px); }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; font-size: 14px; margin-bottom: 20px; }
        input:focus { outline: none; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.12); }
        .hint { font-size: 12px; color: #666; margin-top: -16px; margin-bottom: 20px; }
        .input-tag { display: inline-block; background: rgba(74, 158, 255, 0.2); color: #4A9EFF; padding: 4px 12px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
        button { width: 100%; padding: 16px; background: white; color: #4B4545; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: none; text-align: center; }
        .spinner { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #FF6B6B; font-size: 13px; margin-top: 12px; }
        .steps { display: flex; justify-content: space-between; margin-top: 40px; font-size: 12px; color: #666; }
        .step { text-align: center; }
        .step-num { display: block; font-weight: 600; color: #888; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">URL 하나로 보는<br>당신의 브랜드 포지셔닝과 시스템 누수</p>
        </div>

        <form id="diagnosisForm">
            <div class="form-section">
                <label>인스타그램 또는 웹사이트</label>
                <input type="text" id="brandUrl" placeholder="@yourhandle 또는 https://yoursite.com" required>
                <p class="hint">분석을 위해 최신 콘텐츠를 수집합니다</p>

                <label>이메일 주소</label>
                <input type="email" id="email" placeholder="report@your-email.com" required>
                <p class="hint">상세 리포트를 이메일로 받을 주소</p>

                <label>가장 큰 고민은? <span class="input-tag">선택</span></label>
                <select id="pain" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; font-size: 14px; margin-bottom: 20px;">
                    <option value="">선택해주세요</option>
                    <option value="awareness">브랜드 인지도 저하</option>
                    <option value="conversion">전환율 부족</option>
                    <option value="message">메시지 혼란</option>
                    <option value="content">콘텐츠 전략 부재</option>
                </select>

                <button type="submit" id="submitBtn">분석 시작 (무료)</button>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="font-size: 13px; color: #888;">분석 중입니다...</p>
                </div>
                <div class="error" id="error"></div>
            </div>
        </form>

        <div class="steps">
            <div class="step">
                <span class="step-num">1</span>
                데이터 수집
            </div>
            <div class="step">
                <span class="step-num">2</span>
                AI 분석
            </div>
            <div class="step">
                <span class="step-num">3</span>
                리포트 생성
            </div>
            <div class="step">
                <span class="step-num">4</span>
                전략 제시
            </div>
        </div>
    </div>

    <script>
        document.getElementById('diagnosisForm').onsubmit = async (e) => {
            e.preventDefault();

            const brandUrl = document.getElementById('brandUrl').value;
            const email = document.getElementById('email').value;
            const pain = document.getElementById('pain').value;

            if (!pain) {
                document.getElementById('error').textContent = '고민을 선택해주세요';
                return;
            }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').textContent = '';

            try {
                const res = await fetch('/api/analyze-brand-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ brandUrl, email, pain })
                });

                if (!res.ok) throw new Error('분석 실패');

                const data = await res.json();
                
                localStorage.setItem('brandAnalysis', JSON.stringify(data));
                setTimeout(() => {
                    window.location.href = './brand-report.html';
                }, 1000);

            } catch (error) {
                console.error(error);
                document.getElementById('error').textContent = '분석 중 오류가 발생했습니다';
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>
