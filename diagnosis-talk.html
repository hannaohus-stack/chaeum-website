<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; width: 100%; padding: 40px 20px; }
        
        h1 { font-size: 36px; font-weight: 300; text-align: center; margin-bottom: 12px; }
        .subtitle { text-align: center; font-size: 14px; color: #aaa; margin-bottom: 50px; line-height: 1.6; }
        
        .form-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; }
        
        .form-group { margin-bottom: 28px; }
        label { display: block; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 10px; }
        .required { color: #FF6464; }
        
        input, textarea, select { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 80px; resize: vertical; }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { font-size: 12px; color: #666; margin-top: 6px; }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading { display: none; text-align: center; }
        .spinner { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 13px; color: #888; }
        
        .message { font-size: 13px; margin-top: 12px; padding: 12px; border-radius: 4px; display: none; }
        .error { background: rgba(255, 107, 107, 0.1); color: #FF6B6B; }
        .success { background: rgba(100, 200, 255, 0.1); color: #64C8FF; }
    </style>
</head>
<body>
    <div class="container">
        <h1>브랜드 진단</h1>
        <p class="subtitle">당신의 브랜드를 분석하는<br>AI 포지셔닝 & 시스템 누수 진단</p>

        <form id="diagnosisForm" style="display: block;">
            <div class="form-section">
                <div class="form-group">
                    <label>브랜드명 <span class="required">*</span></label>
                    <input type="text" id="brandName" placeholder="예: 케이알케이, 더데이" required>
                    <p class="hint">분석할 브랜드 이름</p>
                </div>

                <div class="form-group">
                    <label>서비스/제품 설명 <span class="required">*</span></label>
                    <textarea id="service" placeholder="예: 식품 라벨 생성 SaaS로 1인 창업자의 제품 런칭을 돕습니다" required></textarea>
                    <p class="hint">무엇을 팔고 있는지 구체적으로 설명</p>
                </div>

                <div class="form-group">
                    <label>타깃 고객 <span class="required">*</span></label>
                    <input type="text" id="target" placeholder="예: 30대 여성, 월 매출 1000만원 이상의 소상공인" required>
                    <p class="hint">누구에게 팔고 있는가</p>
                </div>

                <div class="form-group">
                    <label>웹사이트 URL <span class="required">*</span></label>
                    <input type="url" id="brandUrl" placeholder="https://example.com" required>
                    <p class="hint">브랜드 공식 웹사이트 또는 인스타그램 프로필</p>
                </div>

                <div class="form-group">
                    <label>가장 큰 고민 <span class="required">*</span></label>
                    <select id="pain" required>
                        <option value="">선택해주세요</option>
                        <option value="awareness">인지도 부족</option>
                        <option value="conversion">판매 전환 어려움</option>
                        <option value="message">메시지 혼란</option>
                        <option value="content">콘텐츠 전략 부재</option>
                        <option value="positioning">포지셔닝 불명확</option>
                    </select>
                    <p class="hint">가장 시급한 문제를 선택</p>
                </div>

                <div class="form-group">
                    <label>이메일 <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                    <p class="hint">상세 리포트를 받을 이메일</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작 (무료)</button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p class="loading-text">분석 중입니다...<br>약 3초 소요됩니다</p>
                </div>
                
                <div id="message" class="message"></div>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('diagnosisForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const brandName = document.getElementById('brandName').value.trim();
            const service = document.getElementById('service').value.trim();
            const target = document.getElementById('target').value.trim();
            const brandUrl = document.getElementById('brandUrl').value.trim();
            const pain = document.getElementById('pain').value;
            const email = document.getElementById('email').value.trim();

            // 검증
            if (!brandName || !service || !target || !brandUrl || !pain || !email) {
                showMessage('모든 필드를 입력해주세요', 'error');
                return;
            }

            // 로딩 시작
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            hideMessage();

            try {
                // 분석 데이터 생성
                const analysis = generateAnalysis(brandName, service, target, pain);
                
                // 데이터 저장
                const analysisData = {
                    name: brandName,
                    brandName: brandName,
                    service: service,
                    target: target,
                    email: email,
                    website: brandUrl,
                    consultation: pain,
                    analysis: analysis
                };

                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));

                // 성공 메시지
                showMessage('분석이 완료되었습니다! 리포트 페이지로 이동합니다...', 'success');

                // 1.5초 후 이동
                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 1500);

            } catch (error) {
                console.error('오류:', error);
                showMessage('오류가 발생했습니다. 다시 시도해주세요.', 'error');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });

        function generateAnalysis(brandName, service, target, pain) {
            let analysis = {
                critical_diagnosis: `"${brandName}"은(는) ${service}을(를) 제공하며, ${target}을(를) 타깃하고 있습니다. 현재 시장에서 명확한 위치를 확보하지 못하고 있습니다.`,
                summary_verdict: '',
                metrics: { message_clarity: 0, differentiation: 0, conversion_path: 0 },
                strategic_gaps: [],
                contentStructure: { product: 0, lifestyle: 0, story: 0 }
            };

            // 고민별 맞춤형 분석
            if (pain === 'awareness') {
                analysis.summary_verdict = '브랜드 인지도 부족 - 시장 진입 단계의 도전';
                analysis.metrics = { message_clarity: 48, differentiation: 35, conversion_path: 45 };
                analysis.contentStructure = { product: 72, lifestyle: 18, story: 10 };
                analysis.strategic_gaps = [
                    { problem: '포지셔닝 모호', impact: '경쟁사와 구분 불가' },
                    { problem: '마케팅 채널 약화', impact: '유입 부족' },
                    { problem: '브랜드 스토리 부재', impact: '팬덤 형성 불가' }
                ];
            } else if (pain === 'conversion') {
                analysis.summary_verdict = '유입은 있으나 판매 전환 저조';
                analysis.metrics = { message_clarity: 62, differentiation: 55, conversion_path: 38 };
                analysis.contentStructure = { product: 65, lifestyle: 25, story: 10 };
                analysis.strategic_gaps = [
                    { problem: '신뢰 증거 부재', impact: '구매 결정 단계 실패' },
                    { problem: '구매 경로 복잡', impact: 'CTA 불명확' },
                    { problem: '가격 정당화 부족', impact: '이탈 증가' }
                ];
            } else if (pain === 'message') {
                analysis.summary_verdict = '메시지 혼선 - 브랜드 정체성 불명확';
                analysis.metrics = { message_clarity: 38, differentiation: 42, conversion_path: 52 };
                analysis.contentStructure = { product: 55, lifestyle: 30, story: 15 };
                analysis.strategic_gaps = [
                    { problem: '핵심 메시지 산재', impact: '브랜드 정의 불가' },
                    { problem: '톤 일관성 부족', impact: '채널마다 다른 메시지' },
                    { problem: '포지셔닝 혼재', impact: '프리미엄/대중 모호' }
                ];
            } else if (pain === 'content') {
                analysis.summary_verdict = '콘텐츠 전략 부재 - 일관된 스토리 없음';
                analysis.metrics = { message_clarity: 55, differentiation: 48, conversion_path: 50 };
                analysis.contentStructure = { product: 78, lifestyle: 14, story: 8 };
                analysis.strategic_gaps = [
                    { problem: '제품 중심 콘텐츠', impact: '단기 매출만 집중' },
                    { problem: '스토리 시스템 부재', impact: '팬덤 형성 불가' },
                    { problem: '콘텐츠 칼렌더 부족', impact: '일관성 없음' }
                ];
            } else if (pain === 'positioning') {
                analysis.summary_verdict = '포지셔닝 불명확 - 차별점 모호';
                analysis.metrics = { message_clarity: 52, differentiation: 28, conversion_path: 48 };
                analysis.contentStructure = { product: 62, lifestyle: 22, story: 16 };
                analysis.strategic_gaps = [
                    { problem: '경쟁사와 구분 불가', impact: '선택 기준 모호' },
                    { problem: '시장 위치 미정의', impact: '프리미엄/대중 혼재' },
                    { problem: '독점적 가치 부재', impact: '선택 이유 약화' }
                ];
            }

            analysis.consulting_preview = `20분 상담에서는 "${brandName}"의 ${target}에 대한 심화 분석, 포지셔닝 전략, 3개월 로드맵을 제시합니다.`;
            analysis.total_score = Math.round((analysis.metrics.message_clarity + analysis.metrics.differentiation + analysis.metrics.conversion_path) / 3);

            return analysis;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
    </script>
</body>
</html>
