<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --bg: #4B4545;
        --white: #FFFDF7;
        --sub-text: rgba(255, 253, 247, 0.55);
        --border: rgba(255, 253, 247, 0.12);
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        background-color: var(--bg);
        color: var(--white);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* HEADER */
    .chat-header {
        background-color: rgba(75, 69, 69, 0.98);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 18px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
    }

    .header-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--white);
        opacity: 0.8;
    }

    .header-logo {
        font-size: 13px;
        letter-spacing: 2px;
        font-weight: 300;
        color: var(--white);
        text-decoration: none;
    }

    .header-label {
        font-size: 11px;
        letter-spacing: 1px;
        color: var(--sub-text);
    }

    .progress-bar {
        margin-left: auto;
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .progress-step {
        width: 24px; height: 2px;
        background: rgba(255, 253, 247, 0.2);
        border-radius: 2px;
        transition: background 0.4s;
    }

    .progress-step.done { background: var(--white); }

    /* MESSAGES */
    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 28px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 680px;
        width: 100%;
        margin: 0 auto;
    }

    .msg-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
        width: 30px; height: 30px;
        border-radius: 50%;
        background: rgba(255, 253, 247, 0.08);
        border: 1px solid rgba(255, 253, 247, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 9px;
        color: var(--white);
        font-weight: 500;
        letter-spacing: 0.5px;
    }

    .bubble {
        max-width: 76%;
        padding: 13px 17px;
        font-size: 14px;
        line-height: 1.75;
        white-space: pre-wrap;
    }

    .bubble.chaeum {
        background: rgba(255, 253, 247, 0.06);
        border: 1px solid rgba(255, 253, 247, 0.1);
        border-radius: 4px 18px 18px 18px;
        color: var(--white);
    }

    .bubble.user {
        background: var(--white);
        color: #4B4545;
        border-radius: 18px 18px 4px 18px;
    }

    /* TYPING */
    .typing-dots {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 14px 18px;
        background: rgba(255, 253, 247, 0.06);
        border: 1px solid rgba(255, 253, 247, 0.1);
        border-radius: 4px 18px 18px 18px;
    }

    .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: rgba(255, 253, 247, 0.5);
        animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-5px); }
    }

    /* INPUT AREA */
    .input-area {
        padding: 12px 16px 28px;
        max-width: 680px;
        width: 100%;
        margin: 0 auto;
        flex-shrink: 0;
    }

    .options {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .option-btn {
        background: rgba(255, 253, 247, 0.05);
        border: 1px solid rgba(255, 253, 247, 0.15);
        color: var(--white);
        padding: 13px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        text-align: left;
        letter-spacing: 0.3px;
        transition: all 0.2s;
        font-family: inherit;
    }

    .option-btn:hover {
        background: rgba(255, 253, 247, 0.1);
        border-color: rgba(255, 253, 247, 0.35);
    }

    .text-input-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
    }

    .text-input {
        flex: 1;
        background: rgba(255, 253, 247, 0.05);
        border: 1px solid rgba(255, 253, 247, 0.15);
        color: var(--white);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        outline: none;
        font-family: inherit;
    }

    .text-input::placeholder { color: var(--sub-text); }

    .send-btn {
        background: var(--white);
        color: #4B4545;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.85; }

    /* CTA */
    .cta-box {
        background: rgba(255, 253, 247, 0.05);
        border: 1px solid rgba(255, 253, 247, 0.15);
        border-radius: 16px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .cta-label {
        color: var(--sub-text);
        font-size: 12px;
        text-align: center;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }

    .cta-primary {
        display: block;
        background: var(--white);
        color: #4B4545;
        padding: 16px;
        border-radius: 10px;
        text-align: center;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: opacity 0.2s;
    }

    .cta-primary:hover { opacity: 0.85; }

    .cta-reset {
        background: transparent;
        border: 1px solid rgba(255, 253, 247, 0.2);
        color: var(--sub-text);
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        font-family: inherit;
        transition: all 0.2s;
    }

    .cta-reset:hover {
        border-color: rgba(255, 253, 247, 0.4);
        color: var(--white);
    }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,253,247,0.15); border-radius: 2px; }

    @media (max-width: 768px) {
        .bubble { max-width: 85%; font-size: 13px; }
        .option-btn { font-size: 12px; padding: 12px 16px; }
    }
</style>

</head>
<body>
<!-- HEADER -->
<div class="chat-header">
    <div class="header-dot"></div>
    <a href="./index.html" class="header-logo">CHAEUM</a>
    <span class="header-label">브랜드 진단</span>
    <div class="progress-bar" id="progressBar"></div>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages"></div>

<!-- INPUT AREA -->
<div class="input-area" id="inputArea"></div>

<script>
    const QUESTIONS = [
        {
            text: "안녕하세요. CHAEUM 브랜드 진단입니다.\n\n먼저 브랜드 업종을 알려주세요.",
            options: ["식음료 / 푸드", "뷰티 / 스킨케어", "라이프스타일", "패션 / 의류", "서비스업", "기타"]
        },
        {
            text: "현재 브랜드 운영 단계는 어디에 해당하나요?",
            options: ["아직 런칭 전", "런칭 후 1년 미만", "1~3년 운영 중", "3년 이상"]
        },
        {
            text: "현재 가장 큰 고민은 무엇인가요?",
            options: [
                "매출이 정체되어 있다",
                "재구매가 없고 신규 고객만 찾는다",
                "브랜드가 뭔지 모르겠다",
                "가격 경쟁에서 밀린다",
                "대표 없이는 브랜드가 멈춘다"
            ]
        },
        {
            text: "월 매출 규모는 어느 정도인가요?\n(편하게 선택해주세요, 정확하지 않아도 됩니다)",
            options: ["아직 매출 없음", "100만원 미만", "100~500만원", "500만~1500만원", "1500만원 이상"]
        },
        {
            text: "마지막으로, 지금 가장 원하는 것은 무엇인가요?",
            options: [
                "브랜드 방향을 명확히 잡고 싶다",
                "매출 구조를 바꾸고 싶다",
                "전문가의 시각으로 검토받고 싶다",
                "경쟁 브랜드와 차별화하고 싶다"
            ]
        }
    ];

    let step = 0;
    let answers = [];
    const messagesEl = document.getElementById('messages');
    const inputArea = document.getElementById('inputArea');
    const progressBar = document.getElementById('progressBar');

    // 진행 바 초기화
    function initProgress() {
        progressBar.innerHTML = '';
        QUESTIONS.forEach((_, i) => {
            const div = document.createElement('div');
            div.className = 'progress-step' + (i < step ? ' done' : '');
            div.id = `progress-${i}`;
            progressBar.appendChild(div);
        });
    }

    function updateProgress() {
        QUESTIONS.forEach((_, i) => {
            const el = document.getElementById(`progress-${i}`);
            if (el) el.className = 'progress-step' + (i < step ? ' done' : '');
        });
    }

    function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addUserBubble(text) {
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = `<div class="bubble user">${escapeHtml(text)}</div>`;
        messagesEl.appendChild(row);
        scrollBottom();
    }

    function addChaeumBubble(text) {
        const row = document.createElement('div');
        row.className = 'msg-row';
        const formatted = escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        row.innerHTML = `
            <div class="avatar">C</div>
            <div class="bubble chaeum">${formatted}</div>
        `;
        messagesEl.appendChild(row);
        scrollBottom();
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.id = 'typing';
        row.innerHTML = `
            <div class="avatar">C</div>
            <div class="typing-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        `;
        messagesEl.appendChild(row);
        scrollBottom();
    }

    function removeTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    function showOptions(options) {
        inputArea.innerHTML = `
            <div class="options" id="optionsList">
                ${options.map((opt, i) => `
                    <button class="option-btn" onclick="handleOption('${escapeAttr(opt)}')">${escapeHtml(opt)}</button>
                `).join('')}
                <div class="text-input-row">
                    <input class="text-input" id="textInput" placeholder="직접 입력..." onkeydown="if(event.key==='Enter') sendText()" />
                    <button class="send-btn" onclick="sendText()">전송</button>
                </div>
            </div>
        `;
    }

    function showCTA() {
        inputArea.innerHTML = `
            <div class="cta-box">
                <p class="cta-label">진단이 완료됐습니다</p>
                <a href="https://cal.com/chaeum" class="cta-primary">20분 무료 상담 예약하기 →</a>
                <button class="cta-reset" onclick="resetChat()">처음부터 다시 진단하기</button>
            </div>
        `;
    }

    function clearInput() {
        inputArea.innerHTML = '';
    }

    function handleOption(option) {
        answers.push(option);
        addUserBubble(option);
        clearInput();

        step++;
        updateProgress();

        if (step < QUESTIONS.length) {
            showTyping();
            setTimeout(() => {
                removeTyping();
                addChaeumBubble(QUESTIONS[step].text);
                showOptions(QUESTIONS[step].options);
            }, 900);
        } else {
            showTyping();
            setTimeout(() => {
                removeTyping();
                const issue = answers[2] || '';
                const goal = answers[4] || '';
                const resultText = `진단 결과를 정리했습니다.\n\n"${issue}" 상태의 브랜드에서 "${goal}"를 원하신다면, 이는 단순한 실행 문제가 아닌 **포지셔닝 구조**의 문제일 가능성이 높습니다.\n\nCHAEUM은 비슷한 상황의 브랜드를 여러 차례 진단하고 재설계한 경험이 있습니다.\n\n20분 무료 상담을 통해 구체적인 방향을 함께 찾아볼 수 있습니다.`;
                addChaeumBubble(resultText);
                showCTA();
            }, 1200);
        }
    }

    function sendText() {
        const input = document.getElementById('textInput');
        if (!input || !input.value.trim()) return;
        handleOption(input.value.trim());
    }

    function resetChat() {
        step = 0;
        answers = [];
        messagesEl.innerHTML = '';
        inputArea.innerHTML = '';
        updateProgress();
        setTimeout(() => {
            addChaeumBubble(QUESTIONS[0].text);
            showOptions(QUESTIONS[0].options);
        }, 400);
    }

    function escapeHtml(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/\n/g, '<br>');
    }

    function escapeAttr(str) {
        return String(str || '').replace(/'/g, "\\'");
    }

    // 초기화
    initProgress();
    setTimeout(() => {
        addChaeumBubble(QUESTIONS[0].text);
        showOptions(QUESTIONS[0].options);
    }, 400);
</script>

</body>
</html>
