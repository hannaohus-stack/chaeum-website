<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 550px; width: 100%; padding: 40px 20px; }
        
        .hero { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 44px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.6; }
        
        .form-section { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 32px; 
        }
        
        .form-group { margin-bottom: 24px; }
        label { 
            display: block; 
            font-size: 12px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 600; 
            margin-bottom: 10px; 
        }
        .required { color: #FF6464; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
        }
        input::placeholder { color: #666; }
        input:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { 
            font-size: 11px; 
            color: #666; 
            margin-top: 6px; 
        }

        .analyzing {
            font-size: 11px;
            color: #64C8FF;
            margin-top: 6px;
            display: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .error { 
            background: rgba(255, 107, 107, 0.1); 
            color: #FF6B6B; 
            padding: 10px; 
            border-radius: 4px; 
            display: none; 
            font-size: 12px; 
            margin-bottom: 20px;
            border-left: 4px solid #FF6B6B;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        button:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">웹사이트 URL을 입력하면<br>AI가 자동으로 분석합니다</p>
        </div>

        <div id="error" class="error"></div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. URL -->
                <div class="form-group">
                    <label>웹사이트 <span class="required">*</span></label>
                    <input 
                        type="text"
                        id="brandUrl" 
                        placeholder="https://example.com"
                        required>
                    <p class="hint">웹사이트 주소를 입력하세요</p>
                    <div class="analyzing" id="analyzing">분석 중...</div>
                </div>

                <!-- 2. 이메일 -->
                <div class="form-group">
                    <label>이메일 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        required>
                    <p class="hint">리포트 수신용</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작</button>
            </div>
        </form>
    </div>

    <script>
        const brandUrlInput = document.getElementById('brandUrl');
        let apiAnalysisData = null;
        
        // URL focus 시 자동 https:// 추가
        brandUrlInput.addEventListener('focus', function() {
            if (!this.value) {
                this.value = 'https://';
                this.setSelectionRange(8, 8);
            }
        });

        // URL blur 시 API 호출 (핵심 부분)
        brandUrlInput.addEventListener('blur', async function() {
            const url = this.value.trim();
            
            // https:// 형태일 때만 분석
            if (!url.startsWith('http')) {
                return;
            }

            try {
                document.getElementById('analyzing').style.display = 'block';
                
                console.log('API 호출 시작:', url);
                
                const response = await fetch(`/api/analyze?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                console.log('API 응답:', data);

                if (response.ok) {
                    // API 응답 데이터 저장
                    apiAnalysisData = data;
                    console.log('분석 완료:', apiAnalysisData);
                    hideError();
                } else {
                    console.warn('API 오류:', data.error);
                }
                
            } catch (error) {
                console.error('API 호출 오류:', error);
            } finally {
                document.getElementById('analyzing').style.display = 'none';
            }
        });

        // 폼 제출
        document.getElementById('diagnosisForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const brandUrl = document.getElementById('brandUrl').value.trim();
            const email = document.getElementById('email').value.trim();

            // 검증
            if (!brandUrl || !email) {
                showError('모든 항목을 입력해주세요');
                return;
            }

            if (!isValidUrl(brandUrl)) {
                showError('유효한 URL을 입력해주세요');
                return;
            }

            // API 분석이 완료되지 않았으면 기다리기
            if (!apiAnalysisData) {
                showError('URL 분석이 완료되지 않았습니다. 잠시 후 다시 시도해주세요.');
                return;
            }

            let finalUrl = brandUrl;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }

            document.getElementById('submitBtn').disabled = true;

            try {
                // API 분석 데이터 + 사용자 입력 합치기
                const analysisData = {
                    ...apiAnalysisData,  // API에서 받은 분석 데이터
                    email,
                    website: finalUrl,
                    timestamp: new Date().toISOString()
                };

                console.log('저장 데이터:', analysisData);

                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));
                
                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 1000);

            } catch (error) {
                console.error('오류:', error);
                showError('오류가 발생했습니다');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        function isValidUrl(url) {
            try {
                const testUrl = url.startsWith('http') ? url : 'https://' + url;
                new URL(testUrl);
                return true;
            } catch {
                return false;
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            const el = document.getElementById('error');
            el.style.display = 'none';
        }
    </script>
</body>
</html>
