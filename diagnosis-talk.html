<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>브랜드 진단 | CHAEUM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #4B4545;
      --surface: #524c4c;
      --white: #FFFDF7;
      --sub: rgba(255,253,247,0.62);
      --border: rgba(255,253,247,0.12);
      --user-bg: #FFFDF7;
      --user-color: #4B4545;
      --ai-bg: rgba(255,255,255,0.06);
      --danger: #ff7d7d;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%);
      color: var(--white);
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
    }

    .hero {
      flex-shrink: 0;
      padding: 12px 4px 18px;
    }

    .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--sub);
      margin-bottom: 10px;
      font-weight: 700;
    }

    h1 {
      font-size: 34px;
      font-weight: 300;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--white);
      transition: width 0.25s ease;
    }

    .progress-text {
      font-size: 12px;
      color: var(--sub);
      min-width: 56px;
      text-align: right;
    }

    .chat-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .chat-window {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      margin-bottom: 14px;
    }

    .message.ai {
      justify-content: flex-start;
    }

    .message.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 86%;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-line;
      word-break: break-word;
    }

    .message.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--white);
      border-top-left-radius: 6px;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-color);
      border-top-right-radius: 6px;
      font-weight: 500;
    }

    .interaction-area {
      flex-shrink: 0;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.08);
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 14px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      color: var(--white);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .chat-input::placeholder {
      color: rgba(255,255,255,0.35);
    }

    .chat-input:focus {
      border-color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.12);
    }

    .send-btn {
      padding: 0 18px;
      border: none;
      background: var(--white);
      color: #4B4545;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .button-grid {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      padding: 14px 14px;
      text-align: left;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: var(--white);
      font-size: 14px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .option-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.24);
    }

    .helper {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.6;
      margin-top: 10px;
    }

    .error {
      color: var(--danger);
      font-size: 12px;
      margin-top: 10px;
      line-height: 1.5;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--ai-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-top-left-radius: 6px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      animation: blink 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    @media (max-width: 768px) {
      .container {
        padding: 14px 12px;
      }

      h1 {
        font-size: 30px;
      }

      .chat-window {
        padding: 16px;
      }

      .interaction-area {
        padding: 12px;
      }

      .bubble {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="eyebrow">CHAEUM / AI Diagnosis</div>
      <h1>브랜드 진단</h1>
      <p class="subtitle">
        채움은 브랜드를 예쁘게 보지 않습니다.<br>
        돈이 흐르는 구조가 있는지 먼저 봅니다.
      </p>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressText" class="progress-text">0 / 5</div>
      </div>
    </div>

    <div class="chat-shell">
      <div id="chatWindow" class="chat-window"></div>

      <div class="interaction-area">
        <div id="inputWrapper">
          <div class="input-row">
            <input id="chatInput" class="chat-input" type="text" placeholder="답변을 입력하세요" />
            <button id="sendBtn" class="send-btn">전송</button>
          </div>
          <div id="helperText" class="helper"></div>
          <div id="errorText" class="error"></div>
        </div>

        <div id="buttonWrapper" class="button-grid" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    const chatWindow = document.getElementById('chatWindow');
    const inputWrapper = document.getElementById('inputWrapper');
    const buttonWrapper = document.getElementById('buttonWrapper');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const helperText = document.getElementById('helperText');
    const errorText = document.getElementById('errorText');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    const steps = [
      {
        key: 'website',
        msg: '먼저, 진단할 브랜드의 웹사이트 주소를 알려주세요.\n웹사이트가 없어도 괜찮습니다. 없으면 "없음"이라고 적어주세요.',
        type: 'text',
        placeholder: 'https://example.com 또는 없음',
        helper: '웹사이트가 있다면 URL을, 없다면 없음이라고 적어주세요.'
      },
      {
        key: 'brandDescription',
        msg: '당신의 브랜드를 한 문장으로 설명해 주세요.',
        type: 'text',
        placeholder: '예: 프리미엄 말차를 현대적으로 제안하는 라이프스타일 티 브랜드',
        helper: '무엇을 누구에게 어떤 방식으로 파는 브랜드인지 간단히 적어주세요.'
      },
      {
        key: 'targetCustomer',
        msg: '주요 고객은 어떤 사람들인가요?',
        type: 'text_or_skip',
        placeholder: '예: 30대 여성 직장인 / 소규모 브랜드 운영자',
        helper: '모르면 “모르겠습니다” 버튼을 눌러도 됩니다.'
      },
      {
        key: 'mainProduct',
        msg: '대표 제품 또는 서비스는 무엇인가요?',
        type: 'text_or_skip',
        placeholder: '예: 브랜드 컨설팅 / 저당 그래놀라 / 말차 클래스',
        helper: '현재 가장 대표적인 제품 또는 서비스를 적어주세요.'
      },
      {
        key: 'mainProblem',
        msg: '현재 브랜드의 가장 큰 고민은 무엇인가요?',
        type: 'select',
        options: [
          { label: '브랜드 메시지가 약함', value: 'messaging' },
          { label: '고객 유입이 부족함', value: 'traffic' },
          { label: '전환율이 낮음', value: 'conversion' },
          { label: '포지셔닝이 불명확함', value: 'positioning' },
          { label: '장기 성장 구조가 없음', value: 'growth' }
        ],
        helper: '지금 가장 먼저 해결하고 싶은 문제를 선택하세요.'
      }
    ];

    let currentStep = 0;
    let userData = {};

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function renderMessage(sender, text, isHtml = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble[isHtml ? 'innerHTML' : 'textContent'] = text;

      msgDiv.appendChild(bubble);
      chatWindow.appendChild(msgDiv);
      scrollToBottom();
    }

    function renderUserMessage(text) {
      renderMessage('user', text);
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'message ai';
      wrap.id = 'typingRow';
      wrap.innerHTML = `
        <div class="typing">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      `;
      chatWindow.appendChild(wrap);
      scrollToBottom();
    }

    function removeTyping() {
      const typingRow = document.getElementById('typingRow');
      if (typingRow) typingRow.remove();
    }

    function updateProgress() {
      const total = steps.length;
      const completed = Math.min(currentStep, total);
      const percent = (completed / total) * 100;
      progressFill.style.width = `${percent}%`;
      progressText.textContent = `${completed} / ${total}`;
    }

    function clearError() {
      errorText.textContent = '';
    }

    function setError(message) {
      errorText.textContent = message;
    }

    function showInput(placeholder, helper, allowSkip = false) {
      inputWrapper.style.display = 'block';
      buttonWrapper.style.display = allowSkip ? 'grid' : 'none';
      chatInput.value = '';
      chatInput.placeholder = placeholder || '답변을 입력하세요';
      helperText.textContent = helper || '';
      clearError();

      if (allowSkip) {
        buttonWrapper.innerHTML = `<button class="option-btn" id="skipBtn">모르겠습니다</button>`;
        document.getElementById('skipBtn').addEventListener('click', () => {
          handleTextStep('모르겠습니다');
        });
      } else {
        buttonWrapper.innerHTML = '';
      }

      setTimeout(() => chatInput.focus(), 50);
    }

    function showButtons(options, helper) {
      inputWrapper.style.display = 'none';
      buttonWrapper.style.display = 'grid';
      helperText.textContent = helper || '';
      clearError();

      buttonWrapper.innerHTML = options.map(
        opt => `<button class="option-btn" data-value="${opt.value}">${opt.label}</button>`
      ).join('');

      [...buttonWrapper.querySelectorAll('.option-btn')].forEach(btn => {
        btn.addEventListener('click', () => {
          const value = btn.getAttribute('data-value');
          const label = btn.textContent;
          handleSelectStep(value, label);
        });
      });
    }

    async function nextStep() {
      updateProgress();

      if (currentStep >= steps.length) {
        await finishDiagnosis();
        return;
      }

      const step = steps[currentStep];

      showTyping();
      await wait(450);
      removeTyping();

      renderMessage('ai', step.msg);

      if (step.type === 'text') {
        showInput(step.placeholder, step.helper, false);
      } else if (step.type === 'text_or_skip') {
        showInput(step.placeholder, step.helper, true);
      } else if (step.type === 'select') {
        showButtons(step.options, step.helper);
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function normalizeUrl(url) {
      if (!url || url === '없음') return '';
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        return 'https://' + url;
      }
      return url;
    }

    function isValidUrl(url) {
      if (!url) return true;
      try {
        new URL(normalizeUrl(url));
        return true;
      } catch {
        return false;
      }
    }

    function handleTextStep(value) {
      clearError();
      const step = steps[currentStep];
      const trimmed = value.trim();

      if (!trimmed) {
        setError('답변을 입력해주세요.');
        return;
      }

      if (step.key === 'website') {
        const websiteValue = trimmed === '없음' ? '' : trimmed;
        if (websiteValue && !isValidUrl(websiteValue)) {
          setError('유효한 URL 형식이 아닙니다. 웹사이트가 없으면 "없음"이라고 입력해주세요.');
          return;
        }
        userData[step.key] = normalizeUrl(websiteValue);
      } else {
        userData[step.key] = trimmed;
      }

      renderUserMessage(trimmed);
      currentStep += 1;
      nextStep();
    }

    function handleSelectStep(value, label) {
      clearError();
      const step = steps[currentStep];
      userData[step.key] = value;
      userData[`${step.key}Label`] = label;

      renderUserMessage(label);
      currentStep += 1;
      nextStep();
    }

    function buildTalkResultHtml(data) {
      return `
        <strong>현재 가장 큰 병목은 '${escapeHtml(data.bottleneckLabel)}'입니다.</strong><br><br>
        ${escapeHtml(data.shortSummary)}<br><br>
        이 경우 보통 다음 문제가 발생합니다.<br><br>
        • 마케팅을 해도 매출이 안정적으로 쌓이지 않습니다.<br>
        • 대표자 의존도가 계속 높아집니다.<br>
        • 브랜드보다 상품 중심 판매로 흘러갈 가능성이 큽니다.<br><br>
        즉 문제는 단순한 디자인이나 홍보가 아니라 <strong>'돈이 흐르는 구조'</strong>입니다.<br><br>
        채움은 브랜드를 디자인하지 않습니다.<br>
        <strong>제품 → 고객 → 구매 → 반복매출</strong>이 연결되는 구조를 설계합니다.
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function finishDiagnosis() {
      progressFill.style.width = '100%';
      progressText.textContent = `${steps.length} / ${steps.length}`;

      inputWrapper.style.display = 'none';
      buttonWrapper.style.display = 'none';
      helperText.textContent = '';
      clearError();

      showTyping();
      await wait(700);
      removeTyping();
      renderMessage('ai', '입력하신 내용을 바탕으로 구조를 정리하고 있습니다.');

      showTyping();
      await wait(1200);
      removeTyping();

      try {
        const payload = {
          website: userData.website || '',
          brandDescription: userData.brandDescription || '',
          targetCustomer: userData.targetCustomer || '',
          mainProduct: userData.mainProduct || '',
          mainProblem: userData.mainProblem || '',
          mainProblemLabel: userData.mainProblemLabel || ''
        };

        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const reportData = await response.json();

        if (!response.ok) {
          throw new Error(reportData.error || '분석에 실패했습니다.');
        }

        localStorage.setItem('diagnosisData', JSON.stringify(reportData));

        renderMessage('ai', buildTalkResultHtml(reportData), true);
        renderMessage('ai', '이 브랜드에 맞는 더 자세한 구조 분석을 보시겠습니까?');

        buttonWrapper.style.display = 'grid';
        buttonWrapper.innerHTML = `
          <button class="option-btn" id="viewReportBtn">전체 분석 리포트 보기</button>
          <button class="option-btn" id="restartBtn">처음부터 다시 하기</button>
        `;

        document.getElementById('viewReportBtn').addEventListener('click', () => {
          window.location.href = './report.html';
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
          localStorage.removeItem('diagnosisData');
          location.reload();
        });
      } catch (error) {
        console.error(error);
        renderMessage('ai', '분석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        buttonWrapper.style.display = 'grid';
        buttonWrapper.innerHTML = `<button class="option-btn" id="restartBtn">처음부터 다시 하기</button>`;
        document.getElementById('restartBtn').addEventListener('click', () => location.reload());
      }
    }

    sendBtn.addEventListener('click', () => {
      const step = steps[currentStep];
      if (!step) return;
      if (step.type === 'text' || step.type === 'text_or_skip') {
        handleTextStep(chatInput.value);
      }
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const step = steps[currentStep];
        if (step && (step.type === 'text' || step.type === 'text_or_skip')) {
          e.preventDefault();
          handleTextStep(chatInput.value);
        }
      }
    });

    nextStep();
  </script>
</body>
</html>
