<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #4B4545;
            color: #FFFFFF;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 80px 40px; }
        h1 { font-size: 32px; margin-bottom: 20px; font-weight: 300; }
        .subtitle { color: #888888; margin-bottom: 40px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background-color: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: rgba(255,255,255,0.3);
            background-color: rgba(255,255,255,0.12);
        }
        .char-count { font-size: 12px; color: #888888; margin-top: 4px; }
        .char-count.good { color: #64C8FF; }
        button {
            width: 100%;
            padding: 14px;
            background-color: white;
            color: #4B4545;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #FF6464; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 AI 브랜드 진단</h1>
        <p class="subtitle">당신의 브랜드 고민을 분석해드립니다</p>

        <form id="form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label>이름 *</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>브랜드명 *</label>
                <input type="text" id="brandName" required>
            </div>

            <div class="form-group">
                <label>월 매출 규모</label>
                <select id="revenueScale">
                    <option value="">선택</option>
                    <option value="1M-5M">100만-500만원</option>
                    <option value="5M-20M">500만-2000만원</option>
                    <option value="20M-50M">2000만-5000만원</option>
                    <option value="50M+">5000만원+</option>
                </select>
            </div>

            <div class="form-group">
                <label>이메일 *</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>가장 큰 고민은? *</label>
                <textarea id="consultation" placeholder="50자 이상 작성해주세요" required onchange="updateCount()" onkeyup="updateCount()"></textarea>
                <div class="char-count" id="charCount">0자 (최소 50자)</div>
            </div>

            <button type="submit" id="btn">AI 분석하기</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>분석 중...</p>
            </div>
            <div class="error" id="error"></div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://ioosdkkienxatupowgxi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EGj8-Rc7qI_xQEGWddL5fg_kLgVilMn';

        function updateCount() {
            const text = document.getElementById('consultation').value;
            const count = text.length;
            const el = document.getElementById('charCount');
            el.textContent = count + '자 (최소 50자)';
            if (count >= 50) {
                el.classList.add('good');
            } else {
                el.classList.remove('good');
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const name = document.getElementById('name').value;
            const brandName = document.getElementById('brandName').value;
            const email = document.getElementById('email').value;
            const revenueScale = document.getElementById('revenueScale').value;
            const consultation = document.getElementById('consultation').value;

            if (consultation.length < 50) {
                document.getElementById('error').textContent = '고민을 50자 이상 입력하세요';
                return;
            }

            document.getElementById('btn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').textContent = '';

            try {
                let diagnosis = '';

                // API 호출 시도
                try {
                    const res = await fetch('/api/analyze-diagnosis', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, brandName, consultation, revenueScale, email })
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        diagnosis = data.diagnosis;
                    } else {
                        diagnosis = getDefaultDiagnosis(brandName);
                    }
                } catch (e) {
                    console.warn('API 실패, 기본값 사용:', e);
                    diagnosis = getDefaultDiagnosis(brandName);
                }

                // Supabase 저장
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/diagnosis_submissions`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_KEY,
                        },
                        body: JSON.stringify({
                            name,
                            brand_name: brandName,
                            revenue_scale: revenueScale,
                            email,
                            consultation,
                            diagnosis,
                            status: 'new'
                        })
                    });
                } catch (e) {
                    console.warn('Supabase 저장 실패:', e);
                }

                // 데이터 저장 및 이동
                sessionStorage.setItem('diagnosisData', JSON.stringify({
                    name, brandName, email, consultation, diagnosis
                }));

                window.location.href = './diagnosis-report.html';

            } catch (error) {
                console.error('에러:', error);
                document.getElementById('error').textContent = '처리 중 오류가 발생했습니다';
                document.getElementById('btn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function getDefaultDiagnosis(brandName) {
            return `**1. 핵심 문제 진단:**
"${brandName}"의 핵심 이슈는 시장에서의 명확한 포지셔닝 부재입니다. 좋은 제품이 있지만 고객들이 그 가치를 인식하지 못하고 있습니다.

**2. 전략적 병목 구간:**
- 브랜드 포지셔닝 부재
- 타겟 고객 정의 불명확
- 신뢰도 기반 미흡

**3. 채움이 제안하는 방향:**
1단계: 정확한 포지셔닝 수립
2단계: 신뢰도 높은 메시지 개발
3단계: 채널별 실행
4단계: 데이터 기반 개선

**4. 20분 무료 상담 가이드:**
고객 인식도 분석, 차별점 정의, 매출 목표 설정, 맞춤형 전략 제시`;
        }
    </script>
</body>
</html>
