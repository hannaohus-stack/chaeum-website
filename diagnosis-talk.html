<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 550px; width: 100%; padding: 40px 20px; }
        
        .hero { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 44px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.6; }
        
        .form-section { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 32px; 
        }
        
        .form-group { margin-bottom: 24px; }
        label { 
            display: block; 
            font-size: 12px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 600; 
            margin-bottom: 10px; 
        }
        .required { color: #FF6464; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
        }
        input::placeholder { color: #666; }
        input:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { font-size: 11px; color: #666; margin-top: 6px; }
        
        .analyzing { 
            font-size: 11px; 
            color: #64C8FF; 
            margin-top: 6px;
            display: none;
        }

        .analyzing-list {
            display: none;
            background: rgba(100, 200, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
        }

        .analyzing-list.active {
            display: block;
        }

        .analyzing-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            color: #64C8FF;
        }

        .analyzing-item:last-child {
            margin-bottom: 0;
        }

        .spinner {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #64C8FF;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        .error { 
            background: rgba(255, 107, 107, 0.1); 
            color: #FF6B6B; 
            padding: 10px; 
            border-radius: 4px; 
            display: none; 
            font-size: 12px; 
            margin-bottom: 20px;
            border-left: 4px solid #FF6B6B;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">AI가 당신의 브랜드를<br>깊이 있게 분석합니다</p>
        </div>

        <div id="error" class="error"></div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. URL -->
                <div class="form-group">
                    <label>웹사이트 <span class="required">*</span></label>
                    <input 
                        type="text"
                        id="website" 
                        placeholder="https://example.com"
                        required>
                    <p class="hint">웹사이트 주소를 입력하세요</p>
                    <div class="analyzing" id="analyzing">분석 중...</div>
                    <div class="analyzing-list" id="analyzingList">
                        <div class="analyzing-item">
                            <div class="spinner"></div>
                            <span>브랜드 메시지 분석 중</span>
                        </div>
                        <div class="analyzing-item">
                            <div class="spinner" style="animation-delay: 0.3s;"></div>
                            <span>포지셔닝 구조 분석 중</span>
                        </div>
                        <div class="analyzing-item">
                            <div class="spinner" style="animation-delay: 0.6s;"></div>
                            <span>고객 문제 인식 분석 중</span>
                        </div>
                    </div>
                </div>

                <!-- 2. 이메일 -->
                <div class="form-group">
                    <label>이메일 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        required>
                    <p class="hint">리포트 수신용</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작</button>
            </div>
        </form>
    </div>

    <script>
        const websiteInput = document.getElementById('website');
        let analysisData = null;
        
        websiteInput.addEventListener('focus', function() {
            if (!this.value) {
                this.value = 'https://';
                this.setSelectionRange(8, 8);
            }
        });

        websiteInput.addEventListener('blur', async function() {
            const url = this.value.trim();
            
            if (!url.startsWith('http')) return;

            try {
                document.getElementById('analyzing').style.display = 'block';
                document.getElementById('analyzingList').classList.add('active');
                
                analysisData = await analyzeWebsite(url);
                
                console.log('✅ 분석 완료:', analysisData);
                
            } catch (error) {
                console.error('분석 오류:', error);
            } finally {
                document.getElementById('analyzing').style.display = 'none';
                document.getElementById('analyzingList').classList.remove('active');
            }
        });

        document.getElementById('diagnosisForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const website = document.getElementById('website').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!website || !email) {
                showError('모든 항목을 입력해주세요');
                return;
            }

            if (!isValidUrl(website)) {
                showError('유효한 URL을 입력해주세요');
                return;
            }

            if (!analysisData) {
                showError('URL 분석이 완료되지 않았습니다. 잠시 후 다시 시도하세요.');
                return;
            }

            let finalUrl = website;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }

            document.getElementById('submitBtn').disabled = true;

            try {
                const finalData = {
                    ...analysisData,
                    website: finalUrl,
                    email: email,
                    timestamp: new Date().toISOString()
                };

                console.log('저장할 데이터:', finalData);
                localStorage.setItem('diagnosisData', JSON.stringify(finalData));
                
                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 800);

            } catch (error) {
                console.error('오류:', error);
                showError('오류가 발생했습니다');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        async function analyzeWebsite(url) {
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!response.ok) {
                    console.warn('분석 실패:', data.error);
                    return {
                        brandName: extractBrandName(url),
                        serviceType: 'default',
                        service: '⚠️ 웹사이트 분석에 실패했습니다.',
                        painPoint: '기술적 오류로 인해 분석을 완료하지 못했습니다.',
                        currentMessaging: '분석 중...',
                        extractedData: {},
                        diagnosis: { positioningScore: 0, messagingScore: 0, conversionScore: 0 },
                        growthPotential: '분석 불가',
                        funnelStrategy: [],
                        strategyRecommendations: []
                    };
                }

                console.log('✅ API 분석 완료:', data);
                return data;

            } catch (error) {
                console.error('API 호출 오류:', error);
                return {
                    brandName: extractBrandName(url),
                    serviceType: 'default',
                    service: '⚠️ 분석 엔진에 연결할 수 없습니다.',
                    painPoint: '네트워크 오류가 발생했습니다.',
                    currentMessaging: '분석 불가',
                    extractedData: {},
                    diagnosis: { positioningScore: 0, messagingScore: 0, conversionScore: 0 },
                    growthPotential: '분석 불가',
                    funnelStrategy: [],
                    strategyRecommendations: []
                };
            }
        }

        function extractBrandName(url) {
            try {
                const domain = new URL(url.startsWith('http') ? url : 'https://' + url).hostname;
                const name = domain.split('.')[0];
                return name.charAt(0).toUpperCase() + name.slice(1);
            } catch {
                return 'Brand';
            }
        }

        function isValidUrl(url) {
            try {
                const testUrl = url.startsWith('http') ? url : 'https://' + url;
                new URL(testUrl);
                return true;
            } catch {
                return false;
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
