<div class="container">
    <div class="hero">
        <h1>브랜드 진단</h1>
        <p class="subtitle">URL만 입력하면 AI가 실시간으로 분석하여<br>브랜드 전략 리포트를 생성합니다</p>
    </div>

    <form id="diagnosisForm">
        <div class="form-section">
            <div class="form-group">
                <label>🔗 분석할 웹사이트 또는 인스타그램 <span class="required">*</span></label>
                <input type="url" id="brandUrl" placeholder="https://yoursite.com" required>
                <p class="hint">URL을 입력하면 AI가 정보를 수집합니다</p>
            </div>

            <div id="aiDiscoverySection" style="display:none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1);">
                <div class="form-group">
                    <label>📝 AI가 파악한 서비스 설명</label>
                    <textarea id="service" placeholder="URL 입력 시 자동으로 채워집니다."></textarea>
                </div>
                <div class="form-group" style="display:none;"> <input type="hidden" id="painPoint">
                    <input type="hidden" id="currentMessaging">
                </div>
            </div>

            <div class="form-group">
                <label>📧 리포트 받을 이메일 <span class="required">*</span></label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <button type="submit" id="submitBtn">AI 리포트 생성 시작</button>
        </div>
    </form>
</div>

<script>
    const brandUrlInput = document.getElementById('brandUrl');
    const serviceInput = document.getElementById('service');
    const aiSection = document.getElementById('aiDiscoverySection');

    // URL 입력이 끝나면(focus out) 자동으로 분석 호출
    brandUrlInput.addEventListener('blur', async () => {
        const url = brandUrlInput.value.trim();
        if (url.length < 10) return;

        // 로딩 상태 표시
        serviceInput.placeholder = "AI가 웹사이트를 읽어오는 중입니다...";
        aiSection.style.display = 'block';

        try {
            // 실제 배포 시에는 작성한 Vercel API 주소로 연결
            const response = await fetch(`/api/analyze?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data) {
                // AI가 긁어온 정보로 자동 채우기
                serviceInput.value = data.service || '';
                document.getElementById('painPoint').value = data.painPoint || '';
                document.getElementById('currentMessaging').value = data.currentMessaging || '';
                showSuccess('브랜드 정보를 성공적으로 가져왔습니다.');
            }
        } catch (error) {
            serviceInput.placeholder = "자동 분석에 실패했습니다. 직접 간략히 적어주세요.";
            console.error("분석 오류:", error);
        }
    });

    // 폼 제출 로직 (기존과 동일하되 데이터 수집 방식 최적화)
    document.getElementById('diagnosisForm').addEventListener('submit', (e) => {
        e.preventDefault();
        // ... (localStorage 저장 및 리포트 이동 로직)
    });
</script>
