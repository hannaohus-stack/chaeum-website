<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>브랜드 진단 | CHAEUM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg: #4B4545;
    --white: #FFFDF7;
    --sub: rgba(255,253,247,0.62);
    --border: rgba(255,253,247,0.12);
    --user-bg: #FFFDF7;
    --user-color: #4B4545;
    --ai-bg: rgba(255,255,255,0.06);
    --danger: #ff8a8a;
}
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #4B4545 0%, #2e2929 100%);
    color: var(--white);
    display: flex;
    flex-direction: column;
}
.container {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 16px;
}

/* HERO */
.hero { flex-shrink: 0; padding: 10px 4px 16px; }
.eyebrow {
font-size: 11px;
text-transform: uppercase;
letter-spacing: 0.18em;
color: var(–sub);
margin-bottom: 8px;
font-weight: 600;
}
h1 { font-size: 30px; font-weight: 300; letter-spacing: -0.03em; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: var(–sub); line-height: 1.6; margin-bottom: 14px; }

.progress-wrap { display: flex; align-items: center; gap: 12px; }
.progress-bar {
flex: 1; height: 4px;
background: rgba(255,255,255,0.1);
border-radius: 999px; overflow: hidden;
}
.progress-fill {
height: 100%; width: 0%;
background: var(–white);
transition: width 0.3s ease;
}
.progress-text { font-size: 12px; color: var(–sub); min-width: 48px; text-align: right; }

/* CHAT SHELL */
.chat-shell {
flex: 1; min-height: 0;
display: flex; flex-direction: column;
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
border-radius: 18px;
overflow: hidden;
backdrop-filter: blur(8px);
}

.chat-window {
flex: 1; min-height: 0;
overflow-y: auto;
padding: 20px;
scroll-behavior: smooth;
display: flex;
flex-direction: column;
gap: 12px;
}
.chat-window::-webkit-scrollbar { width: 3px; }
.chat-window::-webkit-scrollbar-thumb { background: rgba(255,253,247,0.15); border-radius: 2px; }

/* MESSAGES */
.message { display: flex; animation: fadeUp 0.25s ease; }
.message.ai { justify-content: flex-start; }
.message.user { justify-content: flex-end; }
@keyframes fadeUp {
from { opacity: 0; transform: translateY(6px); }
to { opacity: 1; transform: translateY(0); }
}
.bubble {
max-width: 85%;
padding: 13px 16px;
border-radius: 16px;
font-size: 14px;
line-height: 1.75;
white-space: pre-line;
word-break: break-word;
}
.message.ai .bubble {
background: var(–ai-bg);
border: 1px solid rgba(255,255,255,0.09);
color: var(–white);
border-top-left-radius: 5px;
}
.message.user .bubble {
background: var(–user-bg);
color: var(–user-color);
border-top-right-radius: 5px;
font-weight: 500;
font-size: 13px;
}

/* TYPING */
.typing-indicator {
display: inline-flex; align-items: center; gap: 5px;
padding: 12px 16px;
background: var(–ai-bg);
border: 1px solid rgba(255,255,255,0.09);
border-radius: 16px; border-top-left-radius: 5px;
}
.tdot {
width: 6px; height: 6px; border-radius: 50%;
background: rgba(255,255,255,0.7);
animation: blink 1.2s infinite;
}
.tdot:nth-child(2) { animation-delay: 0.15s; }
.tdot:nth-child(3) { animation-delay: 0.3s; }
@keyframes blink {
0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
40% { opacity: 1; transform: translateY(-2px); }
}

/* INTERACTION AREA */
.interaction-area {
flex-shrink: 0;
padding: 14px 16px;
border-top: 1px solid var(–border);
background: rgba(0,0,0,0.1);
}
.input-row { display: flex; gap: 8px; }
.chat-input {
flex: 1;
padding: 13px 14px;
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.14);
border-radius: 12px;
color: var(–white);
font-size: 14px;
font-family: inherit;
outline: none;
transition: all 0.2s;
}
.chat-input::placeholder { color: rgba(255,255,255,0.3); }
.chat-input:focus {
border-color: rgba(255,255,255,0.3);
background: rgba(255,255,255,0.11);
}
.send-btn {
padding: 0 18px;
border: none;
background: var(–white);
color: #4B4545;
border-radius: 12px;
font-weight: 700;
font-size: 14px;
cursor: pointer;
transition: opacity 0.2s;
font-family: inherit;
}
.send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.send-btn:hover:not(:disabled) { opacity: 0.88; }

.btn-grid { display: grid; gap: 8px; }
.opt-btn {
width: 100%;
padding: 13px 14px;
text-align: left;
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.12);
border-radius: 12px;
color: var(–white);
font-size: 14px;
cursor: pointer;
transition: all 0.18s;
font-family: inherit;
line-height: 1.4;
}
.opt-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.24); }

.helper-text { font-size: 12px; color: var(–sub); margin-top: 8px; line-height: 1.6; }
.error-text { font-size: 12px; color: var(–danger); margin-top: 8px; line-height: 1.5; }

@media (max-width: 500px) {
.container { padding: 14px 12px 12px; }
h1 { font-size: 26px; }
.bubble { max-width: 90%; font-size: 13px; }
.opt-btn { font-size: 13px; }
}
</style>

</head>
<body>
<div class="container">
    <div class="hero">
        <div class="eyebrow">CHAEUM · 브랜드 진단</div>
        <h1>브랜드 구조 진단</h1>
        <p class="subtitle">채움은 브랜드를 예쁘게 보지 않습니다.<br>돈이 흐르는 구조가 있는지 먼저 봅니다.</p>
        <div class="progress-wrap">
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div id="progressText" class="progress-text">0 / 5</div>
        </div>
    </div>

```
<div class="chat-shell">
    <div id="chatWindow" class="chat-window"></div>
    <div class="interaction-area">
        <div id="inputWrapper">
            <div class="input-row">
                <input id="chatInput" class="chat-input" type="text" placeholder="답변을 입력하세요" />
                <button id="sendBtn" class="send-btn">전송</button>
            </div>
            <div id="helperText" class="helper-text"></div>
            <div id="errorText" class="error-text"></div>
        </div>
        <div id="buttonWrapper" class="btn-grid" style="display:none;"></div>
    </div>
</div>
```

</div>

<script>
const chatWindow = document.getElementById('chatWindow');
const inputWrapper = document.getElementById('inputWrapper');
const buttonWrapper = document.getElementById('buttonWrapper');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const helperText = document.getElementById('helperText');
const errorText = document.getElementById('errorText');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');

const steps = [
    {
        key: 'website',
        msg: '먼저, 진단할 브랜드의 웹사이트 주소를 알려주세요.\n웹사이트가 없어도 괜찮습니다. 없으면 "없음"이라고 적어주세요.',
        type: 'text',
        placeholder: 'https://example.com 또는 없음',
        helper: '웹사이트가 있다면 URL을, 없다면 없음이라고 적어주세요.'
    },
    {
        key: 'brandDescription',
        msg: '당신의 브랜드를 한 문장으로 설명해 주세요.',
        type: 'text',
        placeholder: '예: 프리미엄 말차를 현대적으로 제안하는 라이프스타일 티 브랜드',
        helper: '무엇을 누구에게 어떤 방식으로 파는 브랜드인지 간단히 적어주세요.'
    },
    {
        key: 'targetCustomer',
        msg: '주요 고객은 어떤 사람들인가요?',
        type: 'text_or_skip',
        placeholder: '예: 30대 여성 직장인 / 소규모 브랜드 운영자',
        helper: '모르면 아래 버튼을 눌러도 됩니다.'
    },
    {
        key: 'mainProduct',
        msg: '대표 제품 또는 서비스는 무엇인가요?',
        type: 'text_or_skip',
        placeholder: '예: 브랜드 컨설팅 / 저당 그래놀라 / 말차 클래스',
        helper: '현재 가장 대표적인 제품 또는 서비스를 적어주세요.'
    },
    {
        key: 'mainProblem',
        msg: '현재 브랜드의 가장 큰 고민은 무엇인가요?',
        type: 'select',
        options: [
            { label: '브랜드 메시지가 약함', value: 'messaging' },
            { label: '고객 유입이 부족함', value: 'traffic' },
            { label: '전환율이 낮음', value: 'conversion' },
            { label: '포지셔닝이 불명확함', value: 'positioning' },
            { label: '장기 성장 구조가 없음', value: 'growth' }
        ],
        helper: '지금 가장 먼저 해결하고 싶은 문제를 선택하세요.'
    }
];

let currentStep = 0;
let userData = {};

function scrollBottom() {
    setTimeout(() => { chatWindow.scrollTop = chatWindow.scrollHeight; }, 50);
}

function addMsg(sender, text, isHtml = false) {
    const row = document.createElement('div');
    row.className = `message ${sender}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble[isHtml ? 'innerHTML' : 'textContent'] = text;
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollBottom();
}

function showTyping() {
    const row = document.createElement('div');
    row.className = 'message ai';
    row.id = 'typingRow';
    row.innerHTML = `<div class="typing-indicator"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
    chatWindow.appendChild(row);
    scrollBottom();
}

function removeTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
}

function updateProgress() {
    const total = steps.length;
    const done = Math.min(currentStep, total);
    progressFill.style.width = `${(done / total) * 100}%`;
    progressText.textContent = `${done} / ${total}`;
}

function clearError() { errorText.textContent = ''; }
function setError(msg) { errorText.textContent = msg; }

function showInput(placeholder, helper, allowSkip = false) {
    inputWrapper.style.display = 'block';
    chatInput.value = '';
    chatInput.placeholder = placeholder || '답변을 입력하세요';
    helperText.textContent = helper || '';
    clearError();
    sendBtn.disabled = false;

    if (allowSkip) {
        buttonWrapper.style.display = 'grid';
        buttonWrapper.innerHTML = `<button class="opt-btn" id="skipBtn">모르겠습니다</button>`;
        document.getElementById('skipBtn').onclick = () => handleText('모르겠습니다');
    } else {
        buttonWrapper.style.display = 'none';
    }
    setTimeout(() => chatInput.focus(), 80);
}

function showButtons(options, helper) {
    inputWrapper.style.display = 'none';
    buttonWrapper.style.display = 'grid';
    helperText.textContent = helper || '';
    clearError();
    buttonWrapper.innerHTML = options.map(o =>
        `<button class="opt-btn" data-val="${o.value}">${o.label}</button>`
    ).join('');
    buttonWrapper.querySelectorAll('.opt-btn').forEach(btn => {
        btn.onclick = () => handleSelect(btn.dataset.val, btn.textContent);
    });
}

function hideAll() {
    inputWrapper.style.display = 'none';
    buttonWrapper.style.display = 'none';
    helperText.textContent = '';
    clearError();
}

const wait = ms => new Promise(r => setTimeout(r, ms));

function normalizeUrl(url = '') {
    if (!url || url === '없음') return '';
    if (!url.startsWith('http://') && !url.startsWith('https://')) return 'https://' + url;
    return url;
}

function isValidUrl(url) {
    if (!url) return true;
    try { new URL(normalizeUrl(url)); return true; } catch { return false; }
}

async function nextStep() {
    updateProgress();
    if (currentStep >= steps.length) { await finishDiagnosis(); return; }
    const step = steps[currentStep];
    showTyping();
    await wait(500);
    removeTyping();
    addMsg('ai', step.msg);
    if (step.type === 'text') showInput(step.placeholder, step.helper, false);
    else if (step.type === 'text_or_skip') showInput(step.placeholder, step.helper, true);
    else if (step.type === 'select') showButtons(step.options, step.helper);
}

function handleText(val) {
    clearError();
    const step = steps[currentStep];
    const trimmed = (val || chatInput.value || '').trim();
    if (!trimmed) { setError('답변을 입력해주세요.'); return; }

    if (step.key === 'website') {
        const v = trimmed === '없음' ? '' : trimmed;
        if (v && !isValidUrl(v)) { setError('유효한 URL 형식이 아닙니다. 웹사이트가 없으면 "없음"이라고 입력해주세요.'); return; }
        userData[step.key] = normalizeUrl(v);
    } else {
        userData[step.key] = trimmed;
    }

    addMsg('user', trimmed);
    currentStep++;
    nextStep();
}

function handleSelect(value, label) {
    clearError();
    const step = steps[currentStep];
    userData[step.key] = value;
    userData[`${step.key}Label`] = label;
    addMsg('user', label);
    currentStep++;
    nextStep();
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildResultHtml(data) {
    return `<strong>현재 가장 큰 병목은 '${esc(data.bottleneckLabel)}'입니다.</strong><br><br>${esc(data.shortSummary)}<br><br>이 경우 보통 다음 문제가 발생합니다.<br><br>• 마케팅을 해도 매출이 안정적으로 쌓이지 않습니다.<br>• 대표자 의존도가 계속 높아집니다.<br>• 브랜드보다 상품 중심 판매로 흘러갈 가능성이 큽니다.<br><br>즉 문제는 단순한 디자인이나 홍보가 아니라 <strong>'돈이 흐르는 구조'</strong>입니다.<br><br>채움은 브랜드를 디자인하지 않습니다.<br><strong>제품 → 고객 → 구매 → 반복매출</strong>이 연결되는 구조를 설계합니다.`;
}

async function finishDiagnosis() {
    progressFill.style.width = '100%';
    progressText.textContent = `${steps.length} / ${steps.length}`;
    hideAll();

    showTyping();
    await wait(700);
    removeTyping();
    addMsg('ai', '입력하신 내용을 바탕으로 브랜드 구조를 분석하고 있습니다...');

    showTyping();
    await wait(1400);
    removeTyping();

    try {
        const payload = {
            website: userData.website || '',
            brandDescription: userData.brandDescription || '',
            targetCustomer: userData.targetCustomer || '',
            mainProduct: userData.mainProduct || '',
            mainProblem: userData.mainProblem || '',
            mainProblemLabel: userData.mainProblemLabel || ''
        };

        const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const reportData = await res.json();
        if (!res.ok) throw new Error(reportData.error || '분석에 실패했습니다.');

        localStorage.setItem('diagnosisData', JSON.stringify(reportData));

        addMsg('ai', buildResultHtml(reportData), true);

        await wait(400);
        addMsg('ai', '이 브랜드에 맞는 더 자세한 구조 분석을 보시겠습니까?');

        buttonWrapper.style.display = 'grid';
        buttonWrapper.innerHTML = `
            <button class="opt-btn" id="viewReportBtn">📋 전체 분석 리포트 보기</button>
            <button class="opt-btn" id="consultBtn">📅 20분 무료 상담 예약하기</button>
            <button class="opt-btn" id="restartBtn" style="opacity:0.6;">처음부터 다시 하기</button>
        `;
        document.getElementById('viewReportBtn').onclick = () => window.location.href = './diagnosis-report.html';
        document.getElementById('consultBtn').onclick = () => window.open('https://cal.com/chaeum', '_blank');
        document.getElementById('restartBtn').onclick = () => { localStorage.removeItem('diagnosisData'); location.reload(); };

    } catch (err) {
        console.error(err);
        removeTyping();
        addMsg('ai', '분석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        buttonWrapper.style.display = 'grid';
        buttonWrapper.innerHTML = `<button class="opt-btn" id="restartBtn">처음부터 다시 하기</button>`;
        document.getElementById('restartBtn').onclick = () => location.reload();
    }
}

sendBtn.addEventListener('click', () => {
    const step = steps[currentStep];
    if (step && (step.type === 'text' || step.type === 'text_or_skip')) handleText();
});

chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const step = steps[currentStep];
        if (step && (step.type === 'text' || step.type === 'text_or_skip')) {
            e.preventDefault(); handleText();
        }
    }
});

// 시작
nextStep();
</script>

</body>
</html>
