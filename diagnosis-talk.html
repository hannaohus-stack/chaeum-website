<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; width: 100%; padding: 40px 20px; }
        
        .hero { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 48px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.8; }
        
        .form-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; }
        
        .form-group { margin-bottom: 32px; }
        label { display: block; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }
        .required { color: #FF6464; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 80px; resize: vertical; }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { font-size: 12px; color: #666; margin-top: 8px; }
        
        .analysis-preview { 
            background: rgba(100, 200, 255, 0.1); 
            border-left: 4px solid #64C8FF; 
            padding: 16px; 
            border-radius: 4px; 
            margin-top: 12px; 
            font-size: 12px; 
            color: #aaa; 
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .preview-item { margin: 6px 0; }
        .preview-item strong { color: #64C8FF; }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .error { 
            background: rgba(255, 107, 107, 0.1); 
            color: #FF6B6B; 
            padding: 12px; 
            border-radius: 4px; 
            display: none; 
            font-size: 13px; 
            margin-bottom: 20px;
            border-left: 4px solid #FF6B6B;
        }
        .success { 
            background: rgba(100, 200, 255, 0.1); 
            color: #64C8FF; 
            padding: 12px; 
            border-radius: 4px; 
            display: none; 
            font-size: 13px; 
            margin-bottom: 20px;
            border-left: 4px solid #64C8FF;
        }
        
        .analyzing {
            display: inline-block;
            margin-left: 8px;
            font-size: 12px;
            color: #64C8FF;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">웹사이트 또는 인스타그램 URL만으로<br>AI가 자동 분석합니다</p>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. URL (자동 분석) -->
                <div class="form-group">
                    <label>🔗 웹사이트 또는 인스타그램 <span class="required">*</span></label>
                    <input 
                        type="url" 
                        id="brandUrl" 
                        placeholder="https://yoursite.com"
                        required>
                    <p class="hint">URL 입력 후 자동으로 분석됩니다</p>
                    <div class="analysis-preview" id="preview">
                        <div class="preview-item"><strong>감지된 브랜드:</strong> <span id="previewBrand">-</span></div>
                        <div class="preview-item"><strong>서비스 유형:</strong> <span id="previewType">-</span></div>
                        <div class="preview-item"><strong>신뢰도:</strong> <span id="previewConfidence">-</span></div>
                    </div>
                </div>

                <!-- 2. 이메일 -->
                <div class="form-group">
                    <label>📧 이메일 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        required>
                    <p class="hint">상세 리포트 수신용</p>
                </div>

                <!-- 3. 추가 정보 (선택사항) -->
                <div class="form-group">
                    <label>💬 추가로 알려주고 싶은 점 (선택)</label>
                    <textarea 
                        id="additionalInfo" 
                        placeholder="예: '최근 마케팅 비용이 크게 늘었는데 매출은 안 늘고 있어요' 같은 구체적인 상황을 알려주면 더 정확한 분석이 가능합니다."></textarea>
                    <p class="hint">선택사항이지만, 구체적일수록 분석이 정확해집니다</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작 (무료)</button>
            </div>
        </form>
    </div>

    <script src="./url-analyzer.js"></script>
    <script>
        let urlAnalysisData = null; // ✅ 전역 변수로 선언

        // ✅ URL 입력 시 http:// 자동 추가
        document.getElementById('brandUrl').addEventListener('focus', function() {
            if (!this.value) {
                this.value = 'https://';
                this.setSelectionRange(8, 8); // 커서를 https:// 뒤에 위치
            }
        });

        // ✅ URL 입력 후 자동 분석 (blur 이벤트)
        document.getElementById('brandUrl').addEventListener('blur', async (e) => {
            const url = e.target.value.trim();
            
            // https:// 또는 http://로 시작하지 않으면 추가
            if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
                e.target.value = 'https://' + url;
            }
            
            if (!url || url === 'https://' || url === 'http://') {
                document.getElementById('preview').style.display = 'none';
                return;
            }

            // 분석 시작
            await analyzeURL(url);
        });

        /**
         * URL 분석 함수
         */
        async function analyzeURL(url) {
            try {
                document.getElementById('preview').style.display = 'none';
                
                // URL 분석기 실행
                const analyzer = new URLAnalyzer(url);
                urlAnalysisData = await analyzer.analyze();
                
                // 결과 표시
                document.getElementById('previewBrand').textContent = urlAnalysisData.brandName || '분석 중...';
                document.getElementById('previewType').textContent = urlAnalysisData.serviceType || '-';
                document.getElementById('previewConfidence').textContent = Math.round((urlAnalysisData.confidence || 0.5) * 100) + '%';
                
                document.getElementById('preview').style.display = 'block';
                hideError();

            } catch (error) {
                console.error('URL 분석 오류:', error);
                showError('URL 분석 중 오류가 발생했습니다. 다시 시도해주세요.');
                document.getElementById('preview').style.display = 'none';
            }
        }

        // ✅ 폼 제출 (수정: submit 시 다시 한 번 분석 확인)
        document.getElementById('diagnosisForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const brandUrl = document.getElementById('brandUrl').value.trim();
            const email = document.getElementById('email').value.trim();
            const additionalInfo = document.getElementById('additionalInfo').value.trim();

            // 검증
            if (!brandUrl || brandUrl === 'https://' || brandUrl === 'http://') {
                showError('유효한 URL을 입력해주세요');
                return;
            }

            if (!email) {
                showError('이메일을 입력해주세요');
                return;
            }

            // URL이 아직 분석되지 않았다면 지금 분석
            if (!urlAnalysisData) {
                showError('URL을 분석 중입니다. 잠시만 기다려주세요...');
                await analyzeURL(brandUrl);
                
                if (!urlAnalysisData) {
                    showError('URL 분석에 실패했습니다. 올바른 웹사이트 URL을 입력해주세요.');
                    return;
                }
            }

            // 버튼 비활성화
            document.getElementById('submitBtn').disabled = true;

            try {
                // 분석 데이터 완성
                const analysisData = {
                    ...urlAnalysisData,
                    email,
                    additionalInfo,
                    website: brandUrl,
                    timestamp: new Date().toISOString()
                };

                // localStorage에 저장
                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));
                
                // 성공 메시지
                showSuccess('✅ 분석 완료! 리포트로 이동합니다...');

                // 1초 후 리포트 페이지로 이동
                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 1000);

            } catch (error) {
                console.error('저장 오류:', error);
                showError('데이터 저장 중 오류가 발생했습니다. 다시 시도해주세요.');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        /**
         * 에러 표시
         */
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        /**
         * 에러 숨김
         */
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        /**
         * 성공 표시
         */
        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
