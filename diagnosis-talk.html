<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 550px; width: 100%; padding: 40px 20px; }
        
        .hero { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 44px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.6; }
        
        .form-section { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 32px; 
        }
        
        .form-group { margin-bottom: 24px; }
        label { 
            display: block; 
            font-size: 12px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 600; 
            margin-bottom: 10px; 
        }
        .required { color: #FF6464; }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 80px; resize: vertical; }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { font-size: 11px; color: #666; margin-top: 6px; }
        
        .error { 
            background: rgba(255, 107, 107, 0.1); 
            color: #FF6B6B; 
            padding: 10px; 
            border-radius: 4px; 
            display: none; 
            font-size: 12px; 
            margin-bottom: 20px;
            border-left: 4px solid #FF6B6B;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">기본 정보를 입력하면<br>AI가 분석 리포트를 생성합니다</p>
        </div>

        <div id="error" class="error"></div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. 브랜드명 -->
                <div class="form-group">
                    <label>브랜드명 <span class="required">*</span></label>
                    <input 
                        type="text"
                        id="brandName" 
                        placeholder="ex) Krk, Nonfiction"
                        required>
                    <p class="hint">브랜드 이름</p>
                </div>

                <!-- 2. 웹사이트 -->
                <div class="form-group">
                    <label>웹사이트 <span class="required">*</span></label>
                    <input 
                        type="text"
                        id="website" 
                        placeholder="https://example.com"
                        required>
                    <p class="hint">웹사이트 주소</p>
                </div>

                <!-- 3. 서비스 설명 -->
                <div class="form-group">
                    <label>서비스 설명 <span class="required">*</span></label>
                    <textarea 
                        id="service" 
                        placeholder="브랜드가 제공하는 서비스를 설명해주세요"
                        required></textarea>
                    <p class="hint">최소 20자 이상</p>
                </div>

                <!-- 4. 타깃 페인 -->
                <div class="form-group">
                    <label>타깃의 주요 고민 <span class="required">*</span></label>
                    <textarea 
                        id="painPoint" 
                        placeholder="고객이 겪는 가장 큰 문제를 설명해주세요"
                        required></textarea>
                    <p class="hint">구체적일수록 좋습니다</p>
                </div>

                <!-- 5. 현재 메시지 -->
                <div class="form-group">
                    <label>현재 포지셔닝 메시지 <span class="required">*</span></label>
                    <textarea 
                        id="currentMessaging" 
                        placeholder="지금 사용하고 있는 슬로건이나 메시지"
                        required></textarea>
                    <p class="hint">웹사이트 헤드라인이나 슬로건</p>
                </div>

                <!-- 6. 이메일 -->
                <div class="form-group">
                    <label>이메일 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        required>
                    <p class="hint">리포트 수신용</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작</button>
            </div>
        </form>
    </div>

    <script>
        const websiteInput = document.getElementById('website');
        
        // 웹사이트 입력 시 자동 https:// 추가
        websiteInput.addEventListener('focus', function() {
            if (!this.value) {
                this.value = 'https://';
                this.setSelectionRange(8, 8);
            }
        });

        // 폼 제출
        document.getElementById('diagnosisForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const brandName = document.getElementById('brandName').value.trim();
            const website = document.getElementById('website').value.trim();
            const service = document.getElementById('service').value.trim();
            const painPoint = document.getElementById('painPoint').value.trim();
            const currentMessaging = document.getElementById('currentMessaging').value.trim();
            const email = document.getElementById('email').value.trim();

            // 검증
            if (!brandName || !website || !service || !painPoint || !currentMessaging || !email) {
                showError('모든 항목을 입력해주세요');
                return;
            }

            if (service.length < 20) {
                showError('서비스 설명을 더 자세히 입력해주세요 (최소 20자)');
                return;
            }

            if (!isValidUrl(website)) {
                showError('유효한 URL을 입력해주세요');
                return;
            }

            let finalUrl = website;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }

            // 서비스 유형 자동 감지
            const serviceType = detectServiceType(service, currentMessaging);

            document.getElementById('submitBtn').disabled = true;

            try {
                const analysisData = {
                    brandName,
                    website: finalUrl,
                    service,
                    painPoint,
                    currentMessaging,
                    email,
                    serviceType,
                    timestamp: new Date().toISOString()
                };

                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));
                
                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 800);

            } catch (error) {
                console.error('오류:', error);
                showError('오류가 발생했습니다');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        function isValidUrl(url) {
            try {
                const testUrl = url.startsWith('http') ? url : 'https://' + url;
                new URL(testUrl);
                return true;
            } catch {
                return false;
            }
        }

        function detectServiceType(service, messaging) {
            const text = `${service} ${messaging}`.toLowerCase();

            if (text.match(/saas|app|tool|software|platform/)) return 'saas';
            if (text.match(/beauty|cosmetic|skincare|makeup|뷰티|화장품/)) return 'lifestyle';
            if (text.match(/food|cafe|restaurant|음식|음료|카페/)) return 'food';
            if (text.match(/design|creative|studio|디자인|창작/)) return 'design';
            if (text.match(/fintech|payment|finance|금융|투자/)) return 'fintech';
            if (text.match(/health|fitness|wellness|gym|헬스|요가/)) return 'health';
            if (text.match(/shop|store|ecommerce|상점|쇼핑/)) return 'ecommerce';
            if (text.match(/course|learn|education|학습|교육/)) return 'education';
            if (text.match(/consulting|strategy|business|컨설팅/)) return 'consulting';

            return 'lifestyle';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
