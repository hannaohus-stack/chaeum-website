<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; min-height: 100vh; }
        .container { max-width: 650px; margin: 0 auto; padding: 60px 20px; }
        
        .hero { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 48px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.8; }
        
        .form-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; }
        
        .form-group { margin-bottom: 32px; }
        label { display: block; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }
        .required { color: #FF6464; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        textarea { min-height: 100px; resize: vertical; }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { font-size: 12px; color: #666; margin-top: 8px; }
        
        .error { 
            background: rgba(255, 107, 107, 0.1); 
            color: #FF6B6B; 
            padding: 12px; 
            border-radius: 4px; 
            display: none; 
            font-size: 13px; 
            margin-bottom: 20px;
            border-left: 4px solid #FF6B6B;
        }
        .success { 
            background: rgba(100, 200, 255, 0.1); 
            color: #64C8FF; 
            padding: 12px; 
            border-radius: 4px; 
            display: none; 
            font-size: 13px; 
            margin-bottom: 20px;
            border-left: 4px solid #64C8FF;
        }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">5가지 정보만 입력하면<br>AI 자동 분석 리포트가 생성됩니다</p>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. URL -->
                <div class="form-group">
                    <label>🔗 웹사이트 또는 인스타그램 <span class="required">*</span></label>
                    <input 
                        type="url" 
                        id="brandUrl" 
                        placeholder="https://yoursite.com"
                        required>
                    <p class="hint">브랜드 주소를 입력하세요</p>
                </div>

                <!-- 2. 서비스 설명 -->
                <div class="form-group">
                    <label>📝 서비스/제품 설명 <span class="required">*</span></label>
                    <textarea 
                        id="service" 
                        placeholder="예: 소상공인을 위한 식품 라벨 생성 SaaS. 디자인 경험 없이도 2분 만에 전문가급 라벨을 만들 수 있습니다."
                        required></textarea>
                    <p class="hint">✨ 이 부분이 분석의 핵심입니다</p>
                </div>

                <!-- 3. 타깃 고객 페인 -->
                <div class="form-group">
                    <label>⚠️ 타깃 고객의 가장 큰 고민 <span class="required">*</span></label>
                    <textarea 
                        id="painPoint" 
                        placeholder="예: 소상공인은 디자인 비용이 너무 비싸고, 시간도 오래 걸려서 제품 출시를 미루고 있습니다."
                        required></textarea>
                    <p class="hint">✨ 이 부분도 분석에 매우 중요합니다</p>
                </div>

                <!-- 4. 현재 포지셔닝 -->
                <div class="form-group">
                    <label>💬 지금 어떻게 표현하고 있나요? <span class="required">*</span></label>
                    <textarea 
                        id="currentMessaging" 
                        placeholder="예: '누구나 쉬운 라벨 디자인' 또는 '5분만에 프로 같은 라벨을 만드세요'"
                        required></textarea>
                    <p class="hint">✨ 분석의 기준이 됩니다</p>
                </div>

                <!-- 5. 이메일 -->
                <div class="form-group">
                    <label>📧 이메일 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        required>
                    <p class="hint">상세 리포트 수신</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작 (무료)</button>
            </div>
        </form>
    </div>

    <script>
        // URL 입력 시 자동 https:// 추가
        const brandUrlInput = document.getElementById('brandUrl');
        
        brandUrlInput.addEventListener('focus', function() {
            if (!this.value) {
                this.value = 'https://';
                this.setSelectionRange(8, 8);
            }
        });

        // 폼 제출
        document.getElementById('diagnosisForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const brandUrl = document.getElementById('brandUrl').value.trim();
            const service = document.getElementById('service').value.trim();
            const painPoint = document.getElementById('painPoint').value.trim();
            const currentMessaging = document.getElementById('currentMessaging').value.trim();
            const email = document.getElementById('email').value.trim();

            // 검증
            if (!brandUrl || !service || !painPoint || !currentMessaging || !email) {
                showError('모든 필수 항목을 입력해주세요');
                return;
            }

            if (service.length < 20) {
                showError('서비스 설명을 더 자세히 입력해주세요 (최소 20자)');
                return;
            }

            // https:// 추가
            if (!brandUrl.startsWith('http://') && !brandUrl.startsWith('https://')) {
                brandUrl = 'https://' + brandUrl;
            }

            // 도메인에서 서비스 유형 추론 (간단한 방식)
            const domain = new URL(brandUrl).hostname;
            const serviceType = detectServiceType(service, currentMessaging);

            document.getElementById('submitBtn').disabled = true;

            try {
                // 분석 데이터 구성
                const analysisData = {
                    brandName: domain.split('.')[0].toUpperCase(),
                    service,
                    painPoint,
                    currentMessaging,
                    email,
                    website: brandUrl,
                    serviceType: serviceType,
                    timestamp: new Date().toISOString()
                };

                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));
                
                showSuccess('✅ 분석 완료! 리포트로 이동합니다...');

                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 1000);

            } catch (error) {
                console.error('저장 오류:', error);
                showError('오류가 발생했습니다. 다시 시도해주세요.');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        /**
         * 입력된 정보로 서비스 유형 추론
         */
        function detectServiceType(service, messaging) {
            const text = `${service} ${messaging}`.toLowerCase();

            if (text.match(/saas|app|tool|software|platform|협업|도구/)) return 'saas';
            if (text.match(/beauty|cosmetic|skincare|makeup|패션|뷰티/)) return 'lifestyle';
            if (text.match(/food|cafe|restaurant|recipe|음식|음료|카페/)) return 'food';
            if (text.match(/design|creative|studio|디자인|창작/)) return 'design';
            if (text.match(/fintech|payment|finance|crypto|금융|투자/)) return 'fintech';
            if (text.match(/health|fitness|wellness|gym|요가|헬스/)) return 'health';
            if (text.match(/shop|store|ecommerce|상점|쇼핑/)) return 'ecommerce';
            if (text.match(/course|learn|education|학습|교육/)) return 'education';
            if (text.match(/consulting|strategy|business|컨설팅/)) return 'consulting';

            return 'lifestyle';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
