<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>브랜드 진단 | CHAEUM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–bg: #4B4545;
–white: #FFFDF7;
–sub: rgba(255,253,247,0.45);
–border: rgba(255,253,247,0.1);
–msg-ai: rgba(255,253,247,0.05);
–msg-user: #FFFDF7;
–user-color: #4B4545;
}

html, body { height: 100%; overflow: hidden; }

body {
font-family: ‘Georgia’, ‘Times New Roman’, serif;
background-color: #4B4545;
background: #4B4545;
color: #FFFDF7;
display: flex;
flex-direction: column;
min-height: 100vh;
}

/* ── 상단 바 ── */
.bar {
flex-shrink: 0;
padding: 20px 32px;
display: flex;
align-items: center;
border-bottom: 1px solid rgba(255,253,247,0.1);
}
.bar-logo {
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: #FFFDF7;
opacity: 0.6;
text-decoration: none;
}
.bar-title {
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
font-size: 11px;
letter-spacing: 2px;
color: rgba(255,253,247,0.45);
margin-left: 20px;
padding-left: 20px;
border-left: 1px solid rgba(255,253,247,0.1);
text-transform: uppercase;
}
.bar-prog {
margin-left: auto;
display: flex;
gap: 5px;
align-items: center;
}
.prog-seg {
width: 18px;
height: 1px;
background: rgba(255,253,247,0.18);
transition: background 0.4s;
}
.prog-seg.done { background: rgba(255,253,247,0.7); }
.prog-seg.active { background: rgba(255,253,247,0.4); }

/* ── 채팅 영역 ── */
.chat {
flex: 1;
min-height: 0;
overflow-y: auto;
padding: 40px 32px 20px;
display: flex;
flex-direction: column;
gap: 20px;
max-width: 640px;
width: 100%;
margin: 0 auto;
scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 2px; }
.chat::-webkit-scrollbar-thumb { background: rgba(255,253,247,0.08); }

/* ── 말풍선 ── */
.row { display: flex; animation: up 0.2s ease; }
.row.ai { justify-content: flex-start; }
.row.user { justify-content: flex-end; }

@keyframes up {
from { opacity: 0; transform: translateY(5px); }
to   { opacity: 1; transform: translateY(0); }
}

.bub {
max-width: 78%;
padding: 16px 20px;
font-size: 15px;
line-height: 1.85;
white-space: pre-line;
word-break: break-word;
}

.row.ai .bub {
background: rgba(255,253,247,0.05);
border: 1px solid rgba(255,253,247,0.1);
color: #FFFDF7;
/* 왼쪽 상단만 각지게 */
border-radius: 0 12px 12px 12px;
}

.row.user .bub {
background: #FFFDF7;
color: #4B4545;
border-radius: 12px 0 12px 12px;
font-size: 14px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
font-weight: 500;
}

/* ── 타이핑 ── */
.typing-wrap { display: flex; }
.typing-bub {
display: inline-flex;
align-items: center;
gap: 6px;
padding: 16px 20px;
background: rgba(255,253,247,0.05);
border: 1px solid rgba(255,253,247,0.1);
border-radius: 0 12px 12px 12px;
}
.td {
width: 4px; height: 4px;
border-radius: 50%;
background: rgba(255,253,247,0.5);
animation: blink 1.2s infinite;
}
.td:nth-child(2) { animation-delay: 0.15s; }
.td:nth-child(3) { animation-delay: 0.3s; }
@keyframes blink {
0%,80%,100% { opacity:0.25; }
40%          { opacity:1; }
}

/* ── 입력 영역 ── */
.input-zone {
flex-shrink: 0;
border-top: 1px solid rgba(255,253,247,0.1);
max-width: 640px;
width: 100%;
margin: 0 auto;
padding: 16px 32px 24px;
}

/* 텍스트 입력 */
.txt-row {
display: flex;
gap: 0;
border: 1px solid rgba(255,253,247,0.18);
}
.txt-in {
flex: 1;
padding: 14px 16px;
background: transparent;
border: none;
color: #FFFDF7;
font-size: 14px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
outline: none;
}
.txt-in::placeholder { color: rgba(255,253,247,0.22); }
.txt-send {
padding: 0 20px;
background: rgba(255,253,247,0.08);
border: none;
border-left: 1px solid rgba(255,253,247,0.12);
color: #FFFDF7;
font-size: 12px;
letter-spacing: 1px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
cursor: pointer;
transition: background 0.2s;
white-space: nowrap;
}
.txt-send:hover { background: rgba(255,253,247,0.14); }
.txt-send:disabled { opacity: 0.3; cursor: not-allowed; }

.hint-text { font-size: 11px; color: rgba(255,253,247,0.45); margin-top: 10px; letter-spacing: 0.3px; font-family: -apple-system, sans-serif; }
.err-text  { font-size: 11px; color: #ff8f8f; margin-top: 8px; font-family: -apple-system, sans-serif; }

/* 선택지 */
.opts-wrap { display: flex; flex-direction: column; gap: 1px; }
.opt-btn {
width: 100%;
padding: 14px 16px;
text-align: left;
background: transparent;
border: none;
border-bottom: 1px solid rgba(255,253,247,0.1);
color: rgba(255,253,247,0.75);
font-size: 14px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
cursor: pointer;
transition: all 0.18s;
letter-spacing: 0.2px;
line-height: 1.45;
}
.opt-btn:first-child { border-top: 1px solid rgba(255,253,247,0.1); }
.opt-btn:hover { color: #FFFDF7; background: rgba(255,253,247,0.04); padding-left: 22px; }

/* 이중 입력 */
.double-inp { display: flex; flex-direction: column; gap: 1px; }
.double-inp .txt-row:first-child { border-bottom: none; }

/* CTA */
.cta-wrap { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
.cta-label {
font-size: 11px;
color: rgba(255,253,247,0.45);
letter-spacing: 0.5px;
font-family: -apple-system, sans-serif;
text-align: center;
margin-bottom: 2px;
}
.cta-pri {
display: block;
background: #FFFDF7;
color: #4B4545;
padding: 15px 20px;
text-align: center;
text-decoration: none;
font-size: 13px;
font-weight: 600;
letter-spacing: 0.5px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
transition: opacity 0.2s;
cursor: pointer;
border: none;
}
.cta-pri:hover { opacity: 0.85; }
.cta-sec {
display: block;
background: transparent;
border: 1px solid rgba(255,253,247,0.15);
color: rgba(255,253,247,0.45);
padding: 12px 20px;
text-align: center;
text-decoration: none;
font-size: 12px;
letter-spacing: 0.5px;
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
transition: all 0.2s;
cursor: pointer;
}
.cta-sec:hover { color: #FFFDF7; border-color: rgba(255,253,247,0.3); }

@media (max-width: 500px) {
.bar, .chat, .input-zone { padding-left: 20px; padding-right: 20px; }
.bub { max-width: 88%; font-size: 14px; }
.opt-btn { font-size: 13px; }
}
</style>

</head>
<body>

<!-- HEADER -->

<div class="bar">
    <a href="./index.html" class="bar-logo">Chaeum</a>
    <span class="bar-title">브랜드 진단</span>
    <div class="bar-prog" id="prog"></div>
</div>

<!-- CHAT -->

<div id="chat" class="chat"></div>

<!-- INPUT -->

<div class="input-zone" id="zone"></div>

<script>
const TOTAL = 4;
const chatEl = document.getElementById('chat');
const zoneEl = document.getElementById('zone');
const progEl = document.getElementById('prog');

const STEPS = [
    {
        key: 'problem', type: 'select',
        msg: '지금 브랜드에서\n가장 힘든 상황이 어디에 해당하나요?',
        options: [
            { label: '열심히 하는데 매출이 안 오른다', value: 'stagnant' },
            { label: '한 번 사고 다시 안 돌아온다', value: 'no_repeat' },
            { label: '고객이 우리 브랜드가 뭔지 모르는 것 같다', value: 'unclear' },
            { label: '가격을 올리면 고객이 떠날 것 같다', value: 'price' },
            { label: '나 없이는 브랜드가 안 돌아간다', value: 'dependent' },
        ]
    },
    {
        key: 'revenue', type: 'select',
        msg: '현재 월 매출 규모는\n어느 정도인가요?',
        options: [
            { label: '아직 매출이 거의 없다', value: 'zero' },
            { label: '100만원 미만', value: 'under100' },
            { label: '100 — 500만원', value: '100to500' },
            { label: '500 — 1500만원', value: '500to1500' },
            { label: '1500만원 이상', value: 'over1500' },
        ]
    },
    {
        key: 'capacity', type: 'select',
        msg: '직접 실행할 여력이\n지금 있나요?',
        options: [
            { label: '방향만 잡히면 내가 직접 할 수 있다', value: 'self' },
            { label: '방향은 알겠는데 실행이 막막하다', value: 'partial' },
            { label: '전문가가 대신 해줬으면 한다', value: 'outsource' },
        ]
    },
    {
        key: 'contact', type: 'text2',
        msg: '진단 결과와 개선안을\n이메일로 보내드릴게요.',
        p1: '이름', p2: '이메일 주소',
        hint: '상업적 목적으로 사용되지 않습니다.'
    }
];

let step = 0, data = {};
const wait = ms => new Promise(r => setTimeout(r, ms));
const scroll = () => setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 40);

// 진행 도트
function renderProg() {
    progEl.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
        const d = document.createElement('div');
        d.className = 'prog-seg' + (i < step ? ' done' : i === step ? ' active' : '');
        progEl.appendChild(d);
    }
}

// 메시지
function addMsg(from, text, isHtml) {
    const row = document.createElement('div');
    row.className = `row ${from}`;
    const b = document.createElement('div');
    b.className = 'bub';
    if (isHtml) b.innerHTML = text;
    else b.textContent = text;
    row.appendChild(b);
    chatEl.appendChild(row);
    scroll();
}

function showTyping() {
    const row = document.createElement('div');
    row.id = 'typ'; row.className = 'typing-wrap';
    row.innerHTML = `<div class="typing-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
    chatEl.appendChild(row); scroll();
}
function rmTyping() { const e = document.getElementById('typ'); if(e) e.remove(); }

// 입력 렌더
function renderInput() {
    zoneEl.innerHTML = '';
    if (step >= STEPS.length) return;
    const s = STEPS[step];

    if (s.type === 'select') {
        zoneEl.innerHTML = `<div class="opts-wrap" id="opts"></div>`;
        const opts = document.getElementById('opts');
        s.options.forEach(o => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.textContent = o.label;
            b.onclick = () => handleOpt(o.value, o.label);
            opts.appendChild(b);
        });

    } else if (s.type === 'text') {
        zoneEl.innerHTML = `
            <div class="txt-row">
                <input id="inp" class="txt-in" type="text" placeholder="${s.placeholder||'답변을 입력하세요'}" />
                <button class="txt-send" id="sb">전송</button>
            </div>
            <div class="err-text" id="er"></div>
            ${s.hint ? `<div class="hint-text">${s.hint}</div>` : ''}
        `;
        document.getElementById('sb').onclick = doText;
        document.getElementById('inp').onkeydown = e => { if(e.key==='Enter') doText(); };
        setTimeout(() => document.getElementById('inp')?.focus(), 80);

    } else if (s.type === 'text2') {
        zoneEl.innerHTML = `
            <div class="double-inp">
                <div class="txt-row">
                    <input id="inp1" class="txt-in" type="text" placeholder="${s.p1}" />
                </div>
                <div class="txt-row">
                    <input id="inp2" class="txt-in" type="email" placeholder="${s.p2}" />
                    <button class="txt-send" id="sb2">완료</button>
                </div>
            </div>
            <div class="err-text" id="er"></div>
            ${s.hint ? `<div class="hint-text">${s.hint}</div>` : ''}
        `;
        document.getElementById('sb2').onclick = doText2;
        document.getElementById('inp2').onkeydown = e => { if(e.key==='Enter') doText2(); };
        setTimeout(() => document.getElementById('inp1')?.focus(), 80);
    }
}

function doText() {
    const v = document.getElementById('inp')?.value?.trim();
    const er = document.getElementById('er');
    if (!v) { if(er) er.textContent = '답변을 입력해주세요.'; return; }
    data[STEPS[step].key] = v;
    addMsg('user', v);
    advance();
}

function doText2() {
    const n = document.getElementById('inp1')?.value?.trim();
    const e = document.getElementById('inp2')?.value?.trim();
    const er = document.getElementById('er');
    if (!n) { if(er) er.textContent = '이름을 입력해주세요.'; return; }
    if (!e || !e.includes('@')) { if(er) er.textContent = '올바른 이메일을 입력해주세요.'; return; }
    data.name = n; data.email = e;
    addMsg('user', `${n}  ·  ${e}`);
    advance();
}

function handleOpt(val, label) {
    data[STEPS[step].key] = val;
    addMsg('user', label);
    advance();
}

async function advance() {
    step++;
    renderProg();
    zoneEl.innerHTML = '';

    if (step < STEPS.length) {
        showTyping();
        await wait(550);
        rmTyping();
        addMsg('ai', STEPS[step].msg);
        renderInput();
    } else {
        await showResult();
    }
}

// ── 결과 ──
function buildResult(d) {
    const prob = d.problem, rev = d.revenue, cap = d.capacity;

    const empathy = {
        stagnant:   'SNS도 하고, 콘텐츠도 올리고, 나름 열심히 하는데\n매출 그래프는 제자리인 상황이죠.',
        no_repeat:  '첫 구매는 이따금 있는데,\n한 번 사고 나서 다시 돌아오는 고객이 없는 상황이죠.',
        unclear:    '브랜드를 운영하고 있는데,\n정작 고객이 "이게 뭐하는 브랜드야?" 싶은 반응을 보이는 상황이죠.',
        price:      '가격을 올리고 싶은데,\n올리면 고객이 다 떠날 것 같아서 계속 제자리인 상황이죠.',
        dependent:  '대표가 잠깐 자리를 비우거나 쉬는 순간\n브랜드도 같이 멈춰버리는 상황이죠.',
    };
    const cause = {
        stagnant:   '이건 노력 부족이 아닙니다.\n돈이 흐르는 <strong>수익 구조</strong>가 설계되지 않은 거예요.',
        no_repeat:  '제품 문제가 아닙니다.\n고객을 붙잡아두는 <strong>브랜드 경험 구조</strong>가 없는 거예요.',
        unclear:    '마케팅을 더 해서 해결되지 않습니다.\n<strong>포지셔닝</strong>, 즉 "왜 이 브랜드여야 하는가"가 정의되지 않은 거예요.',
        price:      '가격이 문제가 아닙니다.\n고객이 그 가격을 납득할 <strong>브랜드 논리</strong>가 없는 거예요.',
        dependent:  '사람 문제가 아닙니다.\n대표 없이도 굴러가는 <strong>시스템 구조</strong>가 없는 거예요.',
    };
    const caseStory = {
        stagnant:   '덕화명란도 같은 상황이었습니다.\n좋은 제품인데 시장에서 제 가격을 못 받았어요.\nCHAEUM이 수익 구조를 재설계하고 나서\n연매출이 30억에서 110억으로 올랐습니다.',
        no_repeat:  'Therethehouse도 같은 상황이었습니다.\n좋은 경험이 있었지만 고객을 다시 불러오는 구조가 없었어요.\nCHAEUM이 브랜드 경험을 설계하고\n3개월 만에 예약이 꽉 찼습니다.',
        unclear:    '포지셔닝이 잡히는 순간, 마케팅·가격·콘텐츠가 하나로 정렬됩니다.\nCHAEUM이 함께한 브랜드들은 포지셔닝 재설계 후\n가격을 올려도 매출이 늘었습니다.',
        price:      '덕화명란은 같은 제품으로 포지셔닝만 바꿨습니다.\n"밥반찬 명란"에서 "프리미엄 식재료"로.\n가격을 올린 뒤 오히려 고객층이 넓어졌습니다.',
        dependent:  '대표 의존 구조는 브랜드가 자산이 아닌 노동이 된다는 신호입니다.\n시스템이 설계되면 대표는 비전에만 집중할 수 있습니다.',
    };
    const hope = {
        stagnant:   '구조 하나만 정렬되면\n같은 노력으로 2배 이상의 매출을 낼 수 있습니다.',
        no_repeat:  '재구매 구조가 생기면\n신규 고객을 매번 찾지 않아도 됩니다.',
        unclear:    '포지셔닝이 잡히면\n고객이 "바로 이 브랜드"라고 기억하게 됩니다.',
        price:      '브랜드 논리가 생기면\n가격을 올려도 고객이 납득합니다.',
        dependent:  '시스템이 생기면\n대표가 자리를 비워도 브랜드는 굴러갑니다.',
    };

    const isLow = ['zero','under100','100to500'].includes(rev);
    const isSelf = cap === 'self';

    let recommend = '';
    if (isLow && isSelf) {
        recommend = `지금 단계에는 <strong>CHAEUM Self-OS (₩299,000)</strong>가 맞습니다.\n\n전략 프레임워크가 담긴 노션 시스템으로\n비용 부담 없이 브랜드 구조를 직접 잡아볼 수 있습니다.`;
    } else if (isLow) {
        recommend = `<strong>Brand Architecture 상담</strong>을 추천드립니다.\n\n20분 무료 상담에서 지금 가장 먼저 바꿔야 할 것 하나를\n같이 찾겠습니다.`;
    } else {
        recommend = `<strong>구조 설계 + 실행 상담</strong>이 필요한 단계입니다.\n\n포지셔닝 재설계부터 실행 인프라까지,\nCHAEUM이 함께합니다.`;
    }

    return { empathy: empathy[prob]||'', cause: cause[prob]||'', caseStory: caseStory[prob]||'', hope: hope[prob]||'', recommend, isLow, isSelf };
}

async function showResult() {
    zoneEl.innerHTML = '';
    showTyping();
    await wait(900);
    rmTyping();

    const r = buildResult(data);
    const name = data.name ? `${data.name.split(' ')[0]}님, ` : '';

    addMsg('ai', `${name}${r.empathy}\n\n${r.cause}`, true);

    await wait(400); showTyping(); await wait(900); rmTyping();
    addMsg('ai', r.caseStory);

    await wait(400); showTyping(); await wait(800); rmTyping();
    addMsg('ai', r.hope);

    await wait(400); showTyping(); await wait(700); rmTyping();
    addMsg('ai', r.recommend, true);

    await wait(300);

    // CTA
    const note = data.email ? `${data.email}로 결과를 보내드립니다.` : '';
    if (r.isLow && r.isSelf) {
        zoneEl.innerHTML = `
            <div class="cta-wrap">
                ${note ? `<div class="cta-label">${note}</div>` : ''}
