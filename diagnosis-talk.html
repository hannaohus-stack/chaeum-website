<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 진단 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; width: 100%; padding: 40px 20px; }
        
        .hero { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 48px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.8; }
        
        .form-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; }
        
        .form-group { margin-bottom: 32px; }
        label { display: block; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }
        .required { color: #FF6464; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 80px; resize: vertical; }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { font-size: 12px; color: #666; margin-top: 8px; }
        .loading-indicator { display: none; font-size: 12px; color: #64C8FF; margin-top: 8px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .error { background: rgba(255, 107, 107, 0.1); color: #FF6B6B; padding: 12px; border-radius: 4px; display: none; font-size: 13px; margin-bottom: 20px; }
        .success { background: rgba(100, 200, 255, 0.1); color: #64C8FF; padding: 12px; border-radius: 4px; display: none; font-size: 13px; margin-bottom: 20px; }
        
        .analysis-preview { background: rgba(100, 200, 255, 0.1); border-left: 4px solid #64C8FF; padding: 16px; border-radius: 4px; margin-top: 12px; font-size: 12px; color: #aaa; display: none; }
        .preview-item { margin: 6px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">웹사이트 또는 인스타그램 URL만으로<br>AI가 자동 분석합니다</p>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. URL (자동 분석) -->
                <div class="form-group">
                    <label>🔗 웹사이트 또는 인스타그램 <span class="required">*</span></label>
                    <input 
                        type="url" 
                        id="brandUrl" 
                        placeholder="https://yoursite.com 또는 https://instagram.com/yourbrand"
                        required>
                    <p class="hint">URL만 입력하면 AI가 자동으로 분석합니다</p>
                    <div class="loading-indicator" id="urlLoading">🔍 분석 중...</div>
                    <div class="analysis-preview" id="preview">
                        <div class="preview-item"><strong>감지된 브랜드:</strong> <span id="previewBrand">-</span></div>
                        <div class="preview-item"><strong>서비스 유형:</strong> <span id="previewType">-</span></div>
                        <div class="preview-item"><strong>신뢰도:</strong> <span id="previewConfidence">-</span></div>
                    </div>
                </div>

                <!-- 2. 이메일 (간단히) -->
                <div class="form-group">
                    <label>📧 이메일 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com"
                        required>
                    <p class="hint">상세 리포트 수신용</p>
                </div>

                <!-- 3. 추가 정보 (선택사항) -->
                <div class="form-group">
                    <label>💬 추가로 알려주고 싶은 점 (선택)</label>
                    <textarea 
                        id="additionalInfo" 
                        placeholder="예: '최근 마케팅 비용이 크게 늘었는데 매출은 안 늘고 있어요' 같은 구체적인 상황을 알려주면 더 정확한 분석이 가능합니다."></textarea>
                    <p class="hint">선택사항이지만, 구체적일수록 분석이 정확해집니다</p>
                </div>

                <button type="submit" id="submitBtn">분석 시작 (무료)</button>
            </div>
        </form>
    </div>

    <script src="./url-analyzer.js"></script>
    <script>
        // URL 입력 시 실시간 분석 미리보기
        document.getElementById('brandUrl').addEventListener('change', async (e) => {
            const url = e.target.value.trim();
            if (!url) return;

            document.getElementById('urlLoading').style.display = 'block';
            document.getElementById('preview').style.display = 'none';

            try {
                const analyzer = new URLAnalyzer(url);
                const analysis = await analyzer.analyze();

                document.getElementById('previewBrand').textContent = analysis.brandName;
                document.getElementById('previewType').textContent = analysis.serviceType;
                document.getElementById('previewConfidence').textContent = Math.round(analysis.confidence * 100) + '%';
                
                document.getElementById('preview').style.display = 'block';
                document.getElementById('urlLoading').style.display = 'none';

                // 분석 데이터를 전역 변수에 저장 (제출 시 사용)
                window.urlAnalysisData = analysis;

            } catch (error) {
                console.error('URL 분석 오류:', error);
                document.getElementById('urlLoading').style.display = 'none';
            }
        });

        // 폼 제출
        document.getElementById('diagnosisForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const brandUrl = document.getElementById('brandUrl').value.trim();
            const email = document.getElementById('email').value.trim();
            const additionalInfo = document.getElementById('additionalInfo').value.trim();

            if (!brandUrl || !email) {
                showError('URL과 이메일은 필수입니다');
                return;
            }

            if (!window.urlAnalysisData) {
                showError('URL을 먼저 분석해주세요');
                return;
            }

            document.getElementById('submitBtn').disabled = true;

            try {
                // URL 분석 데이터 + 추가 정보 합치기
                const analysisData = {
                    ...window.urlAnalysisData,
                    email,
                    additionalInfo,
                    website: brandUrl,
                    timestamp: new Date().toISOString()
                };

                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));
                showSuccess('분석 완료! 리포트로 이동합니다...');

                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 1500);

            } catch (error) {
                console.error('오류:', error);
                showError('분석 중 오류가 발생했습니다');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
