<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAEUM Insight</title>
<meta name="description" content="CHAEUM 브랜드 전략 인사이트">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#4B4545;
color:#fff;
margin:0;
line-height:1.8;
}

.container{
max-width:900px;
margin:auto;
padding:120px 24px;
}

.back{
margin-bottom:30px;
display:inline-block;
color:#aaa;
text-decoration:none;
font-size:14px;
}

.title{
font-size:44px;
font-weight:300;
margin-bottom:10px;
}

.meta{
color:#999;
margin-bottom:40px;
}

.content{
font-size:18px;
color:#eee;
}

.content p{
margin-bottom:22px;
}

.cta{
margin-top:80px;
padding:40px;
border:1px solid rgba(255,255,255,0.1);
text-align:center;
}

.cta button{
background:white;
color:#4B4545;
border:none;
padding:12px 28px;
cursor:pointer;
margin-top:20px;
}

.error{
text-align:center;
padding:60px;
}

</style>
</head>

<body>

<div class="container">

<a class="back" href="./index.html">← 인사이트 목록으로</a>

<div id="post"></div>

</div>

<script>

async function loadPost(){

const container=document.getElementById("post")

const params=new URLSearchParams(window.location.search)

const slug=params.get("slug")

if(!slug){

container.innerHTML=`<div class="error">
<h2>글을 찾을 수 없습니다</h2>
</div>`

return
}

try{

const res=await fetch(`./data/${slug}.json`)

const post=await res.json()

container.innerHTML=`

<h1 class="title">${post.title}</h1>

<div class="meta">${post.date} · ${post.category}</div>

<div class="content">
${post.content}
</div>

<div class="cta">

<h3>브랜드 구조를 진단해보고 싶다면</h3>

<p>콘텐츠를 읽는 것과 실제 브랜드 병목을 찾는 것은 다릅니다.</p>

<button onclick="location.href='../diagnosis-talk.html'">
AI 브랜드 진단 받기
</button>

</div>

`

}catch(error){

container.innerHTML=`
<div class="error">

<h2>글을 불러오지 못했습니다</h2>

<p>${error.message}</p>

</div>
`

}

}

loadPost()

</script>

</body>
</html>
