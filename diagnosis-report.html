<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 리포트 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #fafafa; 
            color: #333; 
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        .header { 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            padding: 60px 40px; 
            border-radius: 12px; 
            margin-bottom: 40px;
            text-align: center;
        }
        h1 { font-size: 40px; font-weight: 300; margin-bottom: 8px; }
        .subtitle { font-size: 14px; opacity: 0.9; }
        
        .report-section {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #4B4545;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .info-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }
        
        .info-value {
            color: #333;
            line-height: 1.8;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 4px;
            border-left: 4px solid #4B4545;
        }
        
        .info-value a {
            color: #4A9EFF;
            text-decoration: none;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }

        .diagnosis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .diagnosis-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #f9f9f9 100%);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .diagnosis-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .diagnosis-score {
            font-size: 36px;
            font-weight: 300;
            color: #4B4545;
            margin-bottom: 4px;
        }

        .diagnosis-score-max {
            font-size: 12px;
            color: #999;
        }

        .funnel-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .funnel-stage {
            flex: 1;
            background: #f0f0f0;
            padding: 16px;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #666;
        }

        .funnel-stage.active {
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%);
            color: white;
        }

        .funnel-arrow {
            font-size: 20px;
            color: #999;
        }

        .evidence-section {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .evidence-section ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .evidence-section li {
            margin-bottom: 6px;
        }

        .evidence-label {
            color: #333;
            font-weight: 600;
        }

        .paywall-section {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 2px dashed #4B4545;
            position: relative;
        }

        .paywall-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .paywall-text {
            font-size: 14px;
            font-weight: 600;
            color: #4B4545;
            text-align: center;
            margin-bottom: 12px;
        }

        .paywall-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .blurred-content {
            filter: blur(4px);
            pointer-events: none;
            user-select: none;
        }

        .strategy-item {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 12px;
            border-left: 4px solid #4B4545;
        }

        .strategy-item-title {
            font-weight: 600;
            color: #4B4545;
            margin-bottom: 4px;
        }

        .strategy-item-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .cta-section {
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .cta-section h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .cta-section-desc {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .cta-subtext {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 24px;
        }

        .cta-button {
            background: white;
            color: #4B4545;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .error button {
            background: #c33;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .header { padding: 40px 24px; }
            .report-section { padding: 24px; }
            h1 { font-size: 28px; }
            .diagnosis-grid {
                grid-template-columns: 1fr;
            }
            .funnel-container {
                flex-direction: column;
                gap: 8px;
            }
            .funnel-arrow {
                transform: rotate(90deg);
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="brandNameDisplay">브랜드 분석</h1>
            <p class="subtitle">AI 기반 전략 분석 리포트</p>
        </div>

        <div id="errorContainer"></div>
        <div id="reportContainer"></div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            try {
                const data = JSON.parse(localStorage.getItem('diagnosisData'));

                if (!data) {
                    showError('데이터를 찾을 수 없습니다. 다시 진단을 시작해주세요.');
                    return;
                }

                console.log('로드된 데이터:', data);
                displayReport(data);

            } catch (error) {
                console.error('오류:', error);
                showError('오류가 발생했습니다. 다시 진단해주세요.');
            }
        });

        function displayReport(data) {
            const brandName = data.brandName || 'Brand';
            const serviceType = formatServiceType(data.serviceType || 'default');
            const diagnosis = data.diagnosis || { positioningScore: 0, messagingScore: 0, conversionScore: 0 };
            const funnelStages = data.funnelStrategy || ['Traffic', 'Interest', 'Trust', 'Conversion'];

            document.getElementById('brandNameDisplay').textContent = brandName;

            const reportHTML = `
                <!-- 1️⃣ 기본 정보 -->
                <div class="report-section">
                    <div class="section-title">브랜드 요약</div>
                    <div class="info-row">
                        <div class="info-label">브랜드명</div>
                        <div class="info-value">${data.brandName || '-'}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">웹사이트</div>
                        <div class="info-value"><a href="${data.website}" target="_blank">${data.website}</a></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">서비스 유형</div>
                        <div class="info-value"><span class="badge">${serviceType}</span></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">현재 메시지</div>
                        <div class="info-value">${data.currentMessaging || '-'}</div>
                    </div>
                </div>

                <!-- 2️⃣ CHAEUM 진단 (3가지 점수) -->
                <div class="report-section">
                    <div class="section-title">CHAEUM 전략 진단</div>
                    <p style="font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6;">
                        AI가 분석한 브랜드의 현재 상태를 3가지 핵심 요소로 평가했습니다.
                    </p>
                    <div class="diagnosis-grid">
                        <div class="diagnosis-card">
                            <div class="diagnosis-label">포지셔닝 선명도</div>
                            <div class="diagnosis-score">${diagnosis.positioningScore || 0}<span class="diagnosis-score-max">/100</span></div>
                            <p style="font-size: 11px; color: #999; margin-top: 8px;">브랜드 정체성 명확도</p>
                        </div>
                        <div class="diagnosis-card">
                            <div class="diagnosis-label">메시지 구조</div>
                            <div class="diagnosis-score">${diagnosis.messagingScore || 0}<span class="diagnosis-score-max">/100</span></div>
                            <p style="font-size: 11px; color: #999; margin-top: 8px;">고객 전달 효율성</p>
                        </div>
                        <div class="diagnosis-card">
                            <div class="diagnosis-label">전환 구조</div>
                            <div class="diagnosis-score">${diagnosis.conversionScore || 0}<span class="diagnosis-score-max">/100</span></div>
                            <p style="font-size: 11px; color: #999; margin-top: 8px;">고객 행동 유도도</p>
                        </div>
                    </div>
                </div>

                <!-- 3️⃣ 성장 가능성 -->
                <div class="report-section">
                    <div class="section-title">성장 가능성</div>
                    <div class="info-value">
                        ${data.growthPotential || '현재 브랜드는 충분한 성장 잠재력을 가지고 있습니다. 전략적 개선을 통해 고객 신뢰도 상승, 메시지 명확화, 그리고 전환 구조 개선이 가능합니다.'}
                    </div>
                </div>

                <!-- 4️⃣ 브랜드 퍼널 전략 -->
                <div class="report-section">
                    <div class="section-title">브랜드 퍼널 전략</div>
                    <p style="font-size: 13px; color: #666; margin-bottom: 20px;">
                        고객이 인식하고 신뢰하며 구매에 이르는 여정을 설계합니다.
                    </p>
                    <div class="funnel-container">
                        ${funnelStages.map((stage, idx) => `
                            <div>
                                <div class="funnel-stage ${idx < 2 ? 'active' : ''}">
                                    ${stage}
                                </div>
                            </div>
                            ${idx < funnelStages.length - 1 ? '<div class="funnel-arrow">→</div>' : ''}
                        `).join('')}
                    </div>
                    <p style="font-size: 12px; color: #999;">
                        ✓ 인식 단계에서 전환까지의 각 구간별 전략이 포함됩니다.
                    </p>
                </div>

                <!-- 5️⃣ 전략 리포트 Preview (Paywall) -->
                <div class="paywall-section">
                    <div class="blurred-content">
                        <div style="margin-bottom: 24px;">
                            <div class="section-title">전략 리포트 (상담 후 공개)</div>
                            <div style="display: grid; gap: 12px;">
                                <div class="strategy-item">
                                    <div class="strategy-item-title">포지셔닝 재정의</div>
                                    <div class="strategy-item-desc">현재 브랜드의 고유한 가치를 명확히 하고, 경쟁자와의 차별점을 강화합니다.</div>
                                </div>
                                <div class="strategy-item">
                                    <div class="strategy-item-title">메시지 개선</div>
                                    <div class="strategy-item-desc">고객이 이해하고 공감할 수 있는 핵심 메시지를 구성합니다.</div>
                                </div>
                                <div class="strategy-item">
                                    <div class="strategy-item-title">퍼널 설계</div>
                                    <div class="strategy-item-desc">인식 → 관심 → 신뢰 → 구매로 이어지는 명확한 경로를 설계합니다.</div>
                                </div>
                                <div class="strategy-item">
                                    <div class="strategy-item-title">콘텐츠 전략</div>
                                    <div class="strategy-item-desc">각 단계별 고객을 유도할 콘텐츠 방향과 주제를 수립합니다.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="paywall-overlay">
                        <div class="paywall-icon">🔒</div>
                        <div class="paywall-text">전략 리포트는 상담 후 공개됩니다</div>
                    </div>
                </div>

                <!-- 6️⃣ 분석 근거 -->
                <div class="report-section">
                    <div class="section-title">분석 근거</div>
                    <div class="evidence-section">
                        <p>이 분석 결과는 웹사이트의 다음 요소를 기반으로 작성되었습니다:</p>
                        <ul>
                            <li><span class="evidence-label">Page Title:</span> ${data.extractedData?.ogTitle || '-'}</li>
                            <li><span class="evidence-label">Meta Description:</span> ${data.extractedData?.metaDescription || '-'}</li>
                            <li><span class="evidence-label">H1 Tag:</span> ${data.extractedData?.h1 || '-'}</li>
                        </ul>
                    </div>
                </div>

                <!-- 7️⃣ 강화된 CTA (상담 신청 페이지로) -->
                <div class="cta-section">
                    <h2>15분 무료 전략 상담</h2>
                    <p class="cta-section-desc">
                        AI 분석 결과를 기반으로<br>
                        전략가가 성장 구조를 제안합니다
                    </p>
                    <p class="cta-subtext">
                        • 포지셔닝 강화 방안<br>
                        • 고객 신뢰 구축 전략<br>
                        • 성장 로드맵
                    </p>
                    <a href="./consultation.html" class="cta-button">상담 신청하기</a>
                </div>
            `;

            document.getElementById('reportContainer').innerHTML = reportHTML;
        }

        function formatServiceType(type) {
            const map = {
                'saas': 'B2B SaaS',
                'lifestyle': '라이프스타일',
                'food': '식품',
                'design': '디자인',
                'fintech': '핀테크',
                'health': '헬스',
                'ecommerce': '이커머스',
                'education': '교육',
                'consulting': '컨설팅',
                'default': '미분류'
            };
            return map[type] || '기타';
        }

        function showError(msg) {
            const html = `
                <div class="error">
                    <p>${msg}</p>
                    <button onclick="window.location.href='./diagnosis-talk.html'">다시 진단하기</button>
                </div>
            `;
            document.getElementById('errorContainer').innerHTML = html;
        }
    </script>
</body>
</html>
