<script src="./analyze-engine.js"></script>
<script>
    // 사용자 데이터 로드
    const rawData = JSON.parse(localStorage.getItem('diagnosisData') || '{}');
    
    // ✅ 분석 엔진 실행 (더미 데이터 대신 실제 분석)
    const engine = new BrandAnalysisEngine(rawData);
    const report = engine.generateReport();
    
    console.log('분석 결과:', report); // 디버깅용
    
    // ===== HEADER =====
    document.getElementById('brandName').textContent = report.metadata.brandName;
    document.getElementById('industryTag').textContent = rawData.serviceType.toUpperCase();
    
    // 점수 렌더링
    const msg = report.sections.message.data;
    const pos = report.sections.positioning.data;
    const funnel = report.sections.funnel.data;
    
    function getGrade(score) {
        if (score >= 85) return 'A+';
        if (score >= 80) return 'A';
        if (score >= 75) return 'B+';
        if (score >= 70) return 'B';
        if (score >= 65) return 'B-';
        if (score >= 60) return 'C+';
        return 'C';
    }
    
    document.getElementById('s1').textContent = msg.score;
    document.getElementById('g1').textContent = getGrade(msg.score);
    document.getElementById('s2').textContent = Math.round((pos.coordinates.x + pos.coordinates.y) / 2);
    document.getElementById('g2').textContent = getGrade((pos.coordinates.x + pos.coordinates.y) / 2);
    document.getElementById('s3').textContent = funnel.score;
    document.getElementById('g3').textContent = getGrade(funnel.score);
    document.getElementById('total').textContent = report.totalScore;
    document.getElementById('gtotal').textContent = report.grade;
    
    // ===== SECTION 1: POSITIONING =====
    document.getElementById('positioningInsight').innerHTML = `<strong>${pos.analysis.insight}</strong>`;
    document.getElementById('positioningData').innerHTML = `<strong>근거:</strong> ${pos.analysis.evidence}`;
    
    // 2축 그래프
    const chart = document.getElementById('positioningChart');
    const brandDot = document.createElement('div');
    brandDot.className = 'brand-dot';
    brandDot.style.left = `${50 + (pos.coordinates.x - 50) * 0.6}%`;
    brandDot.style.top = `${50 - (pos.coordinates.y - 50) * 0.6}%`;
    chart.appendChild(brandDot);
    
    // ===== SECTION 2: MESSAGE =====
    document.getElementById('msgScore').textContent = msg.score;
    document.getElementById('msgInsight').innerHTML = `<strong>${msg.analysis.insight}</strong>`;
    
    // ===== SECTION 3: CONTENT =====
    const cs = report.sections.content.data.ratios;
    const maxVal = Math.max(cs.product, cs.lifestyle, cs.story);
    
    document.getElementById('contentChart').innerHTML = `
        <div class="bar-item">
            <div class="bar" style="height: ${cs.product / maxVal * 180}px;">
                <div class="bar-value">${cs.product}%</div>
            </div>
            <div class="bar-label">제품 중심</div>
        </div>
        <div class="bar-item">
            <div class="bar" style="height: ${cs.lifestyle / maxVal * 180}px;">
                <div class="bar-value">${cs.lifestyle}%</div>
            </div>
            <div class="bar-label">라이프스타일</div>
        </div>
        <div class="bar-item">
            <div class="bar" style="height: ${cs.story / maxVal * 180}px;">
                <div class="bar-value">${cs.story}%</div>
            </div>
            <div class="bar-label">스토리</div>
        </div>
    `;
    
    document.getElementById('contentInsight').innerHTML = `<strong>${report.sections.content.data.analysis.insight}</strong>`;
    
    // ===== SECTION 4: FUNNEL =====
    document.getElementById('funnelInsight').innerHTML = `<strong>${funnel.analysis.insight}</strong>`;
    
    // ===== SYSTEM LEAK =====
    const leak = report.systemLeak;
    document.getElementById('systemLeak').innerHTML = `
        <strong>${leak.verdict}</strong><br><br>
        ${leak.evidence.map(e => `• ${e}`).join('<br>')}<br><br>
        <strong>예상 손실:</strong> ${leak.estimatedWaste}
    `;
</script>
