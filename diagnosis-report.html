<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 리포트 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #fafafa; 
            color: #333; 
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        .header { 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            padding: 60px 40px; 
            border-radius: 12px; 
            margin-bottom: 40px;
            text-align: center;
        }
        h1 { font-size: 40px; font-weight: 300; margin-bottom: 8px; }
        .subtitle { font-size: 14px; opacity: 0.8; }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: #666;
        }
        
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #ddd;
            border-top: 3px solid #4B4545;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .error button {
            background: #c33;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .report-section {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #4B4545;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .info-row {
            display: flex;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            width: 120px;
            flex-shrink: 0;
        }
        
        .info-value {
            color: #333;
            flex: 1;
            word-break: break-all;
        }
        
        .cta {
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        
        .cta h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .cta p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .cta-button {
            background: white;
            color: #4B4545;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .header { padding: 40px 24px; }
            .report-section { padding: 24px; }
            h1 { font-size: 28px; }
            .info-row { flex-direction: column; }
            .info-label { width: 100%; margin-bottom: 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="brandNameDisplay">브랜드 분석</h1>
            <p class="subtitle">AI 자동 분석 리포트</p>
        </div>

        <div id="loadingContainer" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>리포트를 생성 중입니다...</p>
        </div>

        <div id="errorContainer" style="display: none;"></div>

        <div id="reportContainer" style="display: none;">
            <!-- 기본 정보 -->
            <div class="report-section">
                <div class="section-title">기본 정보</div>
                <div class="info-row">
                    <div class="info-label">브랜드명</div>
                    <div class="info-value" id="brandName">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">웹사이트</div>
                    <div class="info-value"><a id="website" href="#" target="_blank" style="color: #4A9EFF; text-decoration: none;">-</a></div>
                </div>
                <div class="info-row">
                    <div class="info-label">이메일</div>
                    <div class="info-value" id="emailDisplay">-</div>
                </div>
            </div>

            <!-- 분석 결과 -->
            <div class="report-section">
                <div class="section-title">AI 분석 결과</div>
                <div class="info-row">
                    <div class="info-label">서비스 유형</div>
                    <div class="info-value" id="serviceType">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">서비스 설명</div>
                    <div class="info-value" id="serviceDesc">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">주요 메시지</div>
                    <div class="info-value" id="mainMessage">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">타깃 고민</div>
                    <div class="info-value" id="painPoint">-</div>
                </div>
            </div>

            <!-- CTA -->
            <div class="cta">
                <h2>다음 단계</h2>
                <p>AI 분석과 전문가 상담을 통해<br>당신의 브랜드 성장 전략을 수립하세요</p>
                <a href="https://cal.com/chaeum" target="_blank" class="cta-button">20분 무료 상담 예약</a>
            </div>
        </div>
    </div>

    <script>
        async function loadReport() {
            try {
                // localStorage에서 데이터 로드
                const diagnosisData = JSON.parse(localStorage.getItem('diagnosisData'));

                if (!diagnosisData) {
                    showError('데이터를 찾을 수 없습니다. 다시 진단을 시작해주세요.');
                    return;
                }

                // 로딩 표시
                document.getElementById('loadingContainer').style.display = 'block';

                // URL 분석 데이터 다시 가져오기
                const response = await fetch(`/api/analyze?url=${encodeURIComponent(diagnosisData.website)}`);
                const apiData = await response.json();

                // 로딩 숨김
                document.getElementById('loadingContainer').style.display = 'none';

                // 리포트 표시
                displayReport(diagnosisData, apiData);

            } catch (error) {
                console.error('리포트 로드 오류:', error);
                document.getElementById('loadingContainer').style.display = 'none';
                showError('리포트를 불러오는 중 오류가 발생했습니다. 다시 시도해주세요.');
            }
        }

        function displayReport(diagnosisData, apiData) {
            // 헤더
            document.getElementById('brandNameDisplay').textContent = diagnosisData.brandName || 'Brand';

            // 기본 정보
            document.getElementById('brandName').textContent = diagnosisData.brandName || '-';
            const websiteLink = document.getElementById('website');
            websiteLink.textContent = diagnosisData.website || '-';
            websiteLink.href = diagnosisData.website || '#';
            document.getElementById('emailDisplay').textContent = diagnosisData.email || '-';

            // 분석 결과 (API 데이터)
            const serviceType = detectServiceType(apiData.service || '');
            document.getElementById('serviceType').textContent = serviceType || 'lifestyle';
            document.getElementById('serviceDesc').textContent = apiData.service || '웹사이트 분석 결과를 기반으로 한 설명입니다.';
            document.getElementById('mainMessage').textContent = apiData.currentMessaging || apiData.brandName || '-';
            document.getElementById('painPoint').textContent = apiData.painPoint || '타깃 고객의 주요 고민을 분석 중입니다.';

            // 리포트 표시
            document.getElementById('reportContainer').style.display = 'block';
        }

        function detectServiceType(text) {
            const lower = text.toLowerCase();
            if (lower.match(/saas|app|tool|platform/)) return 'SaaS';
            if (lower.match(/beauty|cosmetic|lifestyle/)) return '라이프스타일';
            if (lower.match(/food|cafe|restaurant/)) return '식품';
            if (lower.match(/design|creative/)) return '디자인';
            if (lower.match(/fintech|payment/)) return '핀테크';
            if (lower.match(/health|fitness/)) return '헬스';
            if (lower.match(/shop|store|ecommerce/)) return '이커머스';
            if (lower.match(/course|education/)) return '교육';
            if (lower.match(/consulting|strategy/)) return '컨설팅';
            return '라이프스타일';
        }

        function showError(msg) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `
                <div class="error">
                    <p>${msg}</p>
                    <button onclick="window.location.href='./diagnosis-talk.html'">다시 진단하기</button>
                </div>
            `;
            errorContainer.style.display = 'block';
        }

        // 페이지 로드 시 리포트 로드
        window.addEventListener('load', loadReport);
    </script>
</body>
</html>
