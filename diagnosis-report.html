<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 분석 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; min-height: 100vh; display: flex; align-items: center; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 36px; font-weight: 300; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #aaa; line-height: 1.6; }
        .form-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .required { color: #FF6464; }
        
        input, textarea, select { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            color: white; 
            font-size: 14px;
        }
        textarea { min-height: 80px; resize: vertical; }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.12); 
        }
        
        .hint { font-size: 12px; color: #666; margin-top: 6px; }
        .guide-box { background: rgba(74, 158, 255, 0.1); border-left: 3px solid #4A9EFF; padding: 12px; border-radius: 4px; font-size: 12px; color: #aaa; margin-bottom: 20px; }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: white; 
            color: #4B4545; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading { display: none; text-align: center; margin-top: 20px; }
        .spinner { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error { color: #FF6B6B; font-size: 13px; margin-top: 12px; background: rgba(255, 107, 107, 0.1); padding: 12px; border-radius: 4px; display: none; }
        .success { color: #64C8FF; font-size: 13px; margin-top: 12px; background: rgba(100, 200, 255, 0.1); padding: 12px; border-radius: 4px; display: none; }
        
        .steps { display: flex; justify-content: space-between; margin-top: 40px; font-size: 12px; color: #666; }
        .step { text-align: center; }
        .step-num { display: block; font-weight: 600; color: #888; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>브랜드 진단</h1>
            <p class="subtitle">AI로 분석하는<br>당신의 브랜드 포지셔닝과 시스템 누수</p>
        </div>

        <form id="diagnosisForm">
            <div class="form-section">
                <!-- 1. 브랜드명 -->
                <div class="form-group">
                    <label>브랜드명 <span class="required">*</span></label>
                    <input type="text" id="brandName" placeholder="예: 케이알케이, 더데이" required>
                    <p class="hint">분석할 브랜드 이름</p>
                </div>

                <!-- 2. 서비스 설명 -->
                <div class="form-group">
                    <label>서비스/제품 설명 <span class="required">*</span></label>
                    <textarea id="service" placeholder="예: 식품 라벨 생성 SaaS로 1인 창업자의 제품 런칭을 돕습니다" required></textarea>
                    <p class="hint">무엇을 팔고 있는지 구체적으로 설명해주세요</p>
                </div>

                <!-- 3. 타깃 고객 -->
                <div class="form-group">
                    <label>타깃 고객 <span class="required">*</span></label>
                    <input type="text" id="target" placeholder="예: 30대 여성, 월 매출 1000만원 이상의 소상공인" required>
                    <p class="hint">누구에게 팔고 있는가?</p>
                </div>

                <!-- 4. 웹사이트 URL -->
                <div class="form-group">
                    <label>웹사이트 또는 인스타그램 <span class="required">*</span></label>
                    <div class="guide-box">💡 팁: 브랜드 공식 사이트 또는 인스타그램 프로필</div>
                    <input type="url" id="brandUrl" placeholder="https://example.com" required>
                    <p class="hint">분석할 온라인 채널</p>
                </div>

                <!-- 5. 현재 고민 -->
                <div class="form-group">
                    <label>가장 큰 고민은? <span class="required">*</span></label>
                    <select id="pain" required>
                        <option value="">선택해주세요</option>
                        <option value="awareness">1. 브랜드 인지도 부족 (사람들이 모름)</option>
                        <option value="conversion">2. 판매 전환 어려움 (봐도 안 삼)</option>
                        <option value="message">3. 메시지 전달 혼란 (뭔지 모호)</option>
                        <option value="content">4. 콘텐츠 전략 부재 (뭘 해야하나)</option>
                        <option value="positioning">5. 포지셔닝 불명확 (차별점 부족)</option>
                    </select>
                    <p class="hint">가장 시급한 문제를 선택하세요</p>
                </div>

                <!-- 6. 이메일 -->
                <div class="form-group">
                    <label>이메일 주소 <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                    <p class="hint">상세 리포트를 받을 이메일</p>
                </div>

                <!-- 제출 버튼 -->
                <button type="submit" id="submitBtn">분석 시작 (무료)</button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="font-size: 13px; color: #888;">분석 중입니다...<br>약 3초 소요됩니다</p>
                </div>
                
                <div class="success" id="success"></div>
                <div class="error" id="error"></div>
            </div>
        </form>

        <div class="steps">
            <div class="step">
                <span class="step-num">1</span>
                정보 입력
            </div>
            <div class="step">
                <span class="step-num">2</span>
                분석 진행
            </div>
            <div class="step">
                <span class="step-num">3</span>
                리포트 생성
            </div>
            <div class="step">
                <span class="step-num">4</span>
                전략 제시
            </div>
        </div>
    </div>

    <script>
        // URL 입력창에 기본값 추가
        document.getElementById('brandUrl').addEventListener('focus', function() {
            if (!this.value) {
                this.value = 'https://';
                this.setSelectionRange(8, 8);
            }
        });

        document.getElementById('diagnosisForm').onsubmit = async (e) => {
            e.preventDefault();

            const brandName = document.getElementById('brandName').value.trim();
            const service = document.getElementById('service').value.trim();
            const target = document.getElementById('target').value.trim();
            const brandUrl = document.getElementById('brandUrl').value.trim();
            const pain = document.getElementById('pain').value;
            const email = document.getElementById('email').value.trim();

            // 검증
            if (!brandName || !service || !target || !brandUrl || !pain || !email) {
                showError('모든 필드를 입력해주세요');
                return;
            }

            if (!brandUrl.startsWith('http')) {
                showError('URL은 http:// 또는 https://로 시작해야 합니다');
                return;
            }

            // UI 업데이트
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            hideError();
            hideSuccess();

            try {
                // 분석 데이터 생성 (사용자 입력 기반)
                const analysis = generateDetailedAnalysis(brandName, service, target, pain);
                
                // 분석 데이터 저장
                const analysisData = {
                    name: brandName,
                    brandName: brandName,
                    service: service,
                    target: target,
                    email: email,
                    website: brandUrl,
                    consultation: pain,
                    analysis: analysis
                };

                localStorage.setItem('diagnosisData', JSON.stringify(analysisData));
                sessionStorage.setItem('diagnosisData', JSON.stringify(analysisData));

                // 성공 메시지
                showSuccess('분석이 완료되었습니다! 리포트 페이지로 이동합니다...');

                // 1.5초 후 리포트 페이지로 이동
                setTimeout(() => {
                    window.location.href = './diagnosis-report.html';
                }, 1500);

            } catch (error) {
                console.error('분석 오류:', error);
                showError('오류가 발생했습니다. 다시 시도해주세요.');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        };

        function generateDetailedAnalysis(brandName, service, target, pain) {
            // 고민 내용에 따른 맞춤형 분석
            let analysis = {
                critical_diagnosis: `"${brandName}"은(는) ${service} 서비스를 제공하고 있으며, 주요 타깃은 ${target}입니다. 현재 시장에서 명확한 위치를 확보하지 못하고 있습니다.`,
                summary_verdict: '',
                metrics: {
                    message_clarity: 0,
                    differentiation: 0,
                    conversion_path: 0
                },
                strategic_gaps: [],
                contentStructure: {
                    product: 0,
                    lifestyle: 0,
                    story: 0
                }
            };

            // 고민별 맞춤형 분석
            if (pain === 'awareness') {
                analysis.summary_verdict = '브랜드 인지도 부족 - 시장 진입 단계의 도전';
                analysis.metrics.message_clarity = 48;
                analysis.metrics.differentiation = 35;
                analysis.metrics.conversion_path = 45;
                analysis.contentStructure.product = 72;
                analysis.contentStructure.lifestyle = 18;
                analysis.contentStructure.story = 10;
                analysis.strategic_gaps = [
                    { problem: '포지셔닝 모호 - 차별점 미명시', impact: '고객이 경쟁사와 구분 불가' },
                    { problem: '마케팅 채널 약화', impact: '유입 자체가 부족한 상태' },
                    { problem: '브랜드 스토리 부재', impact: '입소문과 팬덤 형성 불가' }
                ];
            } else if (pain === 'conversion') {
                analysis.summary_verdict = '유입은 있으나 판매 전환 저조 - 신뢰 결여';
                analysis.metrics.message_clarity = 62;
                analysis.metrics.differentiation = 55;
                analysis.metrics.conversion_path = 38;
                analysis.contentStructure.product = 65;
                analysis.contentStructure.lifestyle = 25;
                analysis.contentStructure.story = 10;
                analysis.strategic_gaps = [
                    { problem: '신뢰 증거 부재 (후기, 인증, 사례)', impact: '구매 결정 단계에서 객관성 결여' },
                    { problem: '구매 경로 복잡성', impact: '명확한 CTA 및 구매 동선 부족' },
                    { problem: '가격 정당화 부족', impact: '가성비 의심으로 인한 이탈' }
                ];
            } else if (pain === 'message') {
                analysis.summary_verdict = '메시지 혼선 - 브랜드 정체성 불명확';
                analysis.metrics.message_clarity = 38;
                analysis.metrics.differentiation = 42;
                analysis.metrics.conversion_path = 52;
                analysis.contentStructure.product = 55;
                analysis.contentStructure.lifestyle = 30;
                analysis.contentStructure.story = 15;
                analysis.strategic_gaps = [
                    { problem: '핵심 메시지 산재', impact: '고객이 브랜드를 한 문장으로 정의 불가' },
                    { problem: '톤 일관성 부족', impact: '채널마다 다른 메시지 전달' },
                    { problem: '포지셔닝 혼재', impact: '프리미엄인지 대중적인지 모호' }
                ];
            } else if (pain === 'content') {
                analysis.summary_verdict = '콘텐츠 전략 부재 - 일관된 스토리 없음';
                analysis.metrics.message_clarity = 55;
                analysis.metrics.differentiation = 48;
                analysis.metrics.conversion_path = 50;
                analysis.contentStructure.product = 78;
                analysis.contentStructure.lifestyle = 14;
                analysis.contentStructure.story = 8;
                analysis.strategic_gaps = [
                    { problem: '제품 중심의 편협한 콘텐츠', impact: '단기 매출에만 집중, 팬덤 형성 불가' },
                    { problem: '스토리 시스템 부재', impact: '브랜드 감정 공유 불가' },
                    { problem: '콘텐츠 칼렌더 부족', impact: '일관성 있는 마케팅 불가' }
                ];
            } else if (pain === 'positioning') {
                analysis.summary_verdict = '포지셔닝 불명확 - 차별점 모호';
                analysis.metrics.message_clarity = 52;
                analysis.metrics.differentiation = 28;
                analysis.metrics.conversion_path = 48;
                analysis.contentStructure.product = 62;
                analysis.contentStructure.lifestyle = 22;
                analysis.contentStructure.story = 16;
                analysis.strategic_gaps = [
                    { problem: '경쟁사와의 구분 불가', impact: '고객 선택 기준 명확하지 않음' },
                    { problem: '시장에서의 위치 미정의', impact: '프리미엄/대중 등 혼재' },
                    { problem: '독점적 가치 부재', impact: '선택 이유 약화' }
                ];
            }

            // 공통 상담 미리보기
            analysis.consulting_preview = `20분 상담에서는 "${brandName}"의 ${target} 타깃에 대한 심화 분석, 시장 포지셔닝 전략, 그리고 즉시 실행 가능한 3개월 로드맵을 제시하겠습니다.`;
            
            // 종합 점수 계산
            analysis.total_score = Math.round((analysis.metrics.message_clarity + analysis.metrics.differentiation + analysis.metrics.conversion_path) / 3);

            return analysis;
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        function showSuccess(message) {
            const successEl = document.getElementById('success');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        function hideSuccess() {
            document.getElementById('success').style.display = 'none';
        }
    </script>
</body>
</html>
