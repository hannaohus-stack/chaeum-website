<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 분석 리포트 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        .header { background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; padding: 60px 40px; border-radius: 12px; margin-bottom: 40px; }
        .header h1 { font-size: 32px; font-weight: 300; margin-bottom: 8px; }
        .header p { font-size: 14px; color: rgba(255,255,255,0.7); }
        
        .score-box { background: white; padding: 30px; border-radius: 12px; margin-top: 30px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .score-item { text-align: center; }
        .score-number { font-size: 48px; font-weight: bold; color: #4B4545; }
        .score-label { font-size: 12px; color: #888; margin-top: 8px; }
        
        .section { background: white; padding: 40px; border-radius: 12px; margin-bottom: 24px; }
        .section-title { font-size: 18px; font-weight: 600; color: #4B4545; margin-bottom: 24px; display: flex; gap: 8px; align-items: center; }
        .section-num { width: 32px; height: 32px; background: #4B4545; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
        
        .chart { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #f9f9f9; border-radius: 8px; }
        .chart-svg { width: 100%; height: 100%; }
        
        .insight-box { background: #f9f9f9; padding: 20px; border-left: 4px solid #FF6B6B; border-radius: 4px; margin-top: 20px; }
        .insight-box p { font-size: 14px; color: #555; line-height: 1.6; }
        
        .bar-chart { display: flex; gap: 20px; align-items: flex-end; height: 150px; }
        .bar { flex: 1; background: #4B4545; border-radius: 4px 4px 0 0; position: relative; }
        .bar-label { position: absolute; bottom: -24px; left: 0; right: 0; text-align: center; font-size: 12px; color: #666; }
        .bar-value { position: absolute; top: -24px; left: 0; right: 0; text-align: center; font-weight: 600; color: #4B4545; }
        
        .cta { background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; padding: 40px; border-radius: 12px; text-align: center; margin-top: 40px; }
        .cta h3 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .cta p { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 24px; }
        .cta-btn { display: inline-block; background: white; color: #4B4545; padding: 14px 32px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .score-box { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1 id="brandName">브랜드명</h1>
            <p>AI 브랜드 포지셔닝 분석 리포트</p>
            <div class="score-box">
                <div class="score-item">
                    <div class="score-number" id="posScore">-</div>
                    <div class="score-label">포지셔닝</div>
                </div>
                <div class="score-item">
                    <div class="score-number" id="msgScore">-</div>
                    <div class="score-label">메시지 명확도</div>
                </div>
                <div class="score-item">
                    <div class="score-number" id="contentScore">-</div>
                    <div class="score-label">콘텐츠 전략</div>
                </div>
                <div class="score-item">
                    <div class="score-number" id="funnelScore">-</div>
                    <div class="score-label">퍼널 효율</div>
                </div>
            </div>
        </div>

        <!-- SECTION 1: POSITIONING -->
        <div class="section">
            <div class="section-title">
                <div class="section-num">1</div>
                포지셔닝 분석 (시장 위치)
            </div>
            <div class="grid-2">
                <div>
                    <svg class="chart-svg" viewBox="0 0 200 200">
                        <defs>
                            <style>.axis { stroke: #ddd; stroke-width: 1; } .dot { fill: #4B4545; } .competitor { fill: #aaa; opacity: 0.5; }</style>
                        </defs>
                        <line class="axis" x1="20" y1="100" x2="180" y2="100"/>
                        <line class="axis" x1="100" y1="20" x2="100" y2="180"/>
                        <circle class="dot" r="6" id="brandDot" cx="100" cy="100"/>
                        <text x="190" y="105" font-size="10" fill="#999">감성→</text>
                        <text x="105" y="20" font-size="10" fill="#999">프리미엄→</text>
                    </svg>
                </div>
                <div>
                    <div id="positioningInsight" style="font-size: 14px; line-height: 1.8; color: #555;"></div>
                </div>
            </div>
        </div>

        <!-- SECTION 2: MESSAGE -->
        <div class="section">
            <div class="section-title">
                <div class="section-num">2</div>
                메시지 일관성
            </div>
            <div id="msgContent"></div>
        </div>

        <!-- SECTION 3: CONTENT -->
        <div class="section">
            <div class="section-title">
                <div class="section-num">3</div>
                콘텐츠 구조 분석
            </div>
            <div class="bar-chart" id="contentChart"></div>
            <div id="contentInsight"></div>
        </div>

        <!-- SECTION 4: FUNNEL -->
        <div class="section">
            <div class="section-title">
                <div class="section-num">4</div>
                퍼널 효율 분석
            </div>
            <div id="funnelContent"></div>
        </div>

        <!-- CTA -->
        <div class="cta">
            <h3>이 분석은 시작일 뿐입니다</h3>
            <p>AI의 객관적 진단과 전문가의 실행 전략이 만나는 20분 상담에서<br>당신의 브랜드 성장 로드맵을 함께 그려보세요.</p>
            <button class="cta-btn" onclick="window.location.href='https://cal.com/chaeum'">무료 전략 상담 예약</button>
        </div>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('brandAnalysis')) || getDefaultData();

        function render() {
            const analysis = data.analysis;

            // Header scores
            document.getElementById('posScore').textContent = Math.round((analysis.positioning.x + analysis.positioning.y) / 2);
            document.getElementById('msgScore').textContent = analysis.messageClarity.score;
            document.getElementById('contentScore').textContent = Math.round((100 - Math.abs(50 - analysis.contentStructure.story)) * 1.2);
            document.getElementById('funnelScore').textContent = analysis.funnelStatus.score;

            // Section 1: Positioning
            document.getElementById('positioningInsight').innerHTML = `
                <p><strong>현재 위치:</strong> X축 ${analysis.positioning.x}/100, Y축 ${analysis.positioning.y}/100</p>
                <div class="insight-box">
                    <p>${analysis.positioning.insight}</p>
                </div>
            `;

            // Section 2: Message
            document.getElementById('msgContent').innerHTML = `
                <div style="margin-bottom: 20px;">
                    <p style="font-size: 14px; color: #555; line-height: 1.8;">
                        <strong>명확도 점수: ${analysis.messageClarity.score}/100</strong><br>
                        키워드: ${analysis.messageClarity.keywords.join(', ')}
                    </p>
                </div>
                <div class="insight-box">
                    <p>${analysis.messageClarity.issue}</p>
                </div>
            `;

            // Section 3: Content
            const contentData = [
                { name: '제품', value: analysis.contentStructure.product },
                { name: '라이프스타일', value: analysis.contentStructure.lifestyle },
                { name: '스토리', value: analysis.contentStructure.story }
            ];

            let barHTML = '';
            contentData.forEach(item => {
                barHTML += `
                    <div class="bar" style="height: ${item.value * 1.5}px;">
                        <div class="bar-value">${item.value}%</div>
                        <div class="bar-label">${item.name}</div>
                    </div>
                `;
            });
            document.getElementById('contentChart').innerHTML = barHTML;

            document.getElementById('contentInsight').innerHTML = `
                <div class="insight-box" style="margin-top: 30px;">
                    <p>${analysis.contentStructure.diagnosis}</p>
                </div>
            `;

            // Section 4: Funnel
            document.getElementById('funnelContent').innerHTML = `
                <p style="font-size: 14px; color: #555; margin-bottom: 20px;">
                    <strong>퍼널 효율 점수: ${analysis.funnelStatus.score}/100</strong>
                </p>
                <div class="insight-box">
                    <p><strong>누수 지점:</strong> ${analysis.funnelStatus.leaks.join(', ')}</p>
                    <p style="margin-top: 12px;">${analysis.funnelStatus.systemAlert}</p>
                </div>
            `;

            // Positioning dot
            const dot = document.getElementById('brandDot');
            dot.setAttribute('cx', 20 + (analysis.positioning.x / 100) * 160);
            dot.setAttribute('cy', 180 - (analysis.positioning.y / 100) * 160);
        }

        function getDefaultData() {
            return {
                analysis: {
                    positioning: { x: 65, y: 45, insight: "포지셔닝 분석" },
                    messageClarity: { score: 62, keywords: ["제품", "가성비"], issue: "메시지 명확도 부족" },
                    contentStructure: { product: 58, lifestyle: 28, story: 14, diagnosis: "스토리 근육 부족" },
                    funnelStatus: { score: 55, leaks: ["CTA 부재"], systemAlert: "누수 발생 중" },
                    overallScore: 58
                }
            };
        }

        render();
    </script>
</body>
</html>
