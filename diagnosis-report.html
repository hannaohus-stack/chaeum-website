<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 리포트 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #fafafa; 
            color: #333; 
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        .header { 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            padding: 60px 40px; 
            border-radius: 12px; 
            margin-bottom: 40px;
            text-align: center;
        }
        h1 { font-size: 40px; font-weight: 300; margin-bottom: 8px; }
        .subtitle { font-size: 14px; opacity: 0.8; }
        
        .report-section {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #4B4545;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .info-row {
            display: flex;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            width: 140px;
            flex-shrink: 0;
        }
        
        .info-value {
            color: #333;
            flex: 1;
            word-break: break-word;
            line-height: 1.6;
        }
        
        .info-value a {
            color: #4A9EFF;
            text-decoration: none;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .cta {
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        
        .cta h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .cta p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .cta-button {
            background: white;
            color: #4B4545;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .error button {
            background: #c33;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="brandNameDisplay">브랜드 분석</h1>
            <p class="subtitle">AI 자동 분석 리포트</p>
        </div>

        <div id="errorContainer"></div>
        <div id="reportContainer"></div>
    </div>

    <script>
    window.addEventListener('DOMContentLoaded', function() {
        try {
            const data = JSON.parse(localStorage.getItem('diagnosisData'));

            if (!data) {
                showError('데이터를 찾을 수 없습니다. 다시 진단을 시작해주세요.');
                return;
            }

            console.log('로드된 데이터:', data);
            displayReport(data);

        } catch (error) {
            console.error('오류:', error);
            showError('오류가 발생했습니다. 다시 진단해주세요.');
        }
    });

    function displayReport(data) {
        const brandName = data.brandName || 'Brand';
        const serviceType = formatServiceType(data.serviceType || 'default');

        const scores = data.scores || {
            brandClarity: 0,
            messageStrength: 0,
            trustStructure: 0,
            conversionStructure: 0,
            growthReadiness: 0
        };

        const funnel = data.funnelDiagnosis || {};
        const stage = data.stage || 'Early';

        document.getElementById('brandNameDisplay').textContent = brandName;

        const reportHTML = `
            <!-- 1️⃣ 브랜드 요약 -->
            <div class="report-section">
                <div class="section-title">브랜드 요약</div>

                <div class="info-row">
                    <div class="info-label">브랜드명</div>
                    <div class="info-value">${escapeHtml(brandName)}</div>
                </div>

                <div class="info-row">
                    <div class="info-label">웹사이트</div>
                    <div class="info-value">
                        <a href="${escapeAttribute(data.website || '#')}" target="_blank" rel="noopener noreferrer">
                            ${escapeHtml(data.website || '-')}
                        </a>
                    </div>
                </div>

                <div class="info-row">
                    <div class="info-label">서비스 유형</div>
                    <div class="info-value">
                        <span class="badge">${escapeHtml(serviceType)}</span>
                    </div>
                </div>

                <div class="info-row">
                    <div class="info-label">브랜드 성장 단계</div>
                    <div class="info-value">
                        <span class="badge">${escapeHtml(stage)}</span>
                    </div>
                </div>
            </div>

            <!-- 2️⃣ CHAEUM 전략 진단 -->
            <div class="report-section">
                <div class="section-title">CHAEUM 전략 진단</div>
                <p style="font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6;">
                    AI가 웹사이트 구조를 바탕으로 브랜드의 핵심 병목을 분석했습니다.
                </p>

                <div class="diagnosis-grid">
                    <div class="diagnosis-card">
                        <div class="diagnosis-label">브랜드 선명도</div>
                        <div class="diagnosis-score">${safeNumber(scores.brandClarity)}<span class="diagnosis-score-max">/100</span></div>
                        <p style="font-size: 11px; color: #999; margin-top: 8px;">브랜드 방향성 명확도</p>
                    </div>

                    <div class="diagnosis-card">
                        <div class="diagnosis-label">메시지 전달력</div>
                        <div class="diagnosis-score">${safeNumber(scores.messageStrength)}<span class="diagnosis-score-max">/100</span></div>
                        <p style="font-size: 11px; color: #999; margin-top: 8px;">고객 이해 가능성</p>
                    </div>

                    <div class="diagnosis-card">
                        <div class="diagnosis-label">전환 구조</div>
                        <div class="diagnosis-score">${safeNumber(scores.conversionStructure)}<span class="diagnosis-score-max">/100</span></div>
                        <p style="font-size: 11px; color: #999; margin-top: 8px;">행동 유도 구조</p>
                    </div>
                </div>
            </div>

            <!-- 3️⃣ 핵심 병목 -->
            <div class="report-section">
                <div class="section-title">현재 핵심 병목</div>

                <div class="info-row">
                    <div class="info-label">핵심 병목</div>
                    <div class="info-value">${escapeHtml(data.bottleneckLabel || '브랜드 구조 분석 중')}</div>
                </div>

                <div class="info-row">
                    <div class="info-label">총평</div>
                    <div class="info-value">${escapeHtml(data.summary || '브랜드 구조를 바탕으로 핵심 이슈를 분석했습니다.')}</div>
                </div>

                <div class="info-row">
                    <div class="info-label">가장 강한 자산</div>
                    <div class="info-value">${escapeHtml(data.strongestAsset || '확인 중')}</div>
                </div>
            </div>

            <!-- 4️⃣ CHAEUM Insight -->
            <div class="report-section">
                <div class="section-title">CHAEUM Insight</div>
                <div class="info-value">
                    ${escapeHtml(data.chaeumInsight || '채움 관점에서 브랜드 구조 정리가 우선 필요합니다.')}
                </div>
            </div>

            <!-- 5️⃣ 브랜드 퍼널 진단 -->
            <div class="report-section">
                <div class="section-title">브랜드 퍼널 진단</div>

                <div class="info-row">
                    <div class="info-label">Awareness</div>
                    <div class="info-value">${escapeHtml(funnel.awareness || '-')}</div>
                </div>

                <div class="info-row">
                    <div class="info-label">Trust</div>
                    <div class="info-value">${escapeHtml(funnel.trust || '-')}</div>
                </div>

                <div class="info-row">
                    <div class="info-label">Conversion</div>
                    <div class="info-value">${escapeHtml(funnel.conversion || '-')}</div>
                </div>
            </div>

            <!-- 6️⃣ 전략 리포트 Preview (Paywall) -->
            <div class="paywall-section">
                <div class="blurred-content">
                    <div style="margin-bottom: 24px;">
                        <div class="section-title">전략 리포트 (상담 후 공개)</div>

                        <div class="strategy-item">
                            <div class="strategy-item-title">브랜드 포지셔닝 재설계</div>
                            <div class="strategy-item-desc">
                                경쟁 브랜드 대비 차별화 구조 설계
                            </div>
                        </div>

                        <div class="strategy-item">
                            <div class="strategy-item-title">메시지 구조 개선</div>
                            <div class="strategy-item-desc">
                                고객이 이해하는 한 문장 가치 제안 설계
                            </div>
                        </div>

                        <div class="strategy-item">
                            <div class="strategy-item-title">브랜드 퍼널 구조 설계</div>
                            <div class="strategy-item-desc">
                                Traffic → Trust → Conversion 구조 설계
                            </div>
                        </div>

                        <div class="strategy-item">
                            <div class="strategy-item-title">콘텐츠 방향 정리</div>
                            <div class="strategy-item-desc">
                                브랜드 인지부터 문의 전환까지 이어지는 콘텐츠 흐름 설계
                            </div>
                        </div>
                    </div>
                </div>

                <div class="paywall-overlay">
                    <div class="paywall-icon">🔒</div>
                    <div class="paywall-text">전체 전략 리포트는 상담 후 제공됩니다</div>
                </div>
            </div>

            <!-- 7️⃣ 분석 근거 -->
            <div class="report-section">
                <div class="section-title">분석 근거</div>
                <div class="evidence-section">
                    <p>이 분석 결과는 웹사이트의 다음 요소를 기반으로 작성되었습니다:</p>
                    <ul>
                        <li><span class="evidence-label">Title:</span> ${escapeHtml(data.extractedData?.title || '-')}</li>
                        <li><span class="evidence-label">Meta Description:</span> ${escapeHtml(data.extractedData?.metaDescription || '-')}</li>
                        <li><span class="evidence-label">H1 Tag:</span> ${escapeHtml(data.extractedData?.h1 || '-')}</li>
                    </ul>
                </div>
            </div>

            <!-- 8️⃣ CTA -->
            <div class="cta-section">
                <h2>15분 무료 전략 상담</h2>
                <p class="cta-section-desc">
                    AI 분석 결과를 기반으로<br>
                    전략가가 성장 구조를 제안합니다
                </p>
                <p class="cta-subtext">
                    • 핵심 병목 진단<br>
                    • 포지셔닝 정리 방향<br>
                    • 성장 구조 로드맵
                </p>
                <a href="./consultation.html" class="cta-button">상담 신청하기</a>
            </div>
        `;

        document.getElementById('reportContainer').innerHTML = reportHTML;
    }

    function formatServiceType(type) {
        const map = {
            saas: 'B2B SaaS',
            lifestyle: '라이프스타일',
            food: '식품',
            design: '디자인',
            fintech: '핀테크',
            health: '헬스',
            ecommerce: '이커머스',
            education: '교육',
            consulting: '컨설팅',
            default: '미분류'
        };
        return map[type] || '기타';
    }

    function safeNumber(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return 0;
        return Math.max(0, Math.min(100, Math.round(num)));
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function escapeAttribute(value) {
        return String(value).replace(/"/g, '&quot;');
    }

    function showError(msg) {
        const html = `
            <div class="error">
                <p>${escapeHtml(msg)}</p>
                <button onclick="window.location.href='./diagnosis-talk.html'">다시 진단하기</button>
            </div>
        `;
        document.getElementById('errorContainer').innerHTML = html;
    }
</script>
</body>
</html>
