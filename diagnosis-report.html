<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 리포트 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #fafafa; 
            color: #333; 
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        .header { 
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); 
            color: white; 
            padding: 60px 40px; 
            border-radius: 12px; 
            margin-bottom: 40px;
            text-align: center;
        }
        h1 { font-size: 40px; font-weight: 300; margin-bottom: 8px; }
        .subtitle { font-size: 14px; opacity: 0.8; }
        
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .error button {
            background: #c33;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .report-section {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #4B4545;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .info-row {
            display: flex;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            width: 120px;
            flex-shrink: 0;
        }
        
        .info-value {
            color: #333;
            flex: 1;
            word-break: break-all;
            line-height: 1.5;
        }
        
        .info-value a {
            color: #4A9EFF;
            text-decoration: none;
        }
        
        .info-value a:hover {
            text-decoration: underline;
        }
        
        .cta {
            background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        
        .cta h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .cta p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .cta-button {
            background: white;
            color: #4B4545;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .header { padding: 40px 24px; }
            .report-section { padding: 24px; }
            h1 { font-size: 28px; }
            .info-row { flex-direction: column; }
            .info-label { width: 100%; margin-bottom: 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="brandNameDisplay">브랜드 분석</h1>
            <p class="subtitle">AI 자동 분석 리포트</p>
        </div>

        <div id="errorContainer"></div>
        <div id="reportContainer"></div>
    </div>

    <script>
        function loadReport() {
            try {
                // localStorage에서 데이터 로드
                const diagnosisData = JSON.parse(localStorage.getItem('diagnosisData'));

                if (!diagnosisData) {
                    showError('데이터를 찾을 수 없습니다. 다시 진단을 시작해주세요.');
                    return;
                }

                // 리포트 표시
                displayReport(diagnosisData);

            } catch (error) {
                console.error('리포트 로드 오류:', error);
                showError('오류가 발생했습니다. 다시 진단해주세요.');
            }
        }

        function displayReport(data) {
            const brandName = data.brandName || 'Brand';
            const website = data.website || '#';
            const email = data.email || '-';
            const serviceType = data.serviceType || 'lifestyle';

            // 헤더
            document.getElementById('brandNameDisplay').textContent = brandName;

            // 리포트 HTML
            const reportHTML = `
                <!-- 기본 정보 -->
                <div class="report-section">
                    <div class="section-title">기본 정보</div>
                    <div class="info-row">
                        <div class="info-label">브랜드명</div>
                        <div class="info-value">${brandName}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">웹사이트</div>
                        <div class="info-value"><a href="${website}" target="_blank">${website}</a></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">서비스 유형</div>
                        <div class="info-value"><span class="badge">${formatServiceType(serviceType)}</span></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">연락처</div>
                        <div class="info-value">${email}</div>
                    </div>
                </div>

                <!-- 분석 결과 -->
                <div class="report-section">
                    <div class="section-title">분석 결과</div>
                    <p style="font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 20px;">
                        웹사이트 URL 분석을 기반으로 작성되었습니다.<br>
                        더 정확한 분석을 원하신다면 전문가 상담을 예약해주세요.
                    </p>
                    <div class="info-row">
                        <div class="info-label">분석 상태</div>
                        <div class="info-value">완료 (기본 분석)</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">다음 단계</div>
                        <div class="info-value">전문가 1:1 상담을 통해 맞춤형 전략 수립</div>
                    </div>
                </div>

                <!-- CTA -->
                <div class="cta">
                    <h2>전문가 상담</h2>
                    <p>AI 분석과 전문가의 인사이트가 만나는<br>20분 무료 전략 상담</p>
                    <a href="https://cal.com/chaeum" target="_blank" class="cta-button">상담 예약하기</a>
                </div>
            `;

            document.getElementById('reportContainer').innerHTML = reportHTML;
        }

        function formatServiceType(type) {
            const typeMap = {
                'saas': 'B2B SaaS',
                'lifestyle': '라이프스타일',
                'food': '식품',
                'design': '디자인',
                'fintech': '핀테크',
                'health': '헬스',
                'ecommerce': '이커머스',
                'education': '교육',
                'consulting': '컨설팅'
            };
            return typeMap[type] || '기타';
        }

        function showError(msg) {
            const errorHTML = `
                <div class="error">
                    <p>${msg}</p>
                    <button onclick="window.location.href='./diagnosis-talk.html'">다시 진단하기</button>
                </div>
            `;
            document.getElementById('errorContainer').innerHTML = errorHTML;
        }

        // 페이지 로드 시 리포트 로드
        window.addEventListener('DOMContentLoaded', loadReport);
    </script>
</body>
</html>
