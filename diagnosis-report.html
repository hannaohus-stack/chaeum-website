<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랜드 분석 리포트 | CHAEUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        .header { background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; padding: 50px 40px; border-radius: 12px; margin-bottom: 40px; }
        .header h1 { font-size: 36px; font-weight: 300; margin-bottom: 8px; }
        .header-info { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 30px; }
        
        .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .score-item { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; text-align: center; }
        .score-number { font-size: 42px; font-weight: bold; }
        .score-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 8px; text-transform: uppercase; }
        
        .section { background: white; padding: 40px; border-radius: 12px; margin-bottom: 24px; }
        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #f0f0f0; }
        .section-num { width: 36px; height: 36px; background: #4B4545; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .section-title { font-size: 18px; font-weight: 600; color: #4B4545; }
        
        .insight { background: #f9f9f9; border-left: 4px solid #4B4545; padding: 20px; border-radius: 4px; margin: 20px 0; }
        .insight p { font-size: 14px; line-height: 1.7; color: #333; }
        .insight strong { color: #4B4545; }
        
        .bar-chart { display: flex; gap: 30px; align-items: flex-end; height: 150px; margin: 30px 0; }
        .bar-item { flex: 1; text-align: center; }
        .bar { width: 100%; background: #4B4545; border-radius: 4px 4px 0 0; position: relative; margin-bottom: 12px; }
        .bar-value { position: absolute; top: -28px; left: 0; right: 0; text-align: center; font-weight: 600; color: #4B4545; }
        .bar-label { font-size: 12px; color: #666; }
        
        .gaps { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
        .gap { background: #f9f9f9; padding: 20px; border-left: 4px solid #FF6B6B; border-radius: 4px; }
        .gap-num { display: inline-block; background: #FF6B6B; color: white; width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
        .gap-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .gap-text { font-size: 12px; color: #666; line-height: 1.6; }
        
        .cta { background: linear-gradient(135deg, #4B4545 0%, #2a2625 100%); color: white; padding: 50px 40px; border-radius: 12px; text-align: center; margin-top: 40px; }
        .cta h2 { font-size: 24px; font-weight: 600; margin-bottom: 16px; }
        .cta p { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.8); margin-bottom: 24px; }
        .cta-btn { background: white; color: #4B4545; padding: 14px 36px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; font-size: 14px; }
        .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .footer { text-align: center; padding: 20px; color: #888; font-size: 12px; margin-top: 40px; }
        
        @media (max-width: 768px) {
            .score-grid { grid-template-columns: repeat(2, 1fr); }
            .gaps { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="brandName">브랜드명</h1>
            <div class="header-info">
                <div id="serviceInfo"></div>
                <div id="targetInfo"></div>
            </div>
            <div class="score-grid">
                <div class="score-item">
                    <div class="score-number" id="s1">--</div>
                    <div class="score-label">메시지 명확도</div>
                </div>
                <div class="score-item">
                    <div class="score-number" id="s2">--</div>
                    <div class="score-label">차별화 지수</div>
                </div>
                <div class="score-item">
                    <div class="score-number" id="s3">--</div>
                    <div class="score-label">퍼널 효율</div>
                </div>
                <div class="score-item">
                    <div class="score-number" id="total">--</div>
                    <div class="score-label">종합 점수</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-num">1</div>
                <div class="section-title">핵심 문제 진단</div>
            </div>
            <div class="insight">
                <p id="diagnosis"></p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-num">2</div>
                <div class="section-title">메시지 일관성</div>
            </div>
            <div class="insight">
                <p id="message"></p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-num">3</div>
                <div class="section-title">콘텐츠 구조</div>
            </div>
            <div class="bar-chart">
                <div class="bar-item">
                    <div class="bar" id="bar1"><div class="bar-value" id="bv1">--</div></div>
                    <div class="bar-label">제품</div>
                </div>
                <div class="bar-item">
                    <div class="bar" id="bar2"><div class="bar-value" id="bv2">--</div></div>
                    <div class="bar-label">라이프</div>
                </div>
                <div class="bar-item">
                    <div class="bar" id="bar3"><div class="bar-value" id="bv3">--</div></div>
                    <div class="bar-label">스토리</div>
                </div>
            </div>
            <div class="insight">
                <p id="content"></p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-num">4</div>
                <div class="section-title">전략적 병목 (Top 3)</div>
            </div>
            <div class="gaps" id="gaps"></div>
        </div>

        <div class="cta">
            <h2>이 분석은 시작입니다</h2>
            <p>AI의 진단과 전문가의 전략이 만나는<br><strong>20분 무료 상담</strong>에서<br>당신의 성장 로드맵을 그려보세요</p>
            <button class="cta-btn" onclick="location.href='https://cal.com/chaeum'">무료 상담 예약</button>
        </div>

        <div class="footer">
            <p>이 리포트는 Chaeum AI가 생성한 초안입니다. 상세 전략은 전문가 상담에서 제공됩니다.</p>
        </div>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('diagnosisData') || '{}');
        const analysis = data.analysis || {};

        document.getElementById('brandName').textContent = data.brandName || '브랜드';
        document.getElementById('serviceInfo').innerHTML = `📌 ${data.service || ''}`;
        document.getElementById('targetInfo').innerHTML = `👥 ${data.target || ''}`;

        document.getElementById('s1').textContent = analysis.metrics?.message_clarity || '--';
        document.getElementById('s2').textContent = analysis.metrics?.differentiation || '--';
        document.getElementById('s3').textContent = analysis.metrics?.conversion_path || '--';
        document.getElementById('total').textContent = analysis.total_score || '--';

        document.getElementById('diagnosis').innerHTML = `<strong>${data.brandName}의 현황:</strong><br>${analysis.critical_diagnosis}<br><br><strong>평가:</strong> ${analysis.summary_verdict}`;
        document.getElementById('message').innerHTML = `<strong>명확도: ${analysis.metrics?.message_clarity}/100</strong><br>이슈: ${analysis.metrics?.message_clarity_reason || analysis.summary_verdict}`;

        const cs = analysis.contentStructure || {};
        const max = Math.max(cs.product || 0, cs.lifestyle || 0, cs.story || 0);
        document.getElementById('bar1').style.height = (cs.product / max * 150) + 'px';
        document.getElementById('bar2').style.height = (cs.lifestyle / max * 150) + 'px';
        document.getElementById('bar3').style.height = (cs.story / max * 150) + 'px';
        document.getElementById('bv1').textContent = cs.product + '%';
        document.getElementById('bv2').textContent = cs.lifestyle + '%';
        document.getElementById('bv3').textContent = cs.story + '%';
        document.getElementById('content').innerHTML = `<strong>분석:</strong> 제품 중심(${cs.product}%)으로 인해 단기 매출에는 유리하나, 스토리(${cs.story}%)가 부족해 팬덤 형성이 어렵습니다.`;

        let gapsHTML = '';
        (analysis.strategic_gaps || []).forEach((gap, i) => {
            gapsHTML += `<div class="gap"><div class="gap-num">${i+1}</div><div class="gap-title">${gap.problem}</div><div class="gap-text"><strong>영향:</strong> ${gap.impact}</div></div>`;
        });
        document.getElementById('gaps').innerHTML = gapsHTML;
    </script>
</body>
</html>
